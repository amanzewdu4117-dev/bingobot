<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAMOS BINGO ULTIMATE - 500 CARDS</title>
    
    <!-- External Libraries -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD2l0Q4JOn6S0Xf1YmB1Z0m-Z0m-Z0m", 
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            storageBucket: "my-app-project-1e0bb.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:9b5f5bc..." 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core Firebase Functions
        window.syncGameState = (callback) => {
            onSnapshot(doc(db, "game_state", "live"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };

        window.updateServerBall = async (ball, history) => {
            await setDoc(doc(db, "game_state", "live"), {
                lastBall: ball,
                history: history,
                status: "active",
                timestamp: Date.now()
            });
        };

        window.resetServerGame = async () => {
            await setDoc(doc(db, "game_state", "live"), {
                lastBall: null,
                history: [],
                status: "reset",
                timestamp: Date.now()
            });
        };
    </script>

    <style>
        :root {
            --neon: #00ffcc; --bg: #03070b; --card-bg: #0d141f;
            --b: #00bcd4; --i: #9c27b0; --n: #f44336; --g: #4caf50; --o: #ff9800;
            --panel: #161f2c;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; margin: 0; padding: 0; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Top Navigation / Stats */
        .header {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
            padding: 12px; background: var(--panel); border-bottom: 2px solid #1f2d40;
        }

        .stat-card {
            background: rgba(0,0,0,0.4); border: 1px solid #2d3e50;
            border-radius: 10px; padding: 6px; text-align: center;
            display: flex; flex-direction: column; justify-content: center;
        }

        .stat-label { font-size: 9px; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; font-weight: 800; }
        .stat-value { font-size: 15px; font-weight: 900; margin-top: 2px; }

        #card-selector {
            background: transparent; color: white; border: none;
            font-size: 15px; font-weight: 900; outline: none; width: 100%; text-align: center;
        }

        /* Main Game Layout */
        .game-area {
            display: flex; flex: 1; gap: 10px; padding: 10px; height: calc(100vh - 150px);
        }

        /* Bingo Board Section */
        .board-section {
            flex: 1.3; background: var(--card-bg); border-radius: 20px;
            padding: 10px; border: 1px solid #1f2d40; display: flex; flex-direction: column;
        }

        .bingo-header {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px;
        }

        .letter-box {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 8px; font-size: 18px; font-weight: 900; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .grid-5x5 {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex: 1;
        }

        .cell {
            background: #050a10; border: 1px solid #1a2a3a; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800; color: #4b627a; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Active/Called Cell Styles */
        .cell.active { color: white; border: 2px solid white; transform: scale(1.05); z-index: 2; }
        .b-act { background: var(--b); box-shadow: 0 0 15px var(--b); }
        .i-act { background: var(--i); box-shadow: 0 0 15px var(--i); }
        .n-act { background: var(--n); box-shadow: 0 0 15px var(--n); }
        .g-act { background: var(--g); box-shadow: 0 0 15px var(--g); }
        .o-act { background: var(--o); box-shadow: 0 0 15px var(--o); }

        /* Right Side Info Section */
        .info-section {
            flex: 0.7; display: flex; flex-direction: column; gap: 10px;
        }

        .current-ball-display {
            background: var(--card-bg); border: 2px solid var(--neon);
            border-radius: 25px; flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            overflow: hidden;
        }

        .ball-glow {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,255,204,0.1) 0%, transparent 70%);
        }

        .ball-num { font-size: 80px; font-weight: 900; color: white; z-index: 1; line-height: 1; }
        .ball-cat {
            z-index: 1; padding: 6px 20px; border-radius: 20px; font-size: 14px;
            font-weight: 900; margin-top: 10px; min-width: 90px; text-align: center;
        }

        .auto-fill-panel {
            background: var(--panel); border-radius: 20px; flex: 0.8;
            border: 1px dashed #2d3e50; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 10px;
        }

        .pulse-icon {
            font-size: 30px; color: var(--neon); animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Footer Controls */
        .footer {
            padding: 15px; background: var(--bg); position: fixed; bottom: 0; width: 100%;
        }

        .main-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-size: 18px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(45deg, #00ffcc, #0099ff);
            color: #03070b; box-shadow: 0 5px 20px rgba(0,255,204,0.3);
            cursor: pointer; transition: 0.3s;
        }

        .main-btn:active { transform: scale(0.95); }

        /* Overlay */
        #win-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="win-overlay">
        <h1 style="color:var(--neon); font-size: 40px;">BINGO!</h1>
        <p>ዙሩ ተጠናቋል</p>
        <button onclick="location.reload()" class="main-btn" style="width: 200px;">ቀጥል</button>
    </div>

    <!-- Header Stats -->
    <div class="header">
        <div class="stat-card">
            <span class="stat-label">Card ID</span>
            <select id="card-selector" onchange="buildCartela()">
                <!-- Populated by JS -->
            </select>
        </div>
        <div class="stat-card">
            <span class="stat-label">Called</span>
            <div id="count-val" class="stat-value">0</div>
        </div>
        <div class="stat-card" onclick="adminCredit()">
            <span class="stat-label">Wallet</span>
            <div id="wallet-val" class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <span class="stat-label">Prize</span>
            <div class="stat-value" style="color:var(--neon)">1,880</div>
        </div>
    </div>

    <!-- Main Game -->
    <div class="game-area">
        <div class="board-section">
            <div class="bingo-header">
                <div class="letter-box" style="background:var(--b)">B</div>
                <div class="letter-box" style="background:var(--i)">I</div>
                <div class="letter-box" style="background:var(--n)">N</div>
                <div class="letter-box" style="background:var(--g)">G</div>
                <div class="letter-box" style="background:var(--o)">O</div>
            </div>
            <div id="bingo-grid" class="grid-5x5">
                <!-- Cells generated by JS -->
            </div>
        </div>

        <div class="info-section">
            <div class="current-ball-display">
                <div class="ball-glow"></div>
                <div id="ball-num" class="ball-num">--</div>
                <div id="ball-cat" class="ball-cat" style="background: #1a2a3a;">READY</div>
            </div>
            
            <div class="auto-fill-panel">
                <i class="fas fa-bolt pulse-icon"></i>
                <h4 style="margin: 10px 0 5px 0; font-size: 12px; color: var(--neon);">AUTO-FILL ACTIVE</h4>
                <p style="font-size: 9px; color: #4b627a; margin: 0;">እጣው ሲወጣ ሲስተሙ በራሱ ይሞላልዎታል</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <button id="draw-btn" class="main-btn" onclick="triggerDraw()">START LIVE DRAW</button>
    </div>

    <script>
        let currentCardNumbers = [];
        let serverHistory = [];
        let wallet = 0;

        function init() {
            const select = document.getElementById('card-selector');
            for(let i=1; i<=500; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.textContent = `#${i}`;
                if(i === 1) opt.selected = true;
                select.appendChild(opt);
            }
            
            buildCartela();

            window.syncGameState((data) => {
                if(data.status === "active") {
                    serverHistory = data.history;
                    renderBall(data.lastBall);
                }
                if(data.status === "reset") location.reload();
            });
        }

        function buildCartela() {
            const cardId = parseInt(document.getElementById('card-selector').value);
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            currentCardNumbers = [];

            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            
            for(let col=0; col<5; col++) {
                let start = ranges[col][0];
                for(let row=0; row<5; row++) {
                    // Logic to make 500 cards unique
                    let n = start + ((cardId * (row + 7) + (col * 3)) % 15);
                    currentCardNumbers.push(n);
                    
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `num-${n}`;
                    cell.textContent = n;
                    grid.appendChild(cell);
                }
            }
            checkAutoFill();
        }

        function renderBall(num) {
            document.getElementById('ball-num').textContent = num;
            document.getElementById('count-val').textContent = serverHistory.length;
            
            let cat = num <= 15 ? 'b' : num <= 30 ? 'i' : num <= 45 ? 'n' : num <= 60 ? 'g' : 'o';
            let label = document.getElementById('ball-cat');
            label.textContent = cat.toUpperCase();
            label.style.background = `var(--${cat})`;
            
            // Vibration for new ball
            if(window.navigator.vibrate) window.navigator.vibrate(100);
            
            checkAutoFill();
        }

        function checkAutoFill() {
            serverHistory.forEach(n => {
                let cell = document.getElementById(`num-${n}`);
                if(cell && !cell.classList.contains('active')) {
                    let cat = n <= 15 ? 'b' : n <= 30 ? 'i' : n <= 45 ? 'n' : n <= 60 ? 'g' : 'o';
                    cell.classList.add('active', `${cat}-act`);
                }
            });

            // Winner Check
            let activeOnCard = currentCardNumbers.filter(n => serverHistory.includes(n));
            if(activeOnCard.length >= 25) {
                document.getElementById('win-overlay').style.display = 'flex';
            }
        }

        function triggerDraw() {
            document.getElementById('draw-btn').style.opacity = '0.3';
            document.getElementById('draw-btn').disabled = true;
            
            let pool = [];
            const loop = setInterval(() => {
                if(pool.length >= 75) { clearInterval(loop); return; }
                let n;
                do { n = Math.floor(Math.random()*75)+1; } while(pool.includes(n));
                pool.push(n);
                window.updateServerBall(n, pool);
            }, 3000);
        }

        function adminCredit() {
            if(prompt("Admin Key:") === "2026") {
                wallet += 500;
                document.getElementById('wallet-val').textContent = wallet;
            }
        }

        init();
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
