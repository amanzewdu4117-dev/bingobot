<div id="app">
    <div id="selection-screen" class="screen">
        <div class="user-header">
            <div class="user-avatar">@</div>
            <div class="user-details">
                <span class="user-name">@Amanuuu1</span>
                <span class="round-id">ROUND #22161</span>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-box timer"><label>CLOSES IN</label><div id="lobby-timer">00:48</div></div>
            <div class="stat-box cartela"><label>CARTELA</label><div>41</div></div>
            <div class="stat-box wallet"><label>WALLET</label><div>40 ETB</div></div>
        </div>
        <div class="scroll-container">
            <div class="slot-grid" id="lobby-grid"></div>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="game-header-stats">
            <div class="mini-stat">CARTELA<br><span>232</span></div>
            <div class="mini-stat">CALLED<br><span id="called-count">0</span></div>
            <div class="mini-stat">WALLET<br><span>20</span></div>
            <div class="mini-stat">DERASH<br><span class="neon-text">1,856</span></div>
        </div>
        <div class="game-layout">
            <div class="called-numbers-list" id="full-bingo-board"></div>
            <div class="my-cartelas" id="my-active-cards">
                </div>
        </div>
    </div>

    <div id="winner-screen" class="screen hidden">
        <div class="winner-content">
            <div class="trophy">🏆</div>
            <h1>WINNER DECLARED</h1>
            <p>TOTAL POOL: <span class="gold-text">1,856 ETB</span></p>
            <div class="winner-card">
                <div class="user-row">
                    <div class="orange-box">@</div>
                    <div>@Chala<br><small>NODE: 226717</small></div>
                </div>
                <div class="payout">PAYOUT: 928 ETB</div>
            </div>
            <button onclick="resetGame()">NEXT ROUND IN 4S</button>
        </div>
    </div>
</div>
