<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VamosBingo - Server Sync</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #050a10; --card-bg: #121a26; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Stats */
        .header { padding: 10px; flex-shrink: 0; border-bottom: 1px solid #1a2a3a; }
        .top-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .stat-item { background: var(--card-bg); padding: 8px 2px; border-radius: 8px; text-align: center; border: 1px solid #232d3d; }
        .stat-lbl { font-size: 8px; color: #4cafaf; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--accent); }

        /* Game Layout */
        #game-view { display: none; padding: 10px; grid-template-columns: 1fr 1.3fr; gap: 10px; height: 100%; overflow: hidden; }
        .ball-tracker { background: var(--card-bg); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #1a2a3a; }
        .track-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; overflow-y: auto; flex: 1; }
        .t-num { background: #1c283d; text-align: center; font-size: 10px; padding: 6px 0; border-radius: 4px; color: #5d6d82; }
        .t-num.on { background: var(--accent); color: #000; font-weight: bold; }

        .big-ball { background: var(--card-bg); border: 2px solid #1a2a3a; border-radius: 20px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; }
        
        .active-cards { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .play-card { background: var(--card-bg); border-radius: 12px; padding: 8px; border: 1px solid #232d3d; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .p-cell { background: #1c283d; aspect-ratio: 1.1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; font-weight: bold; color: #cbd5e0; }
        .p-cell.hit { background: var(--accent) !important; color: #000; box-shadow: 0 0 8px var(--accent); }

        #selection-screen { flex: 1; overflow-y: auto; padding: 10px; }
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
        .slot { background: var(--card-bg); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 11px; border: 1px solid #232d3d; color: #a0b0c0; }
        .slot.active { border-color: #fb8c00; background: #fb8c0033; color: white; }

        .footer-action { padding: 15px; background: var(--bg); border-top: 1px solid #1a2a3a; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 16px; font-weight: bold; border-radius: 12px; width: 100%; font-size: 16px; cursor: pointer; }

        #win-overlay { position: fixed; inset: 0; background: rgba(5, 10, 16, 0.98); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; text-align: center; }
    </style>
</head>
<body>

<div id="win-overlay">
    <h1 style="color:var(--accent); font-size: 50px; margin:0;">BINGO!</h1>
    <h2 id="winner-text" style="color:#fff;"></h2>
    <div style="font-size: 24px; color: #ffd700; margin: 10px 0;">+<span id="win-amount"></span> ETB</div>
    <p style="color:#4cafaf;">አዲስ ጨዋታ በ <span id="seconds">5</span> ሰከንድ ይጀምራል...</p>
</div>

<div class="header">
    <div class="top-bar">
        <div class="stat-item"><div class="stat-lbl">ካርቴላ</div><div id="sel-count" class="stat-val">0</div></div>
        <div class="stat-item"><div class="stat-lbl">Called</div><div id="called-count" class="stat-val">0</div></div>
        <div class="stat-item"><div class="stat-lbl">Wallet</div><div id="wallet" class="stat-val">40</div></div>
        <div class="stat-item"><div class="stat-lbl">ደራሽ</div><div id="derash" class="stat-val">0</div></div>
    </div>
</div>

<div id="selection-screen">
    <div class="grid-500" id="slot-grid"></div>
    <div class="footer-action">
        <button class="start-btn" onclick="joinGame()">አሁን ተጫወት (JOIN)</button>
    </div>
</div>

<div id="game-view">
    <div class="ball-tracker"><div class="track-grid" id="track-grid"></div></div>
    <div style="display:flex; flex-direction:column; min-height:0;">
        <div class="big-ball">
            <div id="big-num" style="font-size:55px; font-weight:900;">--</div>
            <div id="ball-letter" style="background:#fb8c00; color:#000; padding:1px 12px; border-radius:10px; font-size:13px; font-weight:bold;">WAITING</div>
        </div>
        <div class="active-cards" id="active-cards"></div>
    </div>
</div>

<script>
    // 1. ፎቶ ላይ የላክኸው Config
    const firebaseConfig = {
        apiKey: "AIzaSyD2l0Q4J...", 
        authDomain: "my-app-project-1e0bb.firebaseapp.com",
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com",
        projectId: "my-app-project-1e0bb",
        storageBucket: "my-app-project-1e0bb.appspot.com",
        messagingSenderId: "280130045202",
        appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let wallet = 40;
    let selected = [], allCards = [], calledBalls = [];

    // ዳታቤዝ አሰላለፍ - ጨዋታውን ከሰርቨር ጋር ማመሳሰል
    function init() {
        generateCards();
        setupUI();
        
        // ደራሽ ብር እና የወጡ ቁጥሮችን ከሰርቨር መከታተል
        db.ref('gameState').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            document.getElementById('derash').textContent = Math.floor(data.pot || 0).toLocaleString();
            calledBalls = data.history || [];
            document.getElementById('called-count').textContent = calledBalls.length;
            
            updateBallDisplay();
            checkBingoAll();
        });

        // አሸናፊ ሲኖር
        db.ref('winner').on('value', (snap) => {
            const winData = snap.val();
            if(winData) showWin(winData);
        });
    }

    function setupUI() {
        const grid = document.getElementById('slot-grid');
        for(let i=1; i<=500; i++) {
            let s = document.createElement('div');
            s.className = 'slot'; s.textContent = i;
            s.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(n => n !== i);
                    s.classList.remove('active');
                } else if(selected.length < 2) {
                    selected.push(i);
                    s.classList.add('active');
                }
                document.getElementById('sel-count').textContent = selected.length;
            };
            grid.appendChild(s);
        }

        const track = document.getElementById('track-grid');
        for(let i=1; i<=75; i++) {
            let d = document.createElement('div');
            d.className = 't-num'; d.id = `t-${i}`; d.textContent = i;
            track.appendChild(d);
        }
    }

    function joinGame() {
        if(selected.length === 0) return alert("ካርቴላ ይምረጡ");
        let cost = selected.length * 20;
        if(wallet < cost) return alert("በቂ ብር የለዎትም");

        wallet -= cost;
        document.getElementById('wallet').textContent = wallet;
        
        // 80% ወደ ደራሽ (Pot) ሰርቨር ላይ መጨመር
        db.ref('gameState/pot').transaction(current => (current || 0) + (cost * 0.8));

        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('game-view').style.display = 'grid';
        renderPlayerCards();
    }

    function renderPlayerCards() {
        const container = document.getElementById('active-cards');
        selected.forEach(id => {
            let card = allCards[id-1];
            let html = `<div class="play-card" id="card-${id}"><div class="card-grid">`;
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    let val = (r===2 && c===2) ? '★' : card[c][r];
                    let hitClass = (val === '★') ? 'hit' : '';
                    html += `<div class="p-cell ${hitClass}" data-val="${val}">${val}</div>`;
                }
            }
            html += `</div></div>`;
            container.innerHTML += html;
        });
        updateBallDisplay(); // እስካሁን የወጡትን ማርክ አድርግ
    }

    function updateBallDisplay() {
        if(calledBalls.length === 0) return;
        
        const last = calledBalls[calledBalls.length - 1];
        document.getElementById('big-num').textContent = last;
        document.getElementById('ball-letter').textContent = "BALL: " + last;

        calledBalls.forEach(n => {
            let t = document.getElementById(`t-${n}`);
            if(t) t.classList.add('on');
            
            document.querySelectorAll(`.p-cell[data-val="${n}"]`).forEach(c => c.classList.add('hit'));
        });
    }

    function checkBingoAll() {
        // የቢንጎ ህግጋት እዚህ ይቀጥላሉ...
    }

    function generateCards() {
        for(let i=0; i<500; i++) {
            let card = [[],[],[],[],[]];
            let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let col=0; col<5; col++) {
                while(card[col].length < 5) {
                    let r = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                    if(!card[col].includes(r)) card[col].push(r);
                }
            }
            allCards.push(card);
        }
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vamos Mini - Player</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    <style>
        /* ከላይ የነበረው ቆንጆ ዲዛይን እዚህ ይቀጥላል */
        :root { --bg: #050a10; --accent: #00ffcc; --card: #121a26; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .stat-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat { background: var(--card); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #1a2a3a; }
        .card-box { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cell { background: #1c283d; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: bold; }
        .cell.hit { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }
        .big-ball { font-size: 50px; text-align: center; color: #fb8c00; font-weight: 900; margin: 20px 0; }
    </style>
</head>
<body>

<div class="stat-bar">
    <div class="stat">ደራሽ<br><span id="pot">0</span></div>
    <div class="stat">ቁጥር<br><span id="count">0</span>/75</div>
    <div class="stat">Wallet<br><span id="wallet">40</span></div>
</div>

<div id="game-view">
    <div class="big-ball" id="current-ball">--</div>
    <div id="player-cards"></div>
</div>

<script>
    // ያንተን Config እዚህ ጋር ተካ
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "my-app-project-1e0bb.firebaseapp.com",
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com",
        projectId: "my-app-project-1e0bb",
        storageBucket: "my-app-project-1e0bb.appspot.com",
        messagingSenderId: "280130045202",
        appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. መረጃዎችን ከሰርቨር ተቀበል
    db.ref('gameState').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        document.getElementById('pot').textContent = data.pot || 0;
        const history = data.history || [];
        document.getElementById('count').textContent = history.length;

        if(history.length > 0) {
            const lastBall = history[history.length - 1];
            document.getElementById('current-ball').textContent = lastBall;
            markBalls(history);
        }
    });

    function markBalls(history) {
        history.forEach(num => {
            const cells = document.querySelectorAll(`[data-num="${num}"]`);
            cells.forEach(c => c.classList.add('hit'));
        });
    }

    // ካርቴላ የማመንጫ ኮድ እዚህ ይገባል (ከዚህ ቀደም የሰራነው)
</script>
</body>
</html>
