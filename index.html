<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAMOS BINGO - AUTO DRAW</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2l0Q4JOn6S0Xf1YmB1Z0m-Z0m-Z0m", 
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bc..." 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ዳታ ወደ ክላውድ መላኪያ
        window.pushBallToCloud = async (ball, history) => {
            await setDoc(doc(db, "game_state", "live"), {
                lastBall: ball,
                history: history,
                status: "active",
                time: Date.now()
            });
        };

        // የቆየ ጨዋታን ማጥፊያ
        window.resetCloud = async () => {
            await setDoc(doc(db, "game_state", "live"), {
                status: "reset",
                history: [],
                lastBall: null,
                time: Date.now()
            });
        };

        // መረጃ መቀበያ
        window.listenToCloud = (callback) => {
            onSnapshot(doc(db, "game_state", "live"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root {
            --neon: #00ffcc; --bg: #03070b; --card-bg: #0d141f; 
            --b: #00bcd4; --i: #9c27b0; --n: #f44336; --g: #4caf50; --o: #ff9800;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        .header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: var(--card-bg); border-bottom: 1px solid #1f2d40; }
        .stat-box { background: rgba(0,0,0,0.3); border: 1px solid #1f2d40; border-radius: 8px; padding: 5px; text-align: center; }
        .label { font-size: 8px; color: var(--neon); font-weight: bold; }
        
        #card-select { background: transparent; color: white; border: none; font-size: 14px; font-weight: 900; width: 100%; text-align: center; outline: none; }

        .main { display: flex; gap: 10px; padding: 10px; flex: 1; }
        .board { flex: 1.2; background: var(--card-bg); border-radius: 15px; padding: 8px; border: 1px solid #1f2d40; display: flex; flex-direction: column; }
        .letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 5px; }
        .l-box { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 900; font-size: 14px; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex: 1; }
        .cell { background: #050a10; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 16px; font-weight: bold; color: #2d3e50; border: 1px solid #1a2a3a; transition: 0.3s; }
        
        /* ሲሞላ የሚኖረው ቀለም */
        .cell.filled { color: white; border: 2px solid white; transform: scale(1.05); }
        .b-f { background: var(--b); } .i-f { background: var(--i); } .n-f { background: var(--n); } .g-f { background: var(--g); } .o-f { background: var(--o); }

        .side { flex: 0.8; display: flex; flex-direction: column; gap: 10px; }
        .ball-box { background: var(--card-bg); border-radius: 20px; border: 2px solid var(--neon); flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ball-num { font-size: 60px; font-weight: 900; line-height: 1; }
        .ball-tag { padding: 5px 15px; border-radius: 15px; font-size: 12px; font-weight: bold; margin-top: 10px; }

        .footer { padding: 10px; }
        .draw-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-size: 16px; background: var(--neon); color: black; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,204,0.3); }
        .draw-btn:disabled { background: #1f2d40; color: #4b627a; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-box">
            <div class="label">CARD #</div>
            <select id="card-select" onchange="createCard()">
                <!-- 1-500 options -->
            </select>
        </div>
        <div class="stat-box"><div class="label">CALLED</div><div id="st-count">0</div></div>
        <div class="stat-box"><div class="label">WALLET</div><div id="st-wallet">0</div></div>
        <div class="stat-box"><div class="label">PRIZE</div><div style="color:var(--neon)">1,880</div></div>
    </div>

    <div class="main">
        <div class="board">
            <div class="letters">
                <div class="l-box" style="background:var(--b)">B</div>
                <div class="l-box" style="background:var(--i)">I</div>
                <div class="l-box" style="background:var(--n)">N</div>
                <div class="l-box" style="background:var(--g)">G</div>
                <div class="l-box" style="background:var(--o)">O</div>
            </div>
            <div id="card-grid" class="grid"></div>
        </div>

        <div class="side">
            <div class="ball-box">
                <div id="big-ball" class="ball-num">--</div>
                <div id="big-tag" class="ball-tag" style="background:#2d3e50">READY</div>
            </div>
            <div style="background:var(--card-bg); flex:0.6; border-radius:15px; border:1px dashed #2d3e50; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:5px;">
               <div style="font-size: 20px;">🎲</div>
               <div style="font-size: 10px; color: var(--neon);">LIVE DRAW</div>
               <div id="status" style="font-size: 9px; color: #4b627a;">እጣው በየ 3 ሰከንዱ ይወጣል</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <button id="start-btn" class="draw-btn" onclick="startDrawing()">START LIVE DRAW</button>
    </div>

    <script>
        let myNumbers = [];
        let pulledBalls = [];
        let drawingInterval = null;

        function init() {
            const select = document.getElementById('card-select');
            for(let i=1; i<=500; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.textContent = i;
                select.appendChild(opt);
            }
            createCard();

            // ክላውድ ላይ አዲስ እጣ ሲወጣ ማዳመጫ
            window.listenToCloud((data) => {
                if(data.status === "active") {
                    pulledBalls = data.history;
                    updateUI(data.lastBall);
                }
                if(data.status === "reset") location.reload();
            });
        }

        function createCard() {
            const cardId = parseInt(document.getElementById('card-select').value);
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';
            myNumbers = [];

            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let col=0; col<5; col++) {
                let start = ranges[col][0];
                for(let row=0; row<5; row++) {
                    let n = start + ((cardId * (row + 5) + col) % 15);
                    myNumbers.push(n);
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${n}`;
                    cell.textContent = n;
                    grid.appendChild(cell);
                }
            }
            autoFill();
        }

        function updateUI(last) {
            document.getElementById('big-ball').textContent = last;
            document.getElementById('st-count').textContent = pulledBalls.length;
            
            let cat = last <= 15 ? 'b' : last <= 30 ? 'i' : last <= 45 ? 'n' : last <= 60 ? 'g' : 'o';
            let tag = document.getElementById('big-tag');
            tag.textContent = cat.toUpperCase();
            tag.style.background = `var(--${cat})`;

            autoFill();
        }

        function autoFill() {
            pulledBalls.forEach(num => {
                let cell = document.getElementById(`cell-${num}`);
                if(cell) {
                    let cat = num <= 15 ? 'b' : num <= 30 ? 'i' : num <= 45 ? 'n' : num <= 60 ? 'g' : 'o';
                    cell.classList.add('filled', `${cat}-f`);
                }
            });
        }

        // እጣ ማውጣቱን የሚጀምር ተግባር
        function startDrawing() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('status').textContent = "እጣ እየወጣ ነው...";
            
            let currentPool = [];
            drawingInterval = setInterval(() => {
                if(currentPool.length >= 75) {
                    clearInterval(drawingInterval);
                    return;
                }
                
                let ball;
                do {
                    ball = Math.floor(Math.random() * 75) + 1;
                } while(currentPool.includes(ball));
                
                currentPool.push(ball);
                window.pushBallToCloud(ball, currentPool);
            }, 3000); // በየ 3 ሰከንዱ
        }

        init();
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
