<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO PRO - AUTO RESTART</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            return onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>
    <style>
        :root { --bg: #0b141a; --neon: #00ffcc; --orange: #ff7e21; --border: #1c2b3a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #0d161d; border-radius: 10px; margin-bottom: 10px; }
        
        /* Game Layout */
        #game-page { display: none; grid-template-columns: 80px 1fr; gap: 10px; height: 90vh; }
        .side-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #111b21; padding: 5px; border-radius: 8px; overflow-y: auto; }
        .dot { font-size: 9px; background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #3a4d5e; }
        .dot.active { background: var(--orange); color: white; }
        
        .draw-box { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .big-num { font-size: 60px; font-weight: bold; color: var(--neon); }
        
        .card { background: #16212a; padding: 8px; border-radius: 10px; border: 1px solid #253341; margin-bottom: 10px; position: relative; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; }
        .cell.hit { background: var(--neon); color: black; font-weight: bold; }
        
        /* Bingo Overlay */
        #bingo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .bingo-text { font-size: 50px; font-weight: bold; color: var(--neon); text-shadow: 0 0 20px var(--neon); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initApp()">

    <div id="selection-page" style="text-align:center;">
        <h2>BINGO - SLOT SELECTION</h2>
        <p>19 እና 108 ለሙከራ ተመርጠዋል</p>
        <button onclick="startGame()" style="background:var(--neon); padding:15px 30px; border:none; border-radius:10px; font-weight:bold; margin-top:20px;">ጨዋታውን ጀምር</button>
    </div>

    <div id="game-page">
        <div class="side-board" id="side-board"></div>
        <div style="overflow-y:auto">
            <div class="draw-box">
                <div class="big-num" id="big-ball">--</div>
                <div style="font-size:10px; color:var(--neon)">CURRENT BALL</div>
            </div>
            <div id="cards-container"></div>
        </div>
    </div>

    <div id="bingo-overlay">
        <div class="bingo-text">BINGO!</div>
        <p id="winner-msg" style="margin-top:10px;"></p>
        <p style="color:#788da1; font-size:12px;">አዲስ ጨዋታ በራሱ ይጀምራል...</p>
    </div>

    <script>
        const mySlots = [19, 108];
        let gameActive = false;
        let drawnHistory = [];

        function initApp() {
            const sb = document.getElementById('side-board');
            for(let i=1; i<=75; i++) sb.innerHTML += `<div class="dot" id="d-${i}">${i}</div>`;
        }

        async function startGame() {
            gameActive = true;
            drawnHistory = [];
            document.getElementById('selection-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'grid';
            
            // ካርቴላዎችን ማመንጨት
            const cc = document.getElementById('cards-container');
            cc.innerHTML = "";
            mySlots.forEach(id => {
                let nums = generateCardNumbers();
                let h = `<div class="card" id="card-${id}"><div class="c-grid">`;
                nums.forEach((n, idx) => {
                    let val = (idx === 12) ? '★' : n;
                    h += `<div class="cell" id="c-${id}-${val}" data-val="${val}">${val}</div>`;
                });
                cc.innerHTML += h + `</div></div>`;
            });

            // Firebase ማጽዳት
            await setDoc(doc(window.db, "live_bingo", "current"), { ball: null, history: [] });
            
            // ማዳመጥ
            window.listenToGame(data => {
                if(!gameActive) return;
                document.getElementById('big-ball').innerText = data.ball || "--";
                drawnHistory = data.history || [];
                updateUI();
                checkBingo();
            });

            runDrawLoop();
        }

        function generateCardNumbers() {
            return Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
        }

        function updateUI() {
            drawnHistory.forEach(n => {
                document.getElementById(`d-${n}`)?.classList.add('active');
                mySlots.forEach(id => {
                    document.getElementById(`c-${id}-${n}`)?.classList.add('hit');
                });
            });
        }

        function checkBingo() {
            mySlots.forEach(id => {
                const cardCells = document.querySelectorAll(`#card-${id} .cell`);
                const hits = Array.from(cardCells).map(c => c.classList.contains('hit') || c.innerText === '★');
                
                // መስመሮችን መፈተሽ (Rows, Cols, Diagonals)
                let isBingo = false;
                for(let i=0; i<5; i++) {
                    if(hits.slice(i*5, i*5+5).every(v => v)) isBingo = true; // Horizontal
                    if([0,1,2,3,4].every(j => hits[i + j*5])) isBingo = true; // Vertical
                }
                if([0,6,12,18,24].every(i => hits[i])) isBingo = true; // Diag 1
                if([4,8,12,16,20].every(i => hits[i])) isBingo = true; // Diag 2

                if(isBingo && gameActive) {
                    gameActive = false;
                    showBingo(id);
                }
            });
        }

        function showBingo(id) {
            const overlay = document.getElementById('bingo-overlay');
            document.getElementById('winner-msg').innerText = `ካርቴላ ቁጥር ${id} አሸንፏል!`;
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                location.reload(); // አዲስ ጨዋታ ለመጀመር ገጹን ያድሳል
            }, 7000);
        }

        async function runDrawLoop() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            for (let b of pool) {
                if(!gameActive) break;
                drawnHistory.push(b);
                try {
                    await setDoc(doc(window.db, "live_bingo", "current"), { ball: b, history: drawnHistory });
                } catch(e) {}
                await new Promise(r => setTimeout(r, 4000));
            }
        }
    </script>
</body>
</html>
