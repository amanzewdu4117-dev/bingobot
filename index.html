<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VamosBingo Pro+ Header</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050a10; --card-bg: #121a26; --accent: #00ffcc; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header Stats */
        .header { padding: 10px; flex-shrink: 0; background: var(--bg); }
        .top-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .stat-item { background: var(--card-bg); padding: 8px 2px; border-radius: 8px; text-align: center; border: 1px solid #232d3d; }
        .stat-lbl { font-size: 8px; color: #4cafaf; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--accent); }

        /* Selection View */
        #selection-view { flex: 1; overflow-y: auto; padding: 0 10px; -webkit-overflow-scrolling: touch; }
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding-bottom: 120px; }
        .slot { background: var(--card-bg); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; border: 1px solid #232d3d; color: #a0b0c0; }
        .slot.active { border-color: #fb8c00; background: #fb8c0033; color: white; }

        .footer-action { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, var(--bg) 30%); padding: 20px 15px; z-index: 100; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 16px; font-weight: bold; border-radius: 12px; width: 100%; font-size: 16px; }

        /* Game Layout */
        #game-view { display: none; padding: 10px; grid-template-columns: 1fr 1.3fr; gap: 10px; height: 100%; overflow: hidden; }
        .ball-tracker { background: var(--card-bg); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .track-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; overflow-y: auto; flex: 1; }
        .t-num { background: #1c283d; text-align: center; font-size: 10px; padding: 6px 0; border-radius: 4px; color: #5d6d82; }
        .t-num.on { background: var(--accent); color: #000; font-weight: bold; }

        .big-ball { background: var(--card-bg); border: 2px solid #1a2a3a; border-radius: 20px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; }
        
        /* Play Card with BINGO Header */
        .active-cards { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .play-card { background: var(--card-bg); border-radius: 12px; padding: 8px; border: 1px solid #232d3d; }
        .card-header-bingo { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-bottom: 5px; text-align: center; font-weight: 900; font-size: 12px; }
        .card-header-bingo div { padding: 2px 0; border-radius: 3px; color: #fff; }
        
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .p-cell { background: #1c283d; aspect-ratio: 1.1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; font-weight: bold; color: #cbd5e0; }
        .p-cell.hit { background: var(--accent) !important; color: #000; box-shadow: 0 0 8px var(--accent); }

        .mode-box { display: flex; background: #1a2a3a; border-radius: 8px; margin-bottom: 8px; padding: 3px; }
        .mode-btn { flex: 1; border: none; background: none; color: #5d6d82; font-size: 10px; padding: 6px; border-radius: 5px; font-weight: bold; }
        .mode-btn.active { background: var(--accent); color: #000; }

        #win-overlay { position: fixed; inset: 0; background: rgba(0, 255, 204, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #000; }
    </style>
</head>
<body>

<div id="win-overlay">
    <h1 style="font-size: 60px; margin: 0;">BINGO!</h1>
    <p style="font-weight: bold;">እንኳን ደስ ያለህ!</p>
</div>

<div class="header">
    <div class="top-bar">
        <div class="stat-item"><div class="stat-lbl">Cartela</div><div id="sel-count" class="stat-val">0</div></div>
        <div class="stat-item"><div class="stat-lbl">Called</div><div id="called-count" class="stat-val">0</div></div>
        <div class="stat-item"><div class="stat-lbl">Wallet</div><div class="stat-val">40</div></div>
        <div class="stat-item"><div class="stat-lbl">Derash</div><div class="stat-val">2,184</div></div>
    </div>
</div>

<div id="selection-screen">
    <div style="text-align: center; color: var(--accent); font-size: 12px; padding: 10px 0;">እባክዎ እስከ 2 ካርቴላ ይምረጡ</div>
    <div id="selection-view">
        <div class="grid-500" id="slot-grid"></div>
    </div>
    <div class="footer-action">
        <button class="start-btn" onclick="manualStart()">አሁን ተጫወት (PLAY)</button>
    </div>
</div>

<div id="game-view">
    <div class="ball-tracker">
        <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:2px; margin-bottom:8px; font-size:10px; text-align:center; font-weight:bold;">
            <div style="color:#1e88e5;">B</div>
            <div style="color:#8e24aa;">I</div>
            <div style="color:#d81b60;">N</div>
            <div style="color:#00897b;">G</div>
            <div style="color:#fb8c00;">O</div>
        </div>
        <div class="track-grid" id="track-grid"></div>
    </div>
    <div style="display:flex; flex-direction:column; min-height:0;">
        <div class="mode-box">
            <button class="mode-btn active" id="btn-auto" onclick="setMode('auto')">AUTO</button>
            <button class="mode-btn" id="btn-manual" onclick="setMode('manual')">MANUAL</button>
        </div>
        <div class="big-ball">
            <div id="big-num" style="font-size:60px; font-weight:900;">--</div>
            <div id="ball-letter" style="background:#fb8c00; color:#000; padding:1px 12px; border-radius:10px; font-size:13px; font-weight:bold;">WAIT</div>
        </div>
        <div class="active-cards" id="active-cards"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let selected = [], allCards = [], called = new Set(), isAuto = true;
    let drawInt;

    function init() {
        for(let i=0; i<500; i++) {
            let card = [];
            let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let col=0; col<5; col++) {
                let colNums = [];
                while(colNums.length < 5) {
                    let r = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                    if(!colNums.includes(r)) colNums.push(r);
                }
                card.push(colNums);
            }
            allCards.push(card);
        }

        const grid = document.getElementById('slot-grid');
        for(let i=1; i<=500; i++) {
            let s = document.createElement('div');
            s.className = 'slot'; s.textContent = i;
            s.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(n => n !== i);
                    s.classList.remove('active');
                } else if(selected.length < 2) {
                    selected.push(i);
                    s.classList.add('active');
                    tg.HapticFeedback.impactOccurred('light');
                }
                document.getElementById('sel-count').textContent = selected.length;
            };
            grid.appendChild(s);
        }

        const track = document.getElementById('track-grid');
        for(let r=0; r<15; r++) {
            for(let c=0; c<5; c++) {
                let val = (c * 15) + (r + 1);
                let d = document.createElement('div');
                d.className = 't-num'; d.id = `track-${val}`; d.textContent = val;
                track.appendChild(d);
            }
        }
    }

    function setMode(mode) {
        isAuto = (mode === 'auto');
        document.getElementById('btn-auto').className = isAuto ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-manual').className = !isAuto ? 'mode-btn active' : 'mode-btn';
    }

    function manualStart() {
        if(selected.length === 0) { tg.showAlert("እባክዎ ቢያንስ 1 ካርቴላ ይምረጡ!"); return; }
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('game-view').style.display = 'grid';
        renderActiveCards();
        startGame();
    }

    function renderActiveCards() {
        const container = document.getElementById('active-cards');
        selected.forEach(id => {
            let card = allCards[id-1];
            let html = `<div class="play-card">
                <div style="font-size:9px; color:#fb8c00; margin-bottom:4px; font-weight:bold;">CARTELA #${id}</div>
                <div class="card-header-bingo">
                    <div style="background:#1e88e5">B</div>
                    <div style="background:#8e24aa">I</div>
                    <div style="background:#d81b60">N</div>
                    <div style="background:#00897b">G</div>
                    <div style="background:#fb8c00">O</div>
                </div>
                <div class="card-grid">`;
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(r===2 && c===2) html += `<div class="p-cell hit" style="font-size:16px;">★</div>`;
                    else {
                        let val = card[c][r];
                        html += `<div class="p-cell" id="p-${id}-v-${val}" onclick="manualMark(${id}, ${val})">${val}</div>`;
                    }
                }
            }
            html += `</div></div>`;
            container.innerHTML += html;
        });
    }

    function manualMark(cardId, val) {
        if(!isAuto && called.has(val)) {
            document.getElementById(`p-${cardId}-v-${val}`).classList.add('hit');
            tg.HapticFeedback.impactOccurred('medium');
            checkBingo();
        }
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.rate = 1.1;
        window.speechSynthesis.speak(msg);
    }

    function startGame() {
        drawInt = setInterval(() => {
            if(called.size >= 75) { clearInterval(drawInt); return; }
            let draw;
            do { draw = Math.floor(Math.random() * 75) + 1; } while(called.has(draw));
            called.add(draw);

            let letters = ['B', 'I', 'N', 'G', 'O'];
            let letter = letters[Math.floor((draw-1)/15)];
            
            document.getElementById('big-num').textContent = draw;
            document.getElementById('ball-letter').textContent = letter + "-" + draw;
            document.getElementById('called-count').textContent = called.size;
            document.getElementById(`track-${draw}`).classList.add('on');
            
            speak(letter + " " + draw);

            if(isAuto) {
                selected.forEach(id => {
                    let el = document.getElementById(`p-${id}-v-${draw}`);
                    if(el) el.classList.add('hit');
                });
                checkBingo();
            }
        }, 3000);
    }

    function checkBingo() {
        const lines = [
            [[0,0],[0,1],[0,2],[0,3],[0,4]], [[1,0],[1,1],[1,2],[1,3],[1,4]], [[2,0],[2,1],[2,2],[2,3],[2,4]], [[3,0],[3,1],[3,2],[3,3],[4,4]], [[4,0],[4,1],[4,2],[4,3],[4,4]],
            [[0,0],[1,0],[2,0],[3,0],[4,0]], [[0,1],[1,1],[2,1],[3,1],[4,1]], [[0,2],[1,2],[2,2],[3,2],[4,2]], [[0,3],[1,3],[2,3],[3,3],[4,3]], [[0,4],[1,4],[2,4],[3,4],[4,4]],
            [[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]
        ];
        selected.forEach(id => {
            let card = allCards[id-1];
            lines.forEach(line => {
                if(line.every(pos => (pos[0]===2 && pos[1]===2) || document.getElementById(`p-${id}-v-${card[pos[1]][pos[0]]}`)?.classList.contains('hit'))) {
                    clearInterval(drawInt);
                    document.getElementById('win-overlay').style.display = 'flex';
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => location.reload(), 7000);
                }
            });
        });
    }

    init();
</script>
</body>
</html>
