<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO STABLE</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            }, (error) => console.log("Network Slow... Waiting..."));
        };
    </script>
    <style>
        :root { --bg: #0b141a; --neon: #00ffcc; --orange: #ff7e21; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .grid-layout { display: grid; grid-template-columns: 80px 1fr; gap: 10px; height: 90vh; }
        .side-nums { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #111b21; padding: 5px; border-radius: 8px; overflow-y: auto; }
        .dot { font-size: 9px; background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #3a4d5e; border: 0.5px solid #253341; }
        .dot.active { background: var(--orange); color: white; border-color: var(--orange); }
        .ball-box { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .current-num { font-size: 60px; font-weight: bold; color: var(--neon); }
        .card { background: #16212a; padding: 8px; border-radius: 10px; border: 1px solid #253341; margin-bottom: 10px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; color: #788da1; }
        .cell.hit { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body onload="startSystem()">

    <div style="display:flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px;">
        <div>SLOTS: <span style="color:var(--neon)">19, 108</span></div>
        <div id="status" style="color:var(--orange)">CONNECTING...</div>
    </div>

    <div class="grid-layout">
        <div class="side-nums" id="side-board"></div>
        <div style="overflow-y:auto;">
            <div class="ball-box">
                <div class="current-num" id="big-ball">--</div>
                <div style="font-size:10px; color:var(--neon)">CURRENT BALL</div>
            </div>
            <div id="cards-container"></div>
        </div>
    </div>

    <script>
        const mySlots = [19, 108]; 
        let history = [];

        async function startSystem() {
            const sb = document.getElementById('side-board');
            for(let i=1; i<=75; i++) sb.innerHTML += `<div class="dot" id="d-${i}">${i}</div>`;

            const cc = document.getElementById('cards-container');
            mySlots.forEach(id => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                let h = `<div class="card"><div class="c-grid">`;
                nums.forEach((n, idx) => h += `<div class="cell" id="c-${id}-${n}">${idx==12?'★':n}</div>`);
                cc.innerHTML += h + `</div></div>`;
            });

            // Firebase Listen (ሁልጊዜ ከዳታቤዝ ጋር እንዲገናኝ)
            window.listenToGame(data => {
                updateUI(data.ball, data.history);
            });

            // እጣ ማውጫውን አስጀምር
            runDraw();
        }

        function updateUI(ball, hist) {
            if(!ball) return;
            document.getElementById('status').innerText = "LIVE DRAW";
            document.getElementById('big-ball').innerText = ball;
            hist.forEach(n => {
                document.getElementById(`d-${n}`)?.classList.add('active');
                mySlots.forEach(id => {
                    document.getElementById(`c-${id}-${n}`)?.classList.add('hit');
                });
            });
        }

        async function runDraw() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            
            for (let b of pool) {
                history.push(b);
                // በአካባቢው (Local) ያሳያል
                updateUI(b, history);
                
                // ዳታቤዝ ላይ ለመጻፍ ይሞክራል፣ ካልተሳካ ግን ጨዋታውን አያቋርጥም
                try {
                    await setDoc(doc(window.db, "live_bingo", "current"), { 
                        ball: b, 
                        history: history 
                    }, { merge: true });
                } catch(e) {
                    console.log("Sync delayed..."); 
                }
                await new Promise(r => setTimeout(r, 4000));
            }
        }
    </script>
</body>
</html>
