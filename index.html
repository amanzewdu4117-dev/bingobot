<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobe Bingo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --hit: #ef4444;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page { width: 100%; max-width: 500px; display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        .hidden { display: none !important; }
        
        /* 📊 HEADER & INFO CARD */
        .status-bar {
            background: var(--surface);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
        }
        .orange { color: #f97316; }

        /* 🎰 BINGO SLOTS GRID (1-500) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            max-height: 350px;
            overflow-y: auto;
            background: var(--surface);
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .slot-btn {
            background: #334155;
            padding: 10px 2px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .slot-btn.selected { background: #16a34a; font-weight: bold; }
        .slot-btn.occupied { background: #dc2626; opacity: 0.6; cursor: not-allowed; }

        /* 🎴 PLAYER ACTIVE CARDS */
        .cards-area { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .active-card { background: var(--surface); padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-header-grid { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: 900; font-size: 18px; margin-bottom: 8px; }
        .card-cell { background: #334155; padding: 10px 0; text-align: center; border-radius: 4px; font-weight: bold; }
        .card-cell.hit { background: var(--hit); color: white; animation: pulse 0.3s ease; }

        /* 🔴 MAIN BOARD CELL DESIGN */
        .board-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: var(--surface); padding: 8px; border-radius: 8px; }
        .num-cell { background: #334155; text-align: center; padding: 6px 0; font-size: 12px; border-radius: 4px; }
        .num-cell.called { background: #16a34a; font-weight: bold; }

        /* 🔍 INPUT */
        input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--surface); color: white; box-sizing: border-box; }
        
        /* 🏆 OVERLAY */
        #winner-overlay, #countdown-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; font-size: 24px; text-align: center;
        }
        
/* 🎴 የካርቴላዎች መያዣ ቦክስ - አንዱ ከሌላው በታች (Flex Column) እንዲሆን */
.cards-flex-row {
    display: flex;
    flex-direction: column; /* ወደ ታች እንዲደረደሩ */
    gap: 15px; /* በካርቴላዎች መካከል ያለው ክፍተት */
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
}

/* እያንዳንዱ ካርቴላ በስክሪኑ ስፋት ልክ እንዲሆን (መጠኑ ሳይጨፈለቅ) */
.bingo-card {
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 12px;
    padding: 10px;
    width: 100%; /* ሙሉ ስክሪኑን እንዲይዝ */
    max-width: 360px; /* ከስልኩ ስክሪን እንዳይበልጥ */
    margin: 0 auto; /* መሃል ላይ እንዲሆን */
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    box-sizing: border-box;
}

/* የ B I N G O ፊደላት ረድፍ */
.card-header-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    color: #e2e8f0;
    margin-bottom: 6px;
}

/* የ 5x5 ማትሪክስ ሳጥኖች */
.card-grid-5x5 {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 5px; /* በሳጥኖቹ መካከል ያለው ርቀት */
}

/* የሳጥኖቹ መጠን (በደንብ የሚታይና ሰፊ) */
.card-cell {
    background: #334155;
    color: white;
    text-align: center;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 0; /* ለመንካት እንዲመች ሰፊ ቁመት */
    border-radius: 6px;
}

/* የወጣ ቁጥር ሲመታ (Hit) ቀይ የሚሆነው */
.card-cell.hit {
    background: #ef4444 !important;
    color: white !important;
    box-shadow: 0 0 6px #ef4444;
}

/* የ FREE ሳጥን ማስተካከያ */
.card-cell.free-cell {
    background: #ea580c;
    font-size: 12px;
    padding: 11px 0;
}

.page-content {
    display: none; /* በነባሪ ሁሉም ገጾች ድብቅ ይሁኑ */
}
.page-content.active {
    display: block; /* "active" ክላስ ያለው ብቻ ይታይ */
}

    </style>
</head>
<body>

    <div class="status-bar" style="max-width: 500px; margin-bottom: 10px;">
        <div>👤 <span id="player-name">ተጫዋች</span></div>
        <div>💰 <span id="balance">100.00</span> ETB</div>
        <div>⏳ ሰዓት: <span id="timer" class="orange">0</span>s</div>
    </div>

    <div id="selection-page" class="page active">
        <input type="number" id="searchCard" placeholder="🔍 የካርቴላ ቁጥር ይፈልጉ (1-500)...">
        
        <div class="status-bar">
            <div>የተመረጡ: <span id="total-count" class="orange">0</span>/3</div>
            <div>ሽልማት: <span id="live-prize" style="color:#16a34a;">0.00</span> 🎯</div>
        </div>

        <div class="grid-container" id="slots-grid"></div>
        <div id="selection-preview" style="display:flex; gap:10px; overflow-x:auto; width:100%;"></div>
    </div>
    
    <div id="landing-page" class="page-content active">
    <div style="text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh;">
        
        <div style="font-size: 80px; color: #fbbf24; margin-bottom: 10px;">⚡</div>
        
        <h1 style="color: white; font-size: 32px; font-weight: bold; margin: 0;">JOBE BINGO</h1>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 40px;">THE CHAMPIONS' PROTOCOL</p>

        <div style="background: #1e293b; border: 2px solid #334155; border-radius: 15px; padding: 20px 40px; margin-bottom: 20px; width: 80%;">
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 5px;">BET</div>
            <div style="color: #fbbf24; font-size: 24px; font-weight: bold;">10 ETB</div>
        </div>

        <div style="display: flex; align-items: center; gap: 10px; color: #94a3b8; margin-bottom: 40px;">
            <span>👥</span>
            <span>50K+ ACTIVE</span>
        </div>

        <button onclick="goToGame()" style="background: linear-gradient(to bottom, #fbbf24, #f59e0b); border: none; padding: 20px 80px; border-radius: 15px; font-size: 20px; font-weight: bold; color: #000; cursor: pointer;">
    ▶ PLAY
</button>
    
    <div id="game-page" class="page-content">
    
    <div class="game-header" style="background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="ball-box">ወጣ፦ <span id="ball-num">--</span></div>
            <div id="timer" style="font-size: 20px; font-weight: bold; color: #f97316;">20s</div>
        </div>
    </div>

    <div class="main-board-container" style="margin-bottom: 20px;">
        <h3 style="text-align: center; color: white;">🎯 ዋና ሰሌዳ (Main Board)</h3>
        <div id="main-board" class="board-grid"></div>
    </div>

    <div class="player-cards-container">
        <h3 style="text-align: center; color: #4ade80;">🎴 የተመረጡ ካርቴላዎች</h3>
        <div id="player-cards" class="cards-vertical-stack"></div>
    </div>

</div>

        <div class="cards-area" id="player-area"></div>
        
        <h4 style="margin: 5px 0;">🎯 የቢንጎ ዋና ሰሌዳ (Main Board)</h4>
        <div class="board-grid" id="main-board"></div>
    </div>

    <div id="winner-overlay">
        <div style="font-size: 50px;">🎉🏆🎉</div>
        <h2 style="color:#16a34a; margin:10px 0;">ቢንጎ! ቢንጎ!</h2>
        <p id="winner-text" style="padding:0 20px;"></p>
    </div>

    <script>
        // ==========================================
        // 1. FIREBASE & CORE VARIABLES
        // ==========================================
        const firebaseConfig = { databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user?.first_name || "ተጫዋች";
        document.getElementById('player-name').innerText = tgUser;

        let userCards = [];
        let cardData = {};
        let currentBalance = 100.00;
        let allSelected = {};
        let gameActive = false;
        let calledNumbers = new Set();
        let countdownInterval = null;

  
        // ቆጣሪውን የሚያሳይበት ቦታ ብቻ ነው የምንቀይረው
function startCountdown(seconds) {
    clearInterval(countdownInterval);
    const timerElement = document.getElementById('timer');
    if (!timerElement) return; // ቆጣሪው ካልተገኘ አይቀጥልም

    let count = seconds;
    timerElement.innerText = count + "s";
    
    countdownInterval = setInterval(() => {
        count--;
        timerElement.innerText = count + "s";
        if (count <= 0) clearInterval(countdownInterval);
    }, 1000);
}

function goToGame() {
    // 1. መጀመሪያ Landing Page ን ድብቅ አድርገው
    const landingPage = document.getElementById('landing-page');
    if (landingPage) {
        landingPage.style.display = 'none';
        landingPage.classList.remove('active');
    }

    // 2. የጨዋታውን ገጽ (Game Page) አሳይ
    const gamePage = document.getElementById('game-page');
    if (gamePage) {
        gamePage.style.display = 'block'; // ወይም 'flex' እንደ ዲዛይንህ
        gamePage.classList.add('active');
    }
}
        // ==========================================
        // 3. 🔄 FIREBASE REALTIME SYNC (ዋናው ማገናኛ)
       // ==========================================
       
        db.ref('liveGame').on('value', snap => {
            const data = snap.val();
            if (!data) return;

            // የወጡ ቁጥሮችን መጫን
            calledNumbers.clear();
            if (data.history) { 
                // ታሪክ በ Array ወይም በ Python በኩል የመጣ መሆኑን ቼክ ማድረግ
                if (Array.isArray(data.history)) {
                    data.history.forEach(num => calledNumbers.add(num)); 
                } else if (typeof data.history === 'object') {
                    Object.values(data.history).forEach(num => calledNumbers.add(num));
                }
            }

            allSelected = data.selectedCards || {};

            // የካርድ ብዛት እና የሽልማት ስሌት
            const totalCards = Object.keys(allSelected).length;
            document.getElementById('total-count').innerText = totalCards;
            const totalPool = totalCards * 10;
            document.getElementById('live-prize').innerText = (totalPool - (totalPool * 0.15)).toFixed(2);

            const userId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id || "guest_user";

            // 🔄 ዙር 1፦ ካርድ መምረጫ ሰዓት (WAITING STATUS)
            if (data.status === "waiting") {
                gameActive = false;
                document.getElementById('ball-num').innerText = "--";
                document.getElementById('ball-let').innerText = "-";
                
                document.getElementById('game-page').classList.remove('active');
                document.getElementById('selection-page').classList.add('active');

                // ሰሌዳውን ነጭ ማድረግ (Reset main board highlight)
                document.querySelectorAll('.num-cell').forEach(c => c.classList.remove('called'));

                // የሰዓት አቆጣጠር
                if (data.timerStartTime) {
                    const elapsed = Math.floor((Date.now() - data.timerStartTime) / 1000);
                    let remaining = (data.duration || 40) - elapsed;
                    if (remaining < 0) remaining = 0;

                    const curDisp = parseInt(document.getElementById('timer')?.innerText || "0");
                    if (!countdownInterval || Math.abs(curDisp - remaining) > 2) {
                        startCountdown(remaining);
                    }
                }
                renderGrid();
                return;
            }

            // 🎮 ዙር 2፦ ጨዋታው ሲጀመር (STARTED STATUS)
            if (data.status === "started") {
                // 🔥 ቁልፍ ማስተካከያ፦ ተጫዋቹ የመረጣቸውን ካርዶች ከFirebase ላይ መልሶ መጫን
                userCards = [];
                Object.keys(allSelected).forEach(cardKey => {
                    const card = allSelected[cardKey];
                    if (card && String(card.userId) === String(userId)) {
                        const cardId = parseInt(cardKey.replace('c', ''));
                        if (!userCards.includes(cardId)) {
                            userCards.push(cardId);
                        }
                        cardData[cardId] = card.numbers; // የካርዱን 5x5 ማትሪክስ ቁጥሮች መጫን
                    }
                });

                if (!gameActive) {
                    gameActive = true;
                    document.getElementById('selection-page').classList.remove('active');
                    document.getElementById('game-page').classList.add('active');
                }

                // አዲስ ቁጥር ሲመጣ ብቻ ቆጣሪውን ከ 20 ማስጀመር
                if (data.timerStartTime) {
                    const elapsed = Math.floor((Date.now() - data.timerStartTime) / 1000);
                    let remaining = (data.duration || 20) - elapsed;
                    if (remaining < 0) remaining = 0;
                    
                    const curDisp = parseInt(document.getElementById('timer')?.innerText || "0");
                    if (!countdownInterval || Math.abs(curDisp - remaining) > 2) {
                        startCountdown(remaining);
                    }
                }
                
                renderPlayerCards(); // ካርዶቹን ከዋናው ሰሌዳ በታች መደርደርያ
            }

            // ዋናውን የ 75 ሰሌዳ ማድመቂያ
            for (let i = 1; i <= 75; i++) {
                const cell = document.getElementById('num-' + i);
                if (cell) {
                    if (calledNumbers.has(i)) {
                        cell.classList.add('called');
                    } else {
                        cell.classList.remove('called');
                    }
                }
            }

            if (data.currentNumber) {
                document.getElementById('ball-num').innerText = data.currentNumber;
                let n = data.currentNumber;
                document.getElementById('ball-let').innerText = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
            }

            if (data.winner) {
                showWinner(data.winner);
            }
        });
        

        // ==========================================
        // 4. CARD GENERATION & RENDERING
        // ==========================================
        function generateCard() {
            let card = [];
            let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let c=0; c<5; c++) {
                let col = [];
                while(col.length < 5) {
                    let n = Math.floor(Math.random()*15) + ranges[c][0];
                    if(!col.includes(n)) col.push(n);
                }
                card.push(col.sort((a,b)=>a-b));
            }
            return card;
        }

        function renderGrid() {
            const grid = document.getElementById('slots-grid');
            if (!grid) return;
            grid.innerHTML = "";

            for(let i=1; i<=500; i++) {
                let b = document.createElement('div');
                b.className = 'slot-btn';
                b.id = `cartela-${i}`;
                let cardKey = 'c' + i;

                if (allSelected[cardKey]) {
                    b.innerHTML = `<div class="card-number">${i}</div><div style="font-size:9px;color:#cbd5e1;">🔴 Occupied</div>`;
                    if (!userCards.includes(i)) b.classList.add('occupied');
                } else {
                    b.innerHTML = `<div class="card-number">${i}</div>`;
                }

                if (userCards.includes(i)) {
                    b.classList.add('selected');
                    b.innerHTML = `<div class="card-number">${i}</div><div style="font-size:9px;color:white;">🟢 ያንተ</div>`;
                }

                b.onclick = () => { if (!gameActive && !b.classList.contains('occupied')) selectCard(i); };
                grid.appendChild(b);
            }
        }

        function selectCard(i) {
            const userId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id || "guest_user";
            let cardKey = 'c' + i;

            if (userCards.includes(i)) {
                userCards = userCards.filter(x => x !== i);
                delete cardData[i];
                currentBalance += 10;
                db.ref('users/' + userId + '/balance').set(currentBalance);
                db.ref('liveGame/selectedCards/' + cardKey).remove();
            } else {
                if (userCards.length >= 3) { alert("ከ 3 ካርድ በላይ አይፈቀድም!"); return; }
                if (currentBalance < 10) { alert("በቂ ሂሳብ የሎትም!"); return; }

                userCards.push(i);
                const newCard = generateCard();
                cardData[i] = newCard;
                currentBalance -= 10;
                db.ref('users/' + userId + '/balance').set(currentBalance);
                db.ref('liveGame/selectedCards/' + cardKey).set({
                    id: i, playerName: tgUser, userId: userId, numbers: newCard
                });
            }
            save();
            renderGrid();
            renderPlayerCards();
        }

        function renderPlayerCards() {
    const container = document.getElementById('player-cards');
    if (!container) return;
    container.innerHTML = '';

    if (userCards.length === 0) {
        container.innerHTML = '<div style="color:#94a3b8; text-align:center; width:100%; font-size:14px; padding:20px;">ምንም የተመረጠ ካርድ የለም!</div>';
        return;
    }

    userCards.forEach(cardId => {
        const matrix = cardData[cardId];
        if (!matrix) return;

        const cardDiv = document.createElement('div');
        cardDiv.className = 'bingo-card';

        // ርዕስ (ለምሳሌ፦ 🎴 ካርቴላ #1)
        const title = document.createElement('div');
        title.style = 'text-align:center; color:#38bdf8; font-size:13px; font-weight:bold; margin-bottom:6px;';
        title.innerText = `🎴 ካርቴላ #${cardId}`;
        cardDiv.appendChild(title);

        // B I N G O
        const headerRow = document.createElement('div');
        headerRow.className = 'card-header-row';
        ['B','I','N','G','O'].forEach(letter => {
            const letterDiv = document.createElement('div');
            letterDiv.innerText = letter;
            headerRow.appendChild(letterDiv);
        });
        cardDiv.appendChild(headerRow);

        // 5x5 Grid
        const gridDiv = document.createElement('div');
        gridDiv.className = 'card-grid-5x5';

        matrix.forEach(row => {
            row.forEach(num => {
                const cell = document.createElement('div');
                
                if (num === "FREE") {
                    cell.className = 'card-cell free-cell';
                    cell.innerText = "FREE";
                } else {
                    cell.className = 'card-cell';
                    cell.innerText = num;
                    
                    if (calledNumbers.has(parseInt(num))) {
                        cell.classList.add('hit');
                    }
                }
                gridDiv.appendChild(cell);
            });
        });

        cardDiv.appendChild(gridDiv);
        container.appendChild(cardDiv);
    });
}

        function applyNumber(n) {
            document.getElementById('ball-num').innerText = n;
            document.getElementById('ball-let').innerText = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
            const cell = document.getElementById('num-' + n);
            if (cell) cell.classList.add('called');
            renderPlayerCards();
        }

        function showWinner(wName) {
            gameActive = false;
            const overlay = document.getElementById('winner-overlay');
            document.getElementById('winner-text').innerHTML = `አሸናፊ፦ <b>${wName}</b> 🥳`;
            if (overlay) {
                overlay.style.display = "flex";
                setTimeout(() => { overlay.style.display = "none"; }, 6000);
            }
        }

        function save() {
            localStorage.setItem('aman_cards', JSON.stringify(userCards));
            localStorage.setItem('aman_data', JSON.stringify(cardData));
        }

        // ==========================================
        // 5. INITIALIZATION ON LOAD
        // ==========================================
        window.onload = () => {
            const userId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id || "guest_user";
            db.ref('users/' + userId + '/balance').on('value', snap => {
                currentBalance = snap.exists() ? parseFloat(snap.val()) : 100.00;
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
            });

            // 75 ዋና የቢንጎ ሰሌዳ መፍጠሪያ
            const mBoard = document.getElementById('main-board');
            if (mBoard) {
                for(let i=1; i<=75; i++) {
                    let c = document.createElement('div');
                    c.className = 'num-cell';
                    c.id = 'num-' + i;
                    c.innerText = i;
                    mBoard.appendChild(c);
                }
            }
            renderGrid();
        };

        // 🔍 SEARCH FILTER
        document.getElementById('searchCard').oninput = function() {
            let val = parseInt(this.value);
            if (val >= 1 && val <= 500) {
                const target = document.getElementById(`cartela-${val}`);
                if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
            }
        };
    </script>
</body>
</html>
