<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jobe Bingo - All-in-One</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-dark: #050a0f; --panel-bg: #0d161f; --accent: #00ffcc;
            --orange: #ff9d00; --text-gray: #7d8b99;
            --b-clr: #00d2ff; --i-clr: #9d50bb; --n-clr: #f0003c; --g-clr: #00f260; --o-clr: #ff9d00;
        }

        body { 
            background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
        }

        /* ገጾችን ለመቀያየር */
        .screen { display: none; height: 100vh; width: 100vw; position: absolute; }
        .active-screen { display: block !important; }

        /* --- Dashboard (አንተ የፈለግኸው መጀመሪያ የሚመጣ ገጽ) --- */
        .menu-header { text-align: center; padding: 30px 15px; background: linear-gradient(to bottom, #0d161f, #050a0f); }
        .balance-card { background: #15222e; margin: 15px 30px; padding: 15px; border-radius: 15px; border: 1px solid rgba(0,255,204,0.2); text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; overflow-y: auto; height: calc(100vh - 250px); }
        
        .menu-btn { 
            background: var(--panel-bg); border: 1px solid #1a2a38; color: white; 
            padding: 15px 5px; border-radius: 12px; font-size: 13px; font-weight: bold; 
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: 0.2s;
        }
        .menu-btn:active { transform: scale(0.95); background: rgba(0, 255, 204, 0.1); }
        .btn-icon { font-size: 24px; }

        /* --- Bingo UI (ጨዋታው) --- */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; }
        .stat-card { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); padding: 5px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 8px; color: var(--text-gray); }
        .stat-value { font-size: 12px; font-weight: bold; color: var(--accent); }
        
        .slots-container { height: calc(100vh - 280px); overflow-y: auto; padding: 10px; }
        .slots-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; background: var(--panel-bg); padding: 10px; border-radius: 15px; }
        .slot { aspect-ratio: 1; background: #15222e; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #4e6a85; border: 1px solid #1f3344; }
        .slot.selected { background: rgba(0, 255, 204, 0.2); color: var(--accent); border: 1px solid var(--accent); }

        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #03070a; padding: 10px; border-top: 1px solid #1a2a38; display: flex; gap: 10px; overflow-x: auto; }
        .mini-card { width: 100px; flex-shrink: 0; background: #0b141d; padding: 5px; border-radius: 8px; border: 1px solid #1e2d3a; font-size: 8px; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #f0003c; color: #fff; padding: 10px 20px; border-radius: 20px; z-index: 1000; display: none; }
    </style>
</head>
<body>

    <div id="toast">በቂ የገንዘብ መጠን የለዎትም!</div>

    <div id="dash-screen" class="screen active-screen">
        <div class="menu-header">
            <h2 id="u-name" style="margin: 0; color: var(--accent);">Loading...</h2>
            <p style="font-size: 11px; color: var(--text-gray);">እንኳን ወደ ጆቤ ቢንጎ በደህና መጡ!</p>
        </div>
        
        <div class="balance-card">
            <div style="font-size: 10px; color: var(--text-gray);">የአሁኑ ቀሪ ሂሳብ</div>
            <div style="font-size: 28px; font-weight: 900; color: var(--accent);"><span id="main-wallet">0.00</span> ETB</div>
        </div>

        <div class="menu-grid">
            <button class="menu-btn" onclick="openGame()"><span class="btn-icon">🕹️</span> Play</button>
            <button class="menu-btn" onclick="showMsg('Deposit')"><span class="btn-icon">💰</span> Deposit</button>
            <button class="menu-btn" onclick="showMsg('Balance')"><span class="btn-icon">💳</span> Balance</button>
            <button class="menu-btn" onclick="showMsg('Withdrawal')"><span class="btn-icon">💸</span> Withdrawal</button>
            <button class="menu-btn" onclick="showMsg('Invite')"><span class="btn-icon">🔗</span> Invite</button>
            <button class="menu-btn" onclick="showMsg('Instruction')"><span class="btn-icon">📖</span> Instruction</button>
            <button class="menu-btn" onclick="showMsg('Support')"><span class="btn-icon">🆘</span> Support</button>
            <button class="menu-btn" onclick="tele.close()"><span class="btn-icon">❌</span> Exit</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div style="padding: 10px; display: flex; align-items: center; gap: 10px;">
            <button onclick="goHome()" style="background:none; border:none; color:white; font-size:20px;">←</button>
            <div style="font-size: 14px; font-weight: bold;">ካርቴላ ይምረጡ</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-label">Wallet</div><div id="lob-wallet" class="stat-value">0.00</div></div>
            <div class="stat-card"><div class="stat-label">Selected</div><div id="sel-count" class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">Cost</div><div id="total-cost" class="stat-value">0</div></div>
            <div class="stat-card" style="border-color:var(--orange)"><div class="stat-label">Time</div><div id="timer" class="stat-value">15s</div></div>
        </div>
        <div class="slots-container"><div id="slots-box" class="slots-grid"></div></div>
        <div class="footer-nav" id="preview-box"></div>
    </div>

<script>
    // --- 1. Firebase Config (ከምስልህ የተወሰደ) ---
    const firebaseConfig = {
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g",
        authDomain: "my-app-project-1e0bb.firebaseapp.com",
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com",
        projectId: "my-app-project-1e0bb",
        storageBucket: "my-app-project-1e0bb.firebasestorage.app",
        messagingSenderId: "280130045202",
        appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. Telegram Integration ---
    const tele = window.Telegram.WebApp;
    tele.ready();
    const user = tele.initDataUnsafe.user || { id: "test_user", first_name: "Amanuel" };
    document.getElementById('u-name').innerText = user.first_name;

    let wallet = 0;
    let selected = [];
    const price = 10;

    // ብርን ከዳታቤዝ መጫን
    db.ref('users/' + user.id).on('value', (snap) => {
        const data = snap.val();
        wallet = data ? data.balance : 500.00; // አዲስ ተጠቃሚ ከሆነ 500 ቦነስ
        if(!data) db.ref('users/' + user.id).set({ name: user.first_name, balance: wallet });
        updateUI();
    });

    function updateUI() {
        document.getElementById('main-wallet').innerText = wallet.toFixed(2);
        document.getElementById('lob-wallet').innerText = wallet.toFixed(2);
    }

    // --- 3. Navigation ---
    function openGame() {
        document.getElementById('dash-screen').classList.remove('active-screen');
        document.getElementById('lobby-screen').classList.add('active-screen');
        initSlots();
    }
    function goHome() {
        document.getElementById('lobby-screen').classList.remove('active-screen');
        document.getElementById('dash-screen').classList.add('active-screen');
    }
    function showMsg(type) {
        alert(type + " አማራጭ በቅርቡ ይከፈታል!");
    }

    // --- 4. Bingo Logic ---
    function initSlots() {
        const box = document.getElementById('slots-box');
        box.innerHTML = '';
        for(let i=1; i<=100; i++) {
            let s = document.createElement('div');
            s.className = 'slot' + (selected.includes(i) ? ' selected' : '');
            s.innerText = i;
            s.onclick = () => toggleSlot(i);
            box.appendChild(s);
        }
    }

    function toggleSlot(id) {
        if(selected.includes(id)) {
            selected = selected.filter(x => x !== id);
            db.ref('users/' + user.id).update({ balance: wallet + price });
        } else {
            if(wallet >= price && selected.length < 3) {
                selected.push(id);
                db.ref('users/' + user.id).update({ balance: wallet - price });
            } else if(wallet < price) {
                showToast();
            }
        }
        document.getElementById('sel-count').innerText = selected.length;
        document.getElementById('total-cost').innerText = selected.length * price;
        initSlots();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
</script>
</body>
</html>
