<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO PRO - FULL SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        // የጨዋታውን ሂደት ከዳታቤዝ ማዳመጥ
        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --dark-text: #788da1; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Header UI */
        .header-box { display: flex; justify-content: space-around; padding: 12px; background: #0a1117; border-bottom: 1px solid #1c2b3a; gap: 8px; }
        .stat { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 12px; text-align: center; flex: 1; border: 1px solid #1c2b3a; }
        .stat label { display: block; font-size: 8px; color: var(--dark-text); text-transform: uppercase; margin-bottom: 3px; }
        .stat span { font-size: 13px; font-weight: bold; color: var(--neon); }

        /* Slot Selection */
        #slot-screen { display: flex; flex-direction: column; height: 100vh; }
        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 12px; overflow-y: auto; flex-grow: 1; }
        .slot { background: #1a252f; aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid #253341; cursor: pointer; color: #7a8a9a; }
        .slot.selected { border-color: var(--orange); background: rgba(255, 126, 33, 0.2); color: white; }

        /* Game UI Layout */
        #game-ui { display: none; height: 100vh; flex-direction: column; }
        .game-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; padding: 10px; flex-grow: 1; overflow: hidden; }
        
        /* Left Board */
        .board-side { background: var(--panel); border-radius: 15px; padding: 8px; border: 1px solid #1c2b3a; overflow-y: auto; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .b-num { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 4px; color: #5c7894; }
        .b-num.active { background: var(--orange); color: white; box-shadow: 0 0 5px var(--orange); }

        /* Right Play Area */
        .play-side { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .ball-display { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; }
        .ball-val { font-size: 50px; font-weight: 900; color: var(--neon); }
        
        .cartela { background: #16212a; padding: 10px; border-radius: 12px; border: 1px solid #253341; margin-bottom: 10px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 4px; color: white; }
        .c-cell.marked { background: var(--neon); color: black; font-weight: bold; }

        #bingo-msg { position: fixed; inset: 0; background: rgba(0,255,204,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; }
    </style>
</head>
<body onload="initApp()">

    <div id="bingo-msg">BINGO!</div>

    <div id="slot-screen">
        <div class="header-box">
            <div class="stat"><label>PLAYER</label><span>@User</span></div>
            <div class="stat"><label>SELECTED</label><span id="sel-count">0 / 2</span></div>
            <div class="stat"><label>TIME</label><span id="timer">00:15</span></div>
        </div>
        <div class="slot-grid" id="slot-container"></div>
    </div>

    <div id="game-ui">
        <div class="header-box">
            <div class="stat"><label>MY SLOTS</label><span id="ui-my-slots">--</span></div>
            <div class="stat"><label>CALLED</label><span id="ui-called">0</span></div>
            <div class="stat"><label>STATUS</label><span style="color:var(--orange)">LIVE</span></div>
        </div>
        <div class="game-layout">
            <div class="board-side">
                <div id="main-board" class="bingo-board"></div>
            </div>
            <div class="play-side">
                <div class="ball-display">
                    <div class="ball-val" id="big-ball">--</div>
                    <div style="font-size:9px; color:var(--neon); letter-spacing:2px;">CURRENT BALL</div>
                </div>
                <div id="cards-holder"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedSlots = [];
        let cardNumbers = {};
        let allDrawnBalls = [];
        let gameActive = false;

        function initApp() {
            const grid = document.getElementById('slot-container');
            for(let i=1; i<=120; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.id = `s-${i}`;
                div.innerText = i;
                div.onclick = () => toggleSlot(i);
                grid.appendChild(div);
            }
            startTimer();
        }

        function toggleSlot(n) {
            let el = document.getElementById(`s-${n}`);
            if(selectedSlots.includes(n)) {
                selectedSlots = selectedSlots.filter(x => x !== n);
                el.classList.remove('selected');
            } else if(selectedSlots.length < 2) {
                selectedSlots.push(n);
                el.classList.add('selected');
            }
            document.getElementById('sel-count').innerText = `${selectedSlots.length} / 2`;
        }

        function startTimer() {
            let sec = 15;
            let itv = setInterval(() => {
                sec--;
                document.getElementById('timer').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
                if(sec <= 0) {
                    clearInterval(itv);
                    if(selectedSlots.length > 0) launchGame();
                }
            }, 1000);
        }

        function launchGame() {
            gameActive = true;
            document.getElementById('slot-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            document.getElementById('ui-my-slots').innerText = selectedSlots.join(", ");

            // ሰሌዳውን መሥራት
            const board = document.getElementById('main-board');
            for(let i=1; i<=75; i++) board.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            // ካርቴላዎችን ማዘጋጀት
            const holder = document.getElementById('cards-holder');
            selectedSlots.forEach(slot => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                cardNumbers[slot] = nums;
                let html = `<div class="cartela"><div style="color:var(--neon); font-size:10px; margin-bottom:5px;">CARTELA ${slot}</div><div class="c-grid">`;
                nums.forEach((v, idx) => {
                    if(idx === 12) html += `<div class="c-cell marked">★</div>`;
                    else html += `<div class="c-cell" id="c-${slot}-${v}">${v}</div>`;
                });
                holder.innerHTML += html + `</div></div>`;
            });

            // ዳታቤዝ ማዳመጥ
            window.listenToGame((data) => {
                if(data.ball) {
                    allDrawnBalls = data.history || [];
                    updateUI(data.ball);
                }
            });

            startSimulation(); // ኳሶችን ማውጣት ይጀምራል
        }

        function updateUI(ball) {
            document.getElementById('big-ball').innerText = ball;
            document.getElementById('ui-called').innerText = allDrawnBalls.length;
            
            // ሰሌዳው ላይ ማርክ ማድረግ
            document.getElementById(`bn-${ball}`)?.classList.add('active');

            // በካርቴላዎች ላይ አውቶማቲክ ማርክ ማድረግ
            selectedSlots.forEach(slot => {
                let cell = document.getElementById(`c-${slot}-${ball}`);
                if(cell) {
                    cell.classList.add('marked');
                    checkBingo(slot);
                }
            });
        }

        function checkBingo(slot) {
            let hits = cardNumbers[slot].filter(n => allDrawnBalls.includes(n));
            if(hits.length >= 24) { // ኮከቧን ሳይጨምር 24 ቁጥሮች
                document.getElementById('bingo-msg').style.display = 'flex';
            }
        }

        // ኳሶችን በቅደም ተከተል የሚያወጣ ሲሙሌተር
        function startSimulation() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let history = [];
            let i = 0;
            let sim = setInterval(() => {
                if(i >= pool.length) return clearInterval(sim);
                let ball = pool[i];
                history.push(ball);
                setDoc(doc(window.db, "live_bingo", "current"), { ball: ball, history: history });
                i++;
            }, 3000); // በየ 3 ሰከንዱ አዲስ ኳስ
        }
    </script>
</body>
</html>
