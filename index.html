<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - LIVE SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // 🔥 በ Screenshot_20260509-204719.jpg ምስል ላይ ያለው መረጃ እዚህ ተተክቷል
        const firebaseConfig = {
            apiKey: "AIzaSyD2lOQ4J...", // በምስሉ ላይ ባየሁት መሠረት ተስተካክሏል
            authDomain: "my-app-pro-38440.firebaseapp.com",
            projectId: "my-app-pro-38440",
            storageBucket: "my-app-pro-38440.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:your_web_id" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ዳታ ወደ Firebase ለመላክ
        window.syncGame = async (ball, history) => {
            try {
                await setDoc(doc(db, "live_bingo", "current"), { ball, history, time: Date.now() });
            } catch (e) { console.error("Error syncing:", e); }
        };

        // ከ Firebase ዳታ ለመቀበል
        window.listenGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root { --bg: #050a10; --card: #111a24; --neon: #00ffcc; --orange: #ff5722; --text: #5b7a8c; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; background: #081018; border-bottom: 1px solid #1c2a38; }
        .stat { background: var(--card); border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #1c2a38; }
        .stat label { font-size: 8px; color: var(--neon); display: block; margin-bottom: 2px; }
        .stat span { font-size: 15px; font-weight: 900; }

        .main { display: flex; flex: 1; padding: 10px; gap: 10px; overflow: hidden; }

        .slot-network { flex: 1; background: var(--card); border-radius: 15px; padding: 12px; display: flex; flex-direction: column; border: 1px solid #1c2a38; }
        .network-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; overflow-y: auto; flex: 1; scroll-behavior: smooth; }
        .slot { aspect-ratio: 1; background: #0d141f; border-radius: 6px; border: 1px solid #1c2a38; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; cursor: pointer; }
        .slot.selected { border: 2px solid var(--orange); color: var(--orange); }
        .slot.hit { background: var(--neon); color: black; border-color: var(--neon); }
        .slot.last { background: var(--orange); color: white; transform: scale(1.1); box-shadow: 0 0 15px var(--orange); }

        .side { flex: 1.2; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .call-box { background: #081018; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; }
        .call-num { font-size: 45px; font-weight: 900; color: white; }

        .active-card { background: var(--card); border: 1px solid var(--orange); border-radius: 12px; padding: 8px; margin-bottom: 8px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .cell { aspect-ratio: 1; background: #0d141f; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #32475c; }
        .cell.marked { background: var(--orange); color: black; }

        .footer { padding: 12px; }
        .btn-start { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: black; font-weight: 900; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat"><label>WALLET</label><span>40 ETB</span></div>
        <div class="stat"><label>SELECTED</label><span id="sel-count">0/2</span></div>
        <div class="stat"><label>STATUS</label><span id="status-text">IDLE</span></div>
    </div>

    <div class="main">
        <div class="slot-network">
            <div style="font-size:11px; margin-bottom:10px; font-weight:900;">SLOT NETWORK (500)</div>
            <div id="network" class="network-grid"></div>
        </div>

        <div class="side">
            <div class="call-box">
                <div id="big-ball" class="call-num">--</div>
                <div style="font-size: 9px; color: var(--neon);">CURRENT CALL</div>
            </div>
            <div id="my-cards-area"></div>
        </div>
    </div>

    <div class="footer">
        <button id="draw-btn" class="btn-start" onclick="beginGame()">START GAME</button>
    </div>

    <script>
        let mySelections = [];
        let history = [];

        function init() {
            const net = document.getElementById('network');
            for(let i=1; i<=500; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.id = `slot-${i}`;
                s.textContent = i;
                s.onclick = () => selectCard(i);
                net.appendChild(s);
            }

            window.listenGame((data) => {
                history = data.history;
                document.getElementById('big-ball').textContent = data.ball;
                document.getElementById('status-text').textContent = "LIVE";
                updateVisuals(data.ball);
            });
        }

        function selectCard(id) {
            if(mySelections.includes(id)) {
                mySelections = mySelections.filter(x => x !== id);
            } else if(mySelections.length < 2) {
                mySelections.push(id);
            }
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            mySelections.forEach(id => document.getElementById(`slot-${id}`).classList.add('selected'));
            document.getElementById('sel-count').textContent = `${mySelections.length}/2`;
            renderMyCards();
        }

        function renderMyCards() {
            const area = document.getElementById('my-cards-area');
            area.innerHTML = '';
            mySelections.forEach(id => {
                const card = document.createElement('div');
                card.className = 'active-card';
                card.innerHTML = `<div style="color:var(--orange); text-align:center; font-size:9px; margin-bottom:5px;">Card #${id}</div>`;
                const grid = document.createElement('div');
                grid.className = 'bingo-grid';
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for(let r=0; r<5; r++) {
                    for(let c=0; c<5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if(r===2 && c===2) { cell.innerHTML = '★'; cell.style.color = 'var(--orange)'; }
                        else {
                            let n = ranges[c][0] + ((id * (r + 7) + c) % 15);
                            cell.textContent = n;
                            if(history.includes(n)) cell.classList.add('marked');
                        }
                        grid.appendChild(cell);
                    }
                }
                card.appendChild(grid);
                area.appendChild(card);
            });
        }

        function updateVisuals(last) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('last'));
            history.forEach(n => document.getElementById(`slot-${n}`).classList.add('hit'));
            const lastEl = document.getElementById(`slot-${last}`);
            if(lastEl) {
                lastEl.classList.add('last');
                lastEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            renderMyCards();
        }

        function beginGame() {
            let pool = [];
            document.getElementById('draw-btn').disabled = true;
            const loop = setInterval(() => {
                if(pool.length >= 75) { clearInterval(loop); return; }
                let n; do { n = Math.floor(Math.random()*75)+1; } while(pool.includes(n));
                pool.push(n);
                window.syncGame(n, pool);
            }, 3000);
        }

        init();
    </script>
</body>
</html>
