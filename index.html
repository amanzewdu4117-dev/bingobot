<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - LIVE DRAW SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text-gray: #788da1; --border: #1c2b3a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Header */
        .header-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; background: #0d161d; border-bottom: 1px solid var(--border); }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
        .stat-label { font-size: 9px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 15px; font-weight: bold; }
        .stat-val.green { color: var(--neon); }
        .stat-val.red { color: #ff4d4d; }

        /* Selection Screen */
        #selection-screen { display: flex; flex-direction: column; height: 100vh; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; overflow-y: auto; padding: 15px; flex-grow: 1; }
        .slot { aspect-ratio: 1; background: #1a252f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #5c7894; border: 2px solid #253341; cursor: pointer; position: relative; }
        .slot.selected { border-color: var(--neon); background: rgba(0, 255, 204, 0.1); color: var(--neon); }
        .slot.selected::after { content: "@User"; position: absolute; font-size: 7px; bottom: 8px; font-weight: bold; }

        /* Game Screen */
        #game-screen { display: none; height: 100vh; flex-direction: column; }
        .game-layout { display: grid; grid-template-columns: 110px 1fr; gap: 10px; padding: 10px; height: calc(100vh - 85px); }
        .board-side { background: var(--panel); border-radius: 15px; padding: 8px; border: 1px solid var(--border); overflow-y: auto; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .b-num { background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 4px; color: #4a5d6e; }
        .b-num.active { background: var(--orange); color: white; font-weight: bold; box-shadow: 0 0 8px var(--orange); }

        .play-side { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .ball-display { background: #000; border: 2.5px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center; }
        .ball-val { font-size: 65px; font-weight: 900; color: var(--neon); line-height: 1; }
        
        .history-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
        .dot { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--neon); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--neon); }

        .cartela { background: #16212a; padding: 12px; border-radius: 15px; border: 1px solid #253341; margin-bottom: 15px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 5px; color: white; }
        .c-cell.marked { background: var(--neon) !important; color: black !important; font-weight: bold; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #253341; border-radius: 10px; }
    </style>
</head>
<body onload="initApp()">

    <div id="selection-screen">
        <div class="header-stats">
            <div class="stat-box"><div class="stat-label">Player</div><div class="stat-val green">@User</div></div>
            <div class="stat-box"><div class="stat-label">Selected</div><div class="stat-val green" id="sel-count">0 / 2</div></div>
            <div class="stat-box"><div class="stat-label">Closes In</div><div class="stat-val red" id="timer-label">00:20</div></div>
        </div>
        <div class="slot-grid" id="slot-grid"></div>
        <div style="padding:15px; text-align:center; font-size:11px; color:var(--text-gray);">ጊዜው ሲያልቅ እጣ ማውጣት ይጀምራል...</div>
    </div>

    <div id="game-screen">
        <div class="header-stats">
            <div class="stat-box"><div class="stat-label">My Slots</div><div class="stat-val green" id="ui-slots">--</div></div>
            <div class="stat-box"><div class="stat-label">Called</div><div class="stat-val green" id="ui-called">0</div></div>
            <div class="stat-box"><div class="stat-label">Status</div><div class="stat-val" style="color:var(--orange)">LIVE DRAW</div></div>
        </div>
        <div class="game-layout">
            <div class="board-side"><div id="main-board" class="bingo-board"></div></div>
            <div class="play-side">
                <div class="ball-display">
                    <div class="history-dots" id="history-row"></div>
                    <div class="ball-val" id="big-ball">--</div>
                    <div style="font-size:10px; color:var(--neon); margin-top:5px; letter-spacing:2px;">CURRENT BALL</div>
                </div>
                <div id="cards-container"></div>
            </div>
        </div>
    </div>

    <script>
        let myChoices = [];
        let timeLeft = 20;
        let timer;

        function initApp() {
            const grid = document.getElementById('slot-grid');
            for(let i=1; i<=800; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.innerText = i;
                s.onclick = () => {
                    if(myChoices.includes(i)) {
                        myChoices = myChoices.filter(x => x !== i);
                        s.classList.remove('selected');
                    } else if(myChoices.length < 2) {
                        myChoices.push(i);
                        s.classList.add('selected');
                    }
                    document.getElementById('sel-count').innerText = `${myChoices.length} / 2`;
                };
                grid.appendChild(s);
            }
            startTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-label').innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    startBingoGame();
                }
            }, 1000);
        }

        async function startBingoGame() {
            if (myChoices.length === 0) {
                alert("እባክዎ ካርቴላ ይምረጡ!");
                location.reload();
                return;
            }

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('ui-slots').innerText = myChoices.join(", ");

            setupUI();

            // Firebaseን Reset አድርጎ እጣ መጀመር
            await setDoc(doc(window.db, "live_bingo", "current"), { ball: null, history: [], status: "drawing" });
            
            // ዳታውን ማዳመጥ
            window.listenToGame((data) => {
                updateGameUI(data);
            });

            // እጣ ማውጣት መጀመር (Draw Loop)
            runDrawLoop();
        }

        function setupUI() {
            const mb = document.getElementById('main-board');
            mb.innerHTML = "";
            for(let i=1; i<=75; i++) mb.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            const container = document.getElementById('cards-container');
            container.innerHTML = "";
            myChoices.forEach(s => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                let html = `<div class="cartela"><div style="color:var(--neon); font-size:10px; text-align:center; margin-bottom:5px;">CARTELA ${s}</div><div class="c-grid">`;
                nums.forEach((v, idx) => {
                    if(idx === 12) html += `<div class="c-cell marked">★</div>`;
                    else html += `<div class="c-cell" id="c-${s}-${v}">${v}</div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });
        }

        function updateGameUI(data) {
            const hist = data.history || [];
            document.getElementById('big-ball').innerText = data.ball || "--";
            document.getElementById('ui-called').innerText = hist.length;

            // የታሪክ ማሳያ (Last 5)
            const hRow = document.getElementById('history-row');
            hRow.innerHTML = "";
            [...hist].reverse().slice(0, 5).forEach(n => {
                hRow.innerHTML += `<div class="dot">${n}</div>`;
            });

            // ቦርዱን ማብራት
            hist.forEach(n => {
                document.getElementById(`bn-${n}`)?.classList.add('active');
                myChoices.forEach(s => {
                    document.getElementById(`c-${s}-${n}`)?.classList.add('marked');
                });
            });
        }

        async function runDrawLoop() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let history = [];
            
            for (let ball of pool) {
                history.push(ball);
                try {
                    await setDoc(doc(window.db, "live_bingo", "current"), { 
                        ball: ball, 
                        history: history 
                    });
                } catch(e) { console.error(e); }
                await new Promise(r => setTimeout(r, 4000)); // በየ 4 ሴኮንዱ እጣ ይወጣል
            }
        }
    </script>
</body>
</html>
