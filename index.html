<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // ከ Screenshot_20260509-225958.jpg እና Screenshot_20260509-225727.jpg የተገኘ መረጃ
        const firebaseConfig = {
            apiKey: "AIzaSyD2lOQ4J...", // 'Config' የሚለውን ስትነካ ያገኘኸውን እውነተኛ Key እዚህ አስገባ
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            storageBucket: "my-app-project-1e0bb.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.syncToFirebase = async (ball, history, status) => {
            try {
                await setDoc(doc(db, "live_bingo", "current"), { 
                    ball: ball, 
                    history: history, 
                    status: status, 
                    timestamp: Date.now() 
                }, { merge: true });
            } catch (e) { console.error("Firebase Sync Error:", e); }
        };

        window.listenToFirebase = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root { --bg: #050a10; --panel: #111a24; --neon: #00ffcc; --orange: #ff5722; --text: #ffffff; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .view { display: none; height: 100vh; flex-direction: column; }
        .active-view { display: flex; }
        .top-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; background: #081018; }
        .stat-card { background: var(--panel); border-radius: 8px; padding: 5px; text-align: center; border: 1px solid #1c2a38; }
        .stat-card label { font-size: 8px; color: var(--neon); display: block; }
        .selection-area { flex: 1; overflow-y: auto; padding: 10px; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .slot-item { aspect-ratio: 1; background: var(--panel); border: 1px solid #1c2a38; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .slot-item.picked { border-color: var(--orange); color: var(--orange); background: rgba(255, 87, 34, 0.1); }
        .game-container { flex: 1; display: flex; gap: 10px; padding: 10px; overflow: hidden; }
        .main-board { flex: 1.2; background: var(--panel); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .ball-call-box { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 10px; }
        .ball-num { font-size: 45px; font-weight: 900; color: #fff; }
        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; flex: 1; overflow-y: auto; }
        .num-box { background: #0d141f; font-size: 10px; text-align: center; padding: 5px 0; border-radius: 4px; color: #445b73; }
        .num-box.active { background: var(--neon); color: #000; font-weight: bold; }
        .player-cards-side { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .game-card { background: #081018; border: 1px solid var(--orange); border-radius: 10px; padding: 8px; }
        .card-inner-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .cell { aspect-ratio: 1; background: var(--panel); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
        .cell.marked { background: var(--orange); color: #fff; }
        .action-btn { width: 100%; padding: 15px; background: var(--neon); border: none; font-weight: 900; }
    </style>
</head>
<body>

    <div id="view-selection" class="view active-view">
        <div class="top-header">
            <div class="stat-card"><label>WALLET</label><span>40 ETB</span></div>
            <div class="stat-card"><label>SELECTED</label><span id="count-ui">0/2</span></div>
            <div class="stat-card"><label>MODE</label><span>LIVE</span></div>
        </div>
        <div class="selection-area"><div id="slot-container" class="slot-grid"></div></div>
        <button class="action-btn" onclick="moveToGame()">START GAME</button>
    </div>

    <div id="view-game" class="view">
        <div class="top-header">
            <div class="stat-card"><label>STATUS</label><span id="game-status">IDLE</span></div>
            <div class="stat-card"><label>TIMER</label><span id="timer-ui">15s</span></div>
            <div class="stat-card"><label>BALLS</label><span id="ball-count-ui">0/75</span></div>
        </div>
        <div class="game-container">
            <div class="main-board">
                <div class="ball-call-box"><div id="current-ball" class="ball-num">--</div></div>
                <div id="master-grid" class="number-grid"></div>
            </div>
            <div id="my-active-cards" class="player-cards-side"></div>
        </div>
    </div>

    <script>
        let selectedSlots = [];
        let callHistory = [];
        let engineRunning = false;

        function initialize() {
            const container = document.getElementById('slot-container');
            for(let i=1; i<=200; i++) {
                const el = document.createElement('div');
                el.className = 'slot-item'; el.textContent = i;
                el.onclick = () => {
                    if(selectedSlots.includes(i)) selectedSlots = selectedSlots.filter(x => x !== i);
                    else if(selectedSlots.length < 2) selectedSlots.push(i);
                    updateUI();
                };
                container.appendChild(el);
            }
            const master = document.getElementById('master-grid');
            for(let n=1; n<=75; n++) {
                const nbox = document.createElement('div');
                nbox.className = 'num-box'; nbox.id = `master-${n}`; nbox.textContent = n;
                master.appendChild(nbox);
            }
            window.listenToFirebase((data) => {
                callHistory = data.history || [];
                document.getElementById('current-ball').textContent = data.ball || "--";
                document.getElementById('game-status').textContent = data.status;
                document.getElementById('ball-count-ui').textContent = `${callHistory.length}/75`;
                callHistory.forEach(num => {
                    document.getElementById(`master-${num}`)?.classList.add('active');
                    document.querySelectorAll(`[id$="-val-${num}"]`).forEach(c => c.classList.add('marked'));
                });
            });
        }

        function updateUI() {
            document.querySelectorAll('.slot-item').forEach((s, idx) => {
                s.classList.toggle('picked', selectedSlots.includes(idx+1));
            });
            document.getElementById('count-ui').textContent = `${selectedSlots.length}/2`;
        }

        function moveToGame() {
            if(!selectedSlots.length) return alert("ካርቴላ ይምረጡ");
            document.getElementById('view-selection').classList.remove('active-view');
            document.getElementById('view-game').classList.add('active-view');
            const wrap = document.getElementById('my-active-cards');
            selectedSlots.forEach(cid => {
                const grid = document.createElement('div'); grid.className = 'game-card card-inner-grid';
                for(let i=0; i<25; i++) {
                    const cell = document.createElement('div'); cell.className = 'cell';
                    if(i === 12) { cell.textContent = "⭐"; cell.classList.add('marked'); }
                    else {
                        let val = Math.floor(Math.random() * 75) + 1;
                        cell.textContent = val; cell.id = `card-${cid}-val-${val}`;
                    }
                    grid.appendChild(cell);
                }
                wrap.appendChild(grid);
            });
            let sec = 15;
            const t = setInterval(() => {
                document.getElementById('timer-ui').textContent = `${--sec}s`;
                if(sec <= 0) { clearInterval(t); startEngine(); }
            }, 1000);
        }

        function startEngine() {
            if(engineRunning) return; engineRunning = true;
            let pool = [];
            setInterval(async () => {
                if(pool.length >= 75) return;
                let b; do { b = Math.floor(Math.random()*75)+1; } while(pool.includes(b));
                pool.push(b);
                await window.syncToFirebase(b, pool, "LIVE");
            }, 3500);
        }
        initialize();
    </script>
</body>
</html>
