    <style>
        :root {
            --bg: #030812;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --purple: #9d50bb;
            --orange: #ff9d00;
            --b-clr: #00d2ff; --i-clr: #ff00d4; --n-clr: #ff3e3e; --g-clr: #00ff85; --o-clr: #ffae00;
        }
        .no-card-warning {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(157, 80, 187, 0.1), rgba(0, 242, 255, 0.1));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            animation: glow-border 3s infinite alternate;
        }

        .warning-title {
            font-size: 22px;
            font-weight: 900;
            background: linear-gradient(to right, #00f2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .warning-text {
            font-size: 14px;
            line-height: 1.6;
            color: #e0e0e0;
        }

        .highlight-orange {
            color: var(--orange);
            font-weight: bold;
            display: block;
            margin-top: 10px;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(255, 157, 0, 0.5);
        }

        @keyframes glow-border {
            from { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 5px rgba(0, 242, 255, 0.1); }
            to { border-color: rgba(157, 80, 187, 0.5); box-shadow: 0 0 20px rgba(157, 80, 187, 0.2); }
        }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #030812 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; height: 100vh; 
        }

        /* 💎 የተቆጠበ እና ማራኪ የHeader CSS ዲዛይን */
        .top-status-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 6px 12px; 
            background: linear-gradient(135deg, #0d1117, #161b22); 
            backdrop-filter: blur(10px); 
            border-bottom: 2px solid #21262d;
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .logo-text {
            font-size: 13px;
            font-weight: 900; 
            letter-spacing: 0.5px;
            color: #00f2ff;
        }

        .pro-tag {
            color: #b92b27;
            background: rgba(185, 43, 39, 0.1);
            padding: 1px 4px;
            border-radius: 4px;
            border: 1px solid rgba(185, 43, 39, 0.3);
            font-size: 10px;
            margin-left: 2px;
        }

        /* 🏆 መሃል ላይ ያለው የደራሽ ብር ማሳያ ሰሌዳ */
        .header-center {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .prize-badge {
            background: linear-gradient(145deg, #1f1a04, #000000);
            border: 1px solid #ffcc00;
            padding: 3px 12px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
            animation: pulseGlow 2s infinite;
        }

        .prize-label {
            font-size: 8px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .prize-amount {
            font-size: 14px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 5px rgba(255, 204, 0, 0.5);
        }

        .header-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
            font-size: 11px;
        }

        .user-balance {
            font-weight: bold;
            color: #00ea96;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(255, 204, 0, 0.2); }
            50% { box-shadow: 0 0 12px rgba(255, 204, 0, 0.4); }
            100% { box-shadow: 0 0 5px rgba(255, 204, 0, 0.2); }
        }

        #slots-grid { 
            flex: 1; overflow-y: auto; display: grid; 
            grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; 
            -webkit-overflow-scrolling: touch;
        }
        
        .slot-btn { 
            height: 50px; background: var(--glass); border: 1px solid var(--glass-border); 
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-weight: bold; transition: 0.3s; color: #fff; position: relative;
        }
        
        .slot-btn.selected { 
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%) !important;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.8);
            border: 2px solid #ffffff;
            color: white;
            transform: scale(1.05);
        }

        .slot-btn.occupied { border: 2px solid var(--purple); position: relative; opacity: 0.6; pointer-events: none; }

        #selection-preview {
            height: 120px; background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--glass-border); display: flex; 
            gap: 12px; padding: 10px 15px; overflow-x: auto; align-items: center;
        }
        
        .slot-btn .card-number {
            font-weight: bold; font-size: 14px;
        }

        .slot-btn .player-name {
            font-size: 8px; color: #ffc107; font-weight: bold; display: block; 
            white-space: nowrap; text-align: center; max-width: 90%; overflow: hidden;
        }

        .mini-card {
            min-width: 85px; background: var(--glass); border: 1px solid var(--accent);
            border-radius: 8px; padding: 5px; flex-shrink: 0;
        }

        .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .mini-cell { background: rgba(255, 255, 255, 0.05); height: 10px; font-size: 6px; display: flex; align-items: center; justify-content: center; }

        .ball-display { height: 90px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; margin: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        #ball-num { font-size: 60px; font-weight: 900; }
        .board-side { flex: 1.2; background: var(--glass); border-radius: 15px; padding: 10px; border: 1px solid var(--glass-border); overflow: hidden; }
        .num-cell { background: rgba(255,255,255,0.03); height: 30px; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 6px; color: #5a7b9d; }
        .num-cell.called { background: var(--orange); color: #000; font-weight: 900; box-shadow: 0 0 10px var(--orange); }
        
        .active-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 6px; margin-bottom: 10px; }
        .card-cell { background: rgba(0,0,0,0.3); height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 3px; }
        .card-cell.hit { background: var(--accent); color: #000; font-weight: bold; }
        .card-cell.hit.free { background: var(--purple); color: #fff; }
        .card-header-grid { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: 900; font-size: 9px; margin-bottom: 3px; }

        .cl-b { color: var(--b-clr) !important; text-shadow: 0 0 5px var(--b-clr); }
        .cl-i { color: var(--i-clr) !important; text-shadow: 0 0 5px var(--i-clr); }
        .cl-n { color: var(--n-clr) !important; text-shadow: 0 0 5px var(--n-clr); }
        .cl-g { color: var(--g-clr) !important; text-shadow: 0 0 5px var(--g-clr); }
        .cl-o { color: var(--o-clr) !important; text-shadow: 0 0 5px var(--o-clr); }

        .no-selection-box {
            height: 100%; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; border-radius: 15px;
            background: rgba(255,255,255,0.02); border: 1px dashed var(--glass-border);
            padding: 20px;
        }

        #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 8, 18, 0.95); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        
        .hidden { display: none !important; }
        
        .search-container { padding: 0 20px; }
        #searchCard { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--glass-border); background: var(--glass); color: #fff; outline: none; }
        #searchCard:focus { border-color: var(--accent); }

        /* 🏦 Withdrawal Modal Styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 8, 18, 0.9); z-index: 3000;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-box {
            background: linear-gradient(135deg, #0d1117, #161b22);
            border: 2px solid var(--accent); border-radius: 20px;
            padding: 25px; width: 85%; max-width: 350px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
        }
        .modal-box h3 { margin-top: 0; color: var(--accent); font-size: 18px; text-align: center; }
        .modal-box input, .modal-box select {
            width: 100%; padding: 10px; margin: 8px 0;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            border-radius: 8px; color: #fff; box-sizing: border-box; outline: none;
        }
        .modal-box input:focus, .modal-box select:focus { border-color: var(--accent); }
        .modal-btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-submit { background: linear-gradient(135deg, #00ff85, #00a852); color: #000; font-weight: bold; flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-cancel { background: #ff3e3e; color: #fff; font-weight: bold; flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .withdraw-trigger-btn {
            background: rgba(0, 234, 150, 0.15); border: 1px solid #00ea96;
            color: #00ea96; padding: 2px 8px; border-radius: 5px;
            font-size: 10px; font-weight: bold; cursor: pointer; margin-top: 4px;
            display: inline-block;
        }
    </style>
</head>

<script>

const firebaseConfig = {
    databaseURL:
    "https://my-app-project-1e0bb-default-rtdb.firebaseio.com/"
};

if (!firebase.apps.length) {

    firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

const tgUser =
    window.Telegram?.WebApp
    ?.initDataUnsafe?.user?.first_name
    || "ተጫዋች";

let userCards =
    JSON.parse(localStorage.getItem('aman_cards'))
    || [];

let cardData =
    JSON.parse(localStorage.getItem('aman_data'))
    || {};

let currentBalance =
    parseFloat(localStorage.getItem('aman_bal'))
    || 100.00;

let allSelected = {};

let gameActive = false;

let calledNumbers = new Set();

let countdownInterval;



// ✅ SAVE
function save() {

    localStorage.setItem(
        'aman_cards',
        JSON.stringify(userCards)
    );

    localStorage.setItem(
        'aman_data',
        JSON.stringify(cardData)
    );

    localStorage.setItem(
        'aman_bal',
        currentBalance
    );
}



// ✅ GENERATE CARD
function generateCard() {

    let card = [];

    let ranges = [
        [1,15],
        [16,30],
        [31,45],
        [46,60],
        [61,75]
    ];

    for(let c=0; c<5; c++) {

        let col = [];

        while(col.length < 5) {

            let n =
                Math.floor(Math.random()*15)
                + ranges[c][0];

            if(!col.includes(n)) {

                col.push(n);
            }
        }

        card.push(
            col.sort((a,b)=>a-b)
        );
    }

    return card;
}



// ✅ INIT
function init() {

    const userId =
        window.Telegram?.WebApp
        ?.initDataUnsafe?.user?.id
        || "guest_user";

    // ✅ USER BALANCE
    db.ref('users/' + userId + '/balance')
    .on('value', snap => {

        if (snap.exists()) {

            currentBalance =
                parseFloat(snap.val());

        } else {

            currentBalance = 100;

            db.ref('users/' + userId)
            .set({
                name: tgUser,
                balance: currentBalance
            });
        }

        document.getElementById('balance')
            .innerText =
            currentBalance.toFixed(2);

        save();
    });



    // ✅ MAIN GAME LISTENER
    db.ref('liveGame')
    .on('value', snap => {

        const data = snap.val();

        if (!data) return;

        // ✅ RESET CALLED NUMBERS
        calledNumbers.clear();

        if (data.history) {

            data.history.forEach(num => {

                calledNumbers.add(num);

            });
        }

        // ✅ LOAD SELECTED
        allSelected =
            data.selectedCards || {};

        // ✅ TOTAL
        const currentTotalCards =
            Object.keys(allSelected).length;

        document.getElementById('total-count')
            .innerText =
            currentTotalCards;

        // ✅ PRIZE
        const totalPool =
            currentTotalCards * 10;

        const livePrize =
            totalPool - (totalPool * 0.15);

        document.getElementById('live-prize')
            .innerText =
            livePrize.toFixed(2);



        // ✅ WAITING ROUND
        if (data.status === "waiting") {

    console.log("🧹 RESET ROUND");

    gameActive = false;

    // ❌ እነዚህን አትሰርዝ
    // userCards = [];
    // cardData = {};

            // ✅ CLEAR STORAGE
            localStorage.removeItem(
                "aman_cards"
            );

            localStorage.removeItem(
                "aman_data"
            );

            // ✅ RESET NUMBERS
            calledNumbers.clear();

            // ✅ RESET BALL
            document.getElementById(
                'ball-num'
            ).innerText = "--";

            document.getElementById(
                'ball-let'
            ).innerText = "-";

            // ✅ HIDE GAME
            document.getElementById(
                'game-page'
            ).classList.add('hidden');

            document.getElementById(
                'game-page'
            ).style.display = "none";

            // ✅ SHOW SELECTION
            document.getElementById(
                'selection-page'
            ).classList.remove('hidden');

            document.getElementById(
                'selection-page'
            ).style.display = "flex";

            // ✅ TIMER
            if (data.timerStartTime) {

                const now = Date.now();

                const elapsed =
                    Math.floor(
                        (now - data.timerStartTime)
                        / 1000
                    );

                const remaining =
                    40 - elapsed;

                startCountdown(
                    remaining > 0
                    ? remaining
                    : 0
                );
            }

            // ✅ RENDER 500 CARDS
            renderGrid();

            updatePreview();

            return;
        }



        // ✅ GAME STARTED
        if (data.status === "started") {

            clearInterval(countdownInterval);

            if (!gameActive) {

                start();
            }
        }

        // ✅ UPDATE GRID
        renderGrid();

        // ✅ APPLY CURRENT NUMBER
        if (data.currentNumber) {

            applyNumber(
                data.currentNumber,
                true
            );
        }

        // ✅ WINNER
        if (data.winner && gameActive) {

            winner(data.winner);
        }
    });



    // ✅ SEARCH
    document.getElementById('searchCard')
    .oninput = function() {

        let val = parseInt(this.value);

        if (val >=1 && val <=500) {

            const target =
                document.getElementById(
                    `cartela-${val}`
                );

            if (target) {

                target.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });
            }
        }
    };



    updatePreview();
}



// ✅ COUNTDOWN
function startCountdown(seconds) {

    clearInterval(countdownInterval);

    let counter = seconds;

    const timerEl =
        document.getElementById('timer');

    countdownInterval =
    setInterval(() => {

        timerEl.innerText = counter;

        if (counter <= 10) {

            timerEl.style.background =
                "#ff3e3e";

        } else {

            timerEl.style.background =
                "var(--orange)";
        }

        if (counter <= 0) {

            clearInterval(countdownInterval);
        }

        counter--;

    }, 1000);
}



// ✅ RENDER GRID
function renderGrid() {

    const grid =
        document.getElementById('slots-grid');

    grid.innerHTML = "";

    for(let i=1; i<=500; i++) {

        let b = document.createElement('div');

        b.className = 'slot-btn';

        b.id = `cartela-${i}`;

        let cardKey = 'c' + i;

        // ✅ OCCUPIED
        if (allSelected[cardKey]) {

            const playerData =
                allSelected[cardKey];

            const displayName =
                playerData.playerName
                || "ተጫዋች";

            b.innerHTML = `
                <div class="card-number">
                    ${i}
                </div>

                <div class="player-name">
                    ${displayName}
                </div>
            `;

            if (!userCards.includes(i)) {

                b.classList.add('occupied');
            }

        } else {

            b.innerHTML = `
                <div class="card-number">
                    ${i}
                </div>
            `;
        }

        // ✅ USER SELECTED
        if (userCards.includes(i)) {

            b.classList.add('selected');

            b.innerHTML = `
                <div class="card-number">
                    ${i}
                </div>

                <div class="player-name">
                    ${tgUser}
                </div>
            `;
        }

        b.onclick = () => {

            if (
                !gameActive &&
                !b.classList.contains('occupied')
            ) {

                selectCard(i);
            }
        };

        grid.appendChild(b);
    }
}

// ✅ SELECT CARD
function selectCard(i) {

    const userId =
        window.Telegram?.WebApp
        ?.initDataUnsafe?.user?.id
        || "guest_user";



    // ✅ REMOVE CARD
    if (userCards.includes(i)) {

        userCards =
            userCards.filter(x => x !== i);

        delete cardData[i];

        currentBalance += 10;

        db.ref(
            'users/' + userId + '/balance'
        ).set(currentBalance);

        db.ref(
            'liveGame/selectedCards/c' + i
        ).remove();
    }



    // ✅ ADD CARD
    else {

        // ✅ ONLY 3 CARDS
        if (userCards.length >= 3) {

            alert("3 ካርዶች ብቻ ይፈቀዳሉ");

            return;
        }



        // ✅ CHECK BALANCE
        if (currentBalance < 10) {

            alert("በቂ ሂሳብ የሎትም");

            return;
        }



        // ✅ SAVE CARD
        userCards.push(i);



        // ✅ GENERATE CARD
        const newCard =
            generateCard();

        cardData[i] =
            newCard;



        // ✅ BALANCE
        currentBalance -= 10;

        db.ref(
            'users/' + userId + '/balance'
        ).set(currentBalance);



        // ✅ SAVE FIREBASE
        db.ref(
            'liveGame/selectedCards/c' + i
        ).set({

            id: i,

            playerName: tgUser,

            userId: userId,

            numbers: newCard
        });
    }



    // ✅ SAVE
    save();



    // ✅ UPDATE UI
    renderGrid();

    updatePreview();

    renderPlayerCards();
}

// ✅ UPDATE PREVIEW
function updatePreview() {

    const p =
        document.getElementById(
            'selection-preview'
        );

    p.innerHTML = "";

    if (userCards.length <= 0) {

        p.innerHTML =
            '<div style="width:100%;text-align:center;color:#666;">ካርቴላ ይምረጡ</div>';

        return;
    }

    userCards.forEach(id => {

        let d = cardData[id];

        if (!d) return;

        let h = `
        <div class="mini-card">

        <div style="
            text-align:center;
            font-size:10px;
            margin-bottom:5px;
        ">
            #${id}
        </div>

        <div class="mini-grid">
        `;

        for(let r=0; r<5; r++) {

            for(let c=0; c<5; c++) {

                let v =
                    (r===2 && c===2)
                    ? "F"
                    : d[c][r];

                h += `
                <div class="mini-cell">
                    ${v}
                </div>
                `;
            }
        }

        h += `
        </div>
        </div>
        `;

        p.innerHTML += h;
    });
}


// ✅ SHOW PLAYER CARDS
function renderPlayerCards() {

    const area =
        document.getElementById(
            'player-area'
        );

    area.innerHTML = "";



    // ✅ NO CARD
    if(userCards.length <= 0){

        area.innerHTML = `
        <div class="no-card-warning">

            <div class="warning-title">
                🎴 ካርድ የለም
            </div>

            <div class="warning-text">
                ጨዋታውን ለመጫወት
                ካርቴላ ይምረጡ

                <span class="highlight-orange">
                    Max 3 Cards
                </span>
            </div>

        </div>
        `;

        return;
    }



    // ✅ RENDER CARDS
    userCards.forEach(id => {

        // ✅ LOAD CARD AGAIN IF MISSING
        if(!cardData[id]){

            const live =
                allSelected['c' + id];

            if(live && live.numbers){

                cardData[id] =
                    live.numbers;
            }
        }

        const d = cardData[id];

        if(!d) return;

        let html = `
        <div class="active-card">

            <div style="
                text-align:center;
                font-weight:900;
                margin-bottom:6px;
                color:var(--accent);
            ">
                🎴 CARD #${id}
            </div>

            <div class="card-header-grid">
                <span class="cl-b">B</span>
                <span class="cl-i">I</span>
                <span class="cl-n">N</span>
                <span class="cl-g">G</span>
                <span class="cl-o">O</span>
            </div>

            <div style="
                display:grid;
                grid-template-columns:repeat(5,1fr);
                gap:3px;
            ">
        `;



        for(let r=0; r<5; r++){

            for(let c=0; c<5; c++){

                let val =
                    (r===2 && c===2)
                    ? "FREE"
                    : d[c][r];

                let hit =
                    calledNumbers.has(d[c][r]);



                if(r===2 && c===2){

                    html += `
                    <div class="
                        card-cell
                        hit
                        free
                    ">
                        FREE
                    </div>
                    `;

                } else {

                    html += `
                    <div class="
                        card-cell
                        ${hit ? 'hit' : ''}
                    ">
                        ${val}
                    </div>
                    `;
                }
            }
        }

        html += `
            </div>
        </div>
        `;

        area.innerHTML += html;
    });
}





// ✅ START GAME
function start() {

    gameActive = true;

    console.log(userCards);
    console.log(cardData);

    document.getElementById(
        'selection-page'
    ).classList.add('hidden');

    document.getElementById(
        'game-page'
    ).classList.remove('hidden');

    document.getElementById(
        'game-page'
    ).style.display = "flex";

    renderPlayerCards();
}

// ✅ APPLY NUMBER
function applyNumber(n) {

    if (!n) return;

    calledNumbers.add(n);

    document.getElementById(
        'ball-num'
    ).innerText = n;

    document.getElementById(
        'ball-let'
    ).innerText =
        n<=15 ? "B" :
        n<=30 ? "I" :
        n<=45 ? "N" :
        n<=60 ? "G" : "O";



    // ✅ HIGHLIGHT BOARD NUMBER
    const target =
        document.getElementById(
            'num-' + n
        );

    if(target){

        target.classList.add('called');
    }



    // ✅ UPDATE PLAYER CARDS
    renderPlayerCards();
}

// ✅ WINNER
function winner() {

    gameActive = false;

    document.getElementById(
        'winner-overlay'
    ).style.display = "flex";

    setTimeout(() => {

        document.getElementById(
            'winner-overlay'
        ).style.display = "none";

    }, 5000);
}
