<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Job Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: white; margin: 0; padding: 10px; box-sizing: border-box; user-select: none; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px; background-color: #161b22; border-radius: 10px; margin-bottom: 15px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; background-color: #00bcd4; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .round-info { color: #8b949e; font-size: 12px; }
        .stats-bar { display: flex; justify-content: space-around; background-color: #161b22; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .stat-box { flex: 1; }
        .stat-label { color: #00e676; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 20px; font-weight: bold; margin-top: 5px; }
        #timer { color: #ff5252; }
        #cartela-count { color: #00bcd4; }
        #wallet-balance { color: #00e676; }
        .network-info { color: #8b949e; font-size: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; background-color: #161b22; padding: 10px; border-radius: 10px; }
        .grid-item { background-color: #21262d; border-radius: 5px; padding: 10px 0; text-align: center; font-weight: bold; font-size: 14px; cursor: pointer; transition: background-color 0.2s; border: 1px solid transparent; }
        .grid-item:active { background-color: #30363d; }
        .grid-item.selected { background-color: #ff9800; color: white; border-color: #ff9800; box-shadow: 0 0 5px #ff9800; }
        .grid-item.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div class="avatar" id="user-avatar">?</div>
            <div>
                <div id="user-name">ተጫዋች</div>
                <div class="round-info">ROUND #22161</div>
            </div>
        </div>
        <div style="font-size: 20px;">⋮</div>
    </div>

    <div class="stats-bar">
        <div class="stat-box">
            <div class="stat-label">Closes In</div>
            <div class="stat-value" id="timer">02:00</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Cartela</div>
            <div class="stat-value" id="cartela-count">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Wallet</div>
            <div class="stat-value" id="wallet-balance">40 ETB</div>
        </div>
    </div>

    <div class="network-info">
        <div>• Slot Network</div>
        <div>Total Active: 41 Players</div>
    </div>

    <div class="grid-container" id="bingo-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // ሚኒ አፑን ሙሉ ስክሪን ማድረግ

        const PRICE_PER_CARTELA = 2; // የአንድ ቁጥር ዋጋ (ETB)
        let balance = 40; // መጀመሪያ ያለው ብር
        let selectedNumbers = new Set();
        let timeLeft = 120; // ጨዋታው 120 ሰከንድ (2 ደቂቃ)
        let isGameClosed = false;
        let timerInterval;

        const grid = document.getElementById('bingo-grid');
        const cartelaCountEl = document.getElementById('cartela-count');
        const walletBalanceEl = document.getElementById('wallet-balance');
        const timerEl = document.getElementById('timer');
        const userNameEl = document.getElementById('user-name');
        const userAvatarEl = document.getElementById('user-avatar');

        // የተጫዋች መረጃ ከቴሌግራም መውሰድ
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            userNameEl.textContent = user.username ? '@' + user.username : user.first_name;
            userAvatarEl.textContent = user.first_name.charAt(0).toUpperCase();
        }

        // የቢንጎ ግሪድ መፍጠር (ከ 1 እስከ 72)
        for (let i = 1; i <= 72; i++) {
            const item = document.createElement('div');
            item.classList.add('grid-item');
            item.textContent = i;
            item.onclick = () => selectNumber(i, item);
            grid.appendChild(item);
        }

        // ቁጥር ሲመረጥ የሚሆን ነገር
        function selectNumber(num, element) {
            if (isGameClosed) return; // ጨዋታው ካለቀ ምንም አያድርግ

            if (selectedNumbers.has(num)) {
                // ቁጥሩን ማጥፋት (Deselect)
                selectedNumbers.delete(num);
                element.classList.remove('selected');
                balance += PRICE_PER_CARTELA; // ብሩን መለስ ማድረግ
            } else {
                // ቁጥሩን መምረጥ (Select)
                // ባላንስ ማረጋገጥ
                if (balance >= PRICE_PER_CARTELA) {
                    selectedNumbers.add(num);
                    element.classList.add('selected');
                    balance -= PRICE_PER_CARTELA; // ብሩን መቀነስ
                    tg.HapticFeedback.impactOccurred('light');
                } else {
                    tg.showAlert("⚠️ ይቅርታ፣ በቂ ባላንስ የሎትም።");
                    return;
                }
            }
            updateUI();
        }

        // UI ማደስ (ባላንስ እና የተመረጠ ቁጥር ብዛት)
        function updateUI() {
            cartelaCountEl.textContent = selectedNumbers.size;
            walletBalanceEl.textContent = balance + " ETB";
        }

        // የሰዓት ቆጣሪ ፈንክሽን
        function startTimer() {
            timerInterval = setInterval(() => {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;

                minutes = minutes < 10 ? '0' + minutes : minutes;
                seconds = seconds < 10 ? '0' + seconds : seconds;

                timerEl.textContent = minutes + ':' + seconds;

                if (timeLeft <= 10) {
                    timerEl.style.color = '#ff5252'; // የመጨረሻ 10 ሰከንድ ሲሆን ቀይ ማድረግ
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    closeGame();
                } else {
                    timeLeft--;
                }
            }, 1000);
        }

        // ጨዋታውን መቆለፍ እና መረጃውን ለቦቱ መላክ
        function closeGame() {
            isGameClosed = true;
            timerEl.textContent = "00:00";
            
            // የነካቸውን ቁጥሮች ወደ ቴሌግራም መላክ (Array አድርጎ)
            const chosenNumbers = Array.from(selectedNumbers);
            
            const dataToSend = {
                action: "game_submitted",
                numbers: chosenNumbers,
                final_balance: balance
            };

            // ሁሉንም ግሪድ መቆለፍ
            const items = document.querySelectorAll('.grid-item');
            items.forEach(item => item.classList.add('disabled'));

            if (chosenNumbers.length > 0) {
                tg.showAlert("✅ ጊዜው አልቋል! የመረጧቸው ቁጥሮች ተመዝግበዋል። እባክዎ ለዕጣው ወደ ቦቱ ይመለሱ።");
                tg.sendData(JSON.stringify(dataToSend)); // ለቦቱ መረጃ መላክ
            } else {
                tg.showAlert("⚠️ ምንም ቁጥር ሳይመርጡ ጊዜው አልቋል። በዛሬው ዕጣ አይሳተፉም።");
                tg.close(); // መረጃ ከሌለ መዝጋት
            }
        }

        // ሰዓቱን ማስጀመር
        startTimer();

    </script>
</body>
</html>
