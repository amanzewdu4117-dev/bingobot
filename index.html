<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - PRO SLOT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.occupySlot = async (slotNum, userName) => {
            await setDoc(doc(db, "active_slots", "slot_" + slotNum), { name: userName, slot: slotNum, time: Date.now() });
        };

        window.clearAllSlots = async () => {
            const querySnapshot = await getDocs(collection(db, "active_slots"));
            querySnapshot.forEach(async (d) => { await deleteDoc(doc(db, "active_slots", d.id)); });
        };

        window.listenToSlots = (callback) => {
            onSnapshot(collection(db, "active_slots"), (snap) => {
                let takenSlots = {};
                snap.forEach(doc => { takenSlots[doc.data().slot] = doc.data().name; });
                callback(takenSlots);
            });
        };

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { if(snap.exists()) callback(snap.data()); });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --dark-text: #788da1; --slot-bg: #1a252f; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Timer UI */
        .countdown-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .timer-circle { font-size: 80px; color: var(--neon); font-weight: bold; border: 5px solid var(--neon); width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Slot Screen */
        #slot-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; }
        .top-info { padding: 15px; background: #0a1117; display: flex; justify-content: space-around; border-bottom: 1px solid #1c2b3a; }
        .info-box { text-align: center; background: rgba(0,255,204,0.05); padding: 8px; border-radius: 10px; border: 1px solid #1c2b3a; min-width: 90px; }
        .info-box label { font-size: 8px; color: var(--dark-text); display: block; }
        .info-box span { font-size: 14px; font-weight: bold; color: var(--neon); }

        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; padding: 10px; overflow-y: auto; flex-grow: 1; }
        .slot { background: #1a252f; aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; border: 1px solid #253341; cursor: pointer; color: #7a8a9a; }
        .slot.selected { border-color: var(--orange); background: rgba(255, 126, 33, 0.2); }
        .slot.taken { background: var(--neon); color: black; }

        /* Game UI */
        #game-ui { display: none; height: 100vh; }
        .main-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; padding: 10px; height: calc(100vh - 80px); }
        .board-container { background: var(--panel); border-radius: 10px; padding: 5px; overflow-y: auto; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .num { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 3px; color: #5c7894; }
        .num.active { background: var(--orange); color: white; }

        .right-side { display: flex; flex-direction: column; gap: 10px; }
        .ball-display { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 10px; text-align: center; color: var(--neon); font-size: 30px; font-weight: bold; }
        
        /* Double Cartela View */
        .cartela-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .cartela { background: #121d26; padding: 5px; border-radius: 8px; border: 1px solid #1c2b3a; }
        .p-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .p-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 2px; color: white; }
        .p-cell.marked { background: var(--neon); color: black; font-weight: bold; animation: pop 0.3s; }

        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }

        #bingo-msg { position: fixed; inset: 0; background: rgba(0,255,204,0.8); color: black; display: none; align-items: center; justify-content: center; font-size: 50px; font-weight: 900; z-index: 6000; }
    </style>
</head>
<body onload="init()">

    <div id="bingo-msg">BINGO!</div>

    <div id="countdown" class="countdown-overlay">
        <h2 style="color:white; margin-bottom: 20px;">ጨዋታው ሊጀምር ነው...</h2>
        <div class="timer-circle" id="timer-val">30</div>
    </div>

    <div id="slot-screen">
        <div class="top-info">
            <div class="info-box"><label>PLAYER</label><span>@User</span></div>
            <div class="info-box"><label>SELECTED</label><span id="select-count">0 / 2</span></div>
            <div class="info-box"><label>STATUS</label><span id="status-txt">WAITING</span></div>
        </div>
        <div class="slot-grid" id="grid-500"></div>
        <button onclick="startCountdown()" id="start-btn" style="padding:15px; background:var(--neon); border:none; font-weight:bold; display:none;">ጨዋታውን አስጀምር</button>
    </div>

    <div id="game-ui">
        <div class="top-info">
            <div class="info-box"><label>SLOTS</label><span id="ui-my-slots">--</span></div>
            <div class="info-box"><label>CALLED</label><span id="ui-called">0</span></div>
            <div class="info-box"><label>BALL</label><span id="ui-last-ball">--</span></div>
        </div>
        <div class="main-layout">
            <div class="board-container"><div id="full-board" class="numbers-grid"></div></div>
            <div class="right-side">
                <div class="ball-display" id="current-ball">--</div>
                <div class="cartela-pair" id="my-cards-area">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let mySelectedSlots = [];
        let myCardsData = {}; // {slotNum: [numbers]}
        let drawnBalls = [];
        let isGameLive = false;

        function init() {
            renderSlots();
        }

        function renderSlots() {
            const grid = document.getElementById('grid-500');
            grid.innerHTML = "";
            for(let i=1; i<=500; i++) {
                grid.innerHTML += `<div class="slot" id="slot-${i}" onclick="toggleSlot(${i})">${i}</div>`;
            }
            window.listenToSlots((taken) => {
                for(let s in taken) { 
                    let el = document.getElementById('slot-'+s);
                    if(el) el.classList.add('taken');
                }
            });
        }

        function toggleSlot(n) {
            if(isGameLive) return;
            let el = document.getElementById('slot-'+n);
            if(el.classList.contains('taken')) return;

            if(mySelectedSlots.includes(n)) {
                mySelectedSlots = mySelectedSlots.filter(s => s !== n);
                el.classList.remove('selected');
            } else {
                if(mySelectedSlots.length >= 2) return alert("ከ 2 በላይ መምረጥ አይችሉም!");
                mySelectedSlots.push(n);
                el.classList.add('selected');
            }
            document.getElementById('select-count').innerText = `${mySelectedSlots.length} / 2`;
            document.getElementById('start-btn').style.display = mySelectedSlots.length > 0 ? 'block' : 'none';
        }

        async function startCountdown() {
            document.getElementById('countdown').style.display = 'flex';
            let sec = 30;
            let interval = setInterval(() => {
                sec--;
                document.getElementById('timer-val').innerText = sec;
                if(sec <= 0) {
                    clearInterval(interval);
                    launchGame();
                }
            }, 1000);
        }

        function launchGame() {
            document.getElementById('countdown').style.display = 'none';
            document.getElementById('slot-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            isGameLive = true;

            // Generate 2 Cards
            const container = document.getElementById('my-cards-area');
            container.innerHTML = "";
            mySelectedSlots.forEach(slot => {
                let nums = generateBingoCard();
                myCardsData[slot] = nums;
                renderCard(slot, nums);
            });

            // Setup Main Board
            const fb = document.getElementById('full-board');
            fb.innerHTML = "";
            for(let i=1; i<=75; i++) fb.innerHTML += `<div class="num" id="n-${i}">${i}</div>`;

            // Start Ball Listening
            window.listenToGame((data) => {
                if(data.ball) {
                    document.getElementById('current-ball').innerText = data.ball;
                    document.getElementById('ui-last-ball').innerText = data.ball;
                    drawnBalls = data.history || [];
                    document.getElementById('ui-called').innerText = drawnBalls.length;
                    updateUI();
                }
            });

            // Simulator (ለሙከራ ያህል እጣ የሚያወጣ)
            startSimulation();
        }

        function generateBingoCard() {
            let nums = [];
            while(nums.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!nums.includes(r)) nums.push(r);
            }
            return nums;
        }

        function renderCard(slot, nums) {
            let cardHtml = `<div class="cartela">
                <div style="font-size:10px; color:var(--neon); text-align:center;">SLOT ${slot}</div>
                <div class="p-grid">`;
            nums.forEach((n, i) => {
                let
