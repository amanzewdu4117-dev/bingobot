<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Bingo Pro - Elite Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #030812;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --purple: #9d50bb;
            --orange: #ff9d00;
            --b-clr: #00d2ff; --i-clr: #ff00d4; --n-clr: #ff3e3e; --g-clr: #00ff85; --o-clr: #ffae00;
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #0a192f 0%, #030812 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; overflow: hidden; height: 100vh; 
        }

        .top-status-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 15px; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border);
        }

        .logo-text {
            font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(to right, var(--accent), var(--purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #slots-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; }
        .slot-btn { height: 50px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; }
        .slot-btn.selected { background: linear-gradient(135deg, var(--accent), #0066ff); border-color: #fff; box-shadow: 0 0 15px var(--accent); }
        .slot-btn.occupied { border: 2px solid var(--purple); position: relative; }
        .slot-btn.occupied::after { content: '👤'; position: absolute; top: -5px; right: -2px; font-size: 8px; }

        #selection-preview {
            height: 120px; background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid var(--glass-border); display: flex; 
            gap: 12px; padding: 10px 15px; overflow-x: auto; align-items: center;
        }

        .mini-card {
            min-width: 85px; background: var(--glass); border: 1px solid var(--accent);
            border-radius: 8px; padding: 5px; flex-shrink: 0;
        }

        .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .mini-cell { background: rgba(255, 255, 255, 0.05); height: 10px; font-size: 6px; display: flex; align-items: center; justify-content: center; border-radius: 1px; }

        .ball-display { height: 90px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 20px; margin: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        #ball-num { font-size: 60px; font-weight: 900; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
        .board-side { flex: 1.5; background: var(--glass); border-radius: 15px; padding: 12px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .num-cell { background: rgba(255,255,255,0.03); height: 32px; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 6px; color: #5a7b9d; }
        .num-cell.called { background: var(--orange); color: #000; font-weight: 900; box-shadow: 0 0 10px var(--orange); }
        
        .active-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; padding: 6px; margin-bottom: 10px; }
        .card-cell { background: rgba(0,0,0,0.3); height: 22px; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 3px; }
        .card-cell.hit { background: var(--accent); color: #000; font-weight: bold; }
        .card-cell.hit.free { background: var(--purple); color: #fff; }
        .card-header-grid { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: 900; font-size: 9px; margin-bottom: 3px; }

        .no-cards-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80%; text-align: center; padding: 20px; }
        .no-cards-icon { font-size: 50px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--purple)); animation: float 3s ease-in-out infinite; }
        .next-round-btn { margin-top: 25px; padding: 10px 20px; background: linear-gradient(135deg, var(--purple), #6a11cb); border: none; border-radius: 25px; color: white; font-weight: bold; font-size: 12px; }
        
        #winner-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 8, 18, 0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .winner-card { background: var(--glass); padding: 30px; border-radius: 30px; border: 2px solid var(--accent); text-align: center; animation: zoomIn 0.5s; }
        
        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden { display: none !important; }
        .cl-b { color: var(--b-clr); } .cl-i { color: var(--i-clr); } .cl-n { color: var(--n-clr); } .cl-g { color: var(--g-clr); } .cl-o { color: var(--o-clr); }
    </style>
</head>
<body>

    <div id="winner-overlay">
        <div class="winner-card">
            <h1 style="margin:0; font-size:40px; color:var(--accent);">BINGO!</h1>
            <p id="win-msg" style="font-size:18px; margin:15px 0; color:#fff;"></p>
            <div style="font-size:12px; color:#888;">ቀጣይ ጨዋታ በ <span id="restart-timer" style="color:var(--orange); font-weight:bold;">5</span> ሰከንድ ይጀምራል...</div>
        </div>
    </div>

    <div class="top-status-bar">
        <div class="logo-text">AMAN BINGO PRO</div>
        <div style="font-size: 12px;">ካርቴላ፦ <span id="total-count" style="color:var(--accent); font-weight:bold;">0</span></div>
        <div style="color: var(--accent); font-weight: bold;"><span id="balance">100.00</span> ETB</div>
    </div>

    <div id="selection-page" style="display:flex; flex-direction:column; height: calc(100vh - 50px);">
        <div style="padding: 10px 20px; display:flex; justify-content:space-between; align-items:center;">
            <div style="display: flex; flex-direction: column;">
                <span style="color:#888; font-size:11px;">ካርቴላ ይምረጡ (Max 3)</span>
                <span style="color:var(--accent); font-size:10px;">የአንዱ ዋጋ: <span id="price-per-card">10</span> ETB</span>
            </div>
            <div style="text-align: right;">
                <div id="timer" style="background:var(--orange); color:#000; padding:2px 10px; border-radius:20px; font-weight:900;">15</div>
                <div style="font-size: 9px; color: #888; margin-top: 2px;">TIME IN</div>
            </div>
        </div>
        <div id="slots-grid"></div>
        <div id="selection-preview">
            <div style="color:#444; width:100%; text-align:center; font-size:11px;">የመረጧቸው ካርቴላዎች እዚህ ይታያሉ</div>
        </div>
    </div>

    <div id="game-page" class="hidden" style="flex-direction:column; height: calc(100vh - 50px);">
        <div class="ball-display">
            <div id="ball-let" style="font-size: 40px; font-weight: 900;">-</div>
            <div id="ball-num">--</div>
        </div>
        <div style="display:flex; gap:10px; padding:0 15px 15px 15px; flex:1; overflow:hidden;">
            <div class="board-side">
                <div class="card-header-grid">
                    <span class="cl-b">B</span><span class="cl-i">I</span><span class="cl-n">N</span><span class="cl-g">G</span><span class="cl-o">O</span>
                </div>
                <div id="main-board" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:4px; flex:1; overflow-y:auto;"></div>
            </div>
            <div class="cards-side" id="player-area" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>

<script>
    // --- Firebase Initialization ---
    const firebaseConfig = {
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com/"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // --- State Variables ---
    let userCards = JSON.parse(localStorage.getItem('aman_user_cards')) || [];
    let cardData = JSON.parse(localStorage.getItem('aman_card_data')) || {};
    let allSelectedCards = JSON.parse(localStorage.getItem('aman_all_selected')) || [];
    let currentBalance = parseFloat(localStorage.getItem('aman_bingo_bal')) || 100.00;
    
    let othersCount = 0, gameActive = false;
    let calledNumbers = new Set();
    const cardPrice = 10.00;

    function saveState() {
        localStorage.setItem('aman_user_cards', JSON.stringify(userCards));
        localStorage.setItem('aman_card_data', JSON.stringify(cardData));
        localStorage.setItem('aman_all_selected', JSON.stringify(allSelectedCards));
        localStorage.setItem('aman_bingo_bal', currentBalance);
    }

    function clearState() {
        localStorage.removeItem('aman_user_cards');
        localStorage.removeItem('aman_card_data');
        localStorage.removeItem('aman_all_selected');
    }

    function generateCard() {
        let card = []; let ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
        for(let c=0; c<5; c++) {
            let col = [];
            while(col.length<5) {
                let n = Math.floor(Math.random()*15)+ranges[c][0];
                if(!col.includes(n)) col.push(n);
            }
            card.push(col.sort((a,b)=>a-b));
        }
        return card;
    }

    function updatePreview() {
        const preview = document.getElementById('selection-preview');
        if(userCards.length === 0) {
            preview.innerHTML = '<div style="color:#444; width:100%; text-align:center; font-size:11px;">የመረጧቸው ካርቴላዎች እዚህ ይታያሉ</div>';
            return;
        }
        preview.innerHTML = "";
        userCards.forEach(id => {
            let d = cardData[id];
            if(!d) return;
            let h = `<div class="mini-card">
                <div style="color:var(--accent); font-size:9px; font-weight:900; margin-bottom:2px; text-align:center;">#${id}</div>
                <div class="mini-grid" style="margin-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <div class="mini-cell" style="color:var(--b-clr); font-weight:900; background:none;">B</div>
                    <div class="mini-cell" style="color:var(--i-clr); font-weight:900; background:none;">I</div>
                    <div class="mini-cell" style="color:var(--n-clr); font-weight:900; background:none;">N</div>
                    <div class="mini-cell" style="color:var(--g-clr); font-weight:900; background:none;">G</div>
                    <div class="mini-cell" style="color:var(--o-clr); font-weight:900; background:none;">O</div>
                </div>
                <div class="mini-grid">`;
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    let v = (r===2 && c===2) ? "F" : d[c][r];
                    h += `<div class="mini-cell">${v}</div>`;
                }
            }
            preview.innerHTML += h + `</div></div>`;
        });
    }

    // --- የታይመር እና የካርቴላ Logic (የተስተካከለ) ---
    function init() {
        const grid = document.getElementById('slots-grid');
        grid.innerHTML = "";
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
        const timerElement = document.getElementById('timer');
        
        let timerInterval;

        // 1. ታይመሩን ከ Firebase ጋር ማመሳሰል
        db.ref('liveGame/timerStartTime').on('value', (snap) => {
            let startTime = snap.val();
            if(timerInterval) clearInterval(timerInterval);

            if(!startTime) {
                timerElement.innerText = "15";
                return;
            }

            timerInterval = setInterval(() => {
                let now = Date.now();
                let elapsed = Math.floor((now - startTime) / 1000);
                let remaining = 15 - elapsed;

                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    timerElement.innerText = "0";
                    if(!gameActive) start();
                } else {
                    timerElement.innerText = remaining;
                }
            }, 1000);
        });

        // 2. ካርቴላዎችን የመፍጠር Logic
        for(let i=1; i<=500; i++) {
            let b = document.createElement('div');
            b.className = 'slot-btn'; b.innerText = i;
            if(allSelectedCards.includes(i) && !userCards.includes(i)) b.classList.add('occupied');
            if(userCards.includes(i)) b.classList.add('selected');
            
            b.onclick = () => {
                if(b.classList.contains('occupied') || gameActive) return;
                if(userCards.includes(i)) {
                    currentBalance += cardPrice;
                    userCards = userCards.filter(x => x !== i);
                    allSelectedCards = allSelectedCards.filter(x => x !== i);
                    b.classList.remove('selected');
                } else if(userCards.length < 3) {
                    if(currentBalance >= cardPrice) {
                        currentBalance -= cardPrice;
                        userCards.push(i);
                        allSelectedCards.push(i);
                        cardData[i] = generateCard();
                        b.classList.add('selected');
                    }
                }
                document.getElementById('balance').innerText = currentBalance.toFixed(2);
                saveState(); updatePreview();
            };
            grid.appendChild(b);
        }
        updatePreview();
    }

    function start() {
        gameActive = true;
        document.getElementById('selection-page').classList.add('hidden');
        document.getElementById('game-page').classList.remove('hidden');
        document.getElementById('game-page').style.display = 'flex';
        
        const board = document.getElementById('main-board');
        board.innerHTML = "";
        for(let r=0; r<15; r++) {
            for(let c=0; c<5; c++) {
                let n = (c*15)+r+1;
                board.innerHTML += `<div class="num-cell" id="n-${n}">${n}</div>`;
            }
        }

        const area = document.getElementById('player-area');
        area.innerHTML = "";

        if (userCards.length === 0) {
            area.innerHTML = `<div class="no-cards-container">
                <div class="no-cards-icon">🎫</div>
                <div class="no-cards-title">ካርቴላ አልመረጡም!</div>
                <div class="no-cards-sub">በዚህ ዙር አልተሳተፉም።</div>
                <div class="next-round-btn" onclick="clearAndReload()">ለሚቀጥለው ተዘጋጅ</div>
            </div>`;
        } else {
            userCards.forEach(id => {
                let d = cardData[id];
                let h = `<div class="active-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                        <span style="font-size:10px; color:var(--accent); font-weight:bold;">CARD #${id}</span>
                    </div>
                    <div class="card-header-grid" style="font-size:10px; margin-bottom:3px;">
                        <span class="cl-b">B</span><span class="cl-i">I</span><span class="cl-n">N</span><span class="cl-g">G</span><span class="cl-o">O</span>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:3px;">`;
                for(let row=0; row<5; row++) {
                    for(let col=0; col<5; col++) {
                        let v = (row===2 && col===2) ? "F" : d[col][row];
                        let cls = v === "F" ? "card-cell hit free" : "card-cell";
                        h += `<div class="${cls}" data-card="${id}" data-val="${v}">${v}</div>`;
                    }
                }
                area.innerHTML += h + `</div></div>`;
            });
        }
        play();
    }

    function checkWin(id) {
        let card = cardData[id];
        if(!card) return false;
        let grid = Array(5).fill().map(() => Array(5).fill(false));
        for(let c=0; c<5; c++) for(let r=0; r<5; r++) if((c===2 && r===2) || calledNumbers.has(card[c][r])) grid[r][c] = true;
        for(let i=0; i<5; i++) {
            if(grid[i].every(v => v)) return true;
            if(grid.every(row => row[i])) return true;
        }
        if([0,1,2,3,4].every(i => grid[i][i])) return true;
        if([0,1,2,3,4].every(i => grid[i][4-i])) return true;
        return false;
    }

    function applyNumber(n) {
        if (!n || calledNumbers.has(n)) return;
        calledNumbers.add(n);
        let boardCell = document.getElementById(`n-${n}`);
        if(boardCell) boardCell.classList.add('called');
        document.getElementById('ball-num').innerText = n;
        let letter = n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
        document.getElementById('ball-let').innerText = letter;
        document.querySelectorAll(`[data-val="${n}"]`).forEach(el => el.classList.add('hit'));
        if (gameActive) {
            for(let id of allSelectedCards) {
                if(checkWin(id)) { 
                    showWinner(id, userCards.includes(id)); 
                    break; 
                }
            }
        }
    }

    function play() {
        db.ref('liveGame/history').once('value', (snap) => {
            const history = snap.val();
            if (history) Object.values(history).forEach(n => applyNumber(n));
        });
        db.ref('liveGame/currentNumber').on('value', (snap) => {
            let n = snap.val();
            if(n && gameActive) applyNumber(n);
        });
    }

    function showWinner(id, isUser = false) {
        gameActive = false;
        document.getElementById('winner-overlay').style.display = 'flex';
        if(isUser) currentBalance += 50; 
        document.getElementById('win-msg').innerHTML = isUser ? 
            `እንኳን ደስ አለህ! <br> ካርቴላ #${id} አሸንፏል!` : 
            `ተጫዋች <span style="color:var(--orange);">#${id}</span> ቀድሞ በመስራት አሸንፏል!`;
        let rTime = 5;
        const rInt = setInterval(() => {
            rTime--;
            document.getElementById('restart-timer').innerText = rTime;
            if(rTime <= 0) { 
                clearInterval(rInt); 
                clearAndReload();
            }
        }, 1000);
    }

    function clearAndReload() {
        clearState();
        localStorage.setItem('aman_bingo_bal', currentBalance);
        location.reload();
    }

    window.onload = () => {
        document.getElementById('balance').innerText = currentBalance.toFixed(2);
        init();
    };
</script>
    
    
</body>
</html>
