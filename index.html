<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VamosBingo Pro Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111b; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .profile-bar { background: #162133; border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid #2a3a52; }
        .avatar { width: 40px; height: 40px; background: #00ffcc; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0b111b; }
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #162133; border: 1px solid #2a3a52; border-radius: 10px; padding: 5px; text-align: center; }
        .stat-label { font-size: 8px; color: #4cafaf; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: bold; color: #00ffcc; }
        .slot-section { background: #162133; border-radius: 20px; padding: 15px; border: 1px solid #2a3a52; display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .scroll-area { overflow-y: auto; flex: 1; padding-right: 5px; }
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
        .slot-item { background: #1c283d; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; font-weight: bold; color: #a0b0c0; cursor: pointer; border: 1px solid transparent; }
        .slot-item.selected { border-color: #ff9800; color: white; background: #ff980033; }
        .slot-item.called { background: #2ecc71 !important; color: white !important; box-shadow: 0 0 10px #2ecc71; }
        .footer-cards { display: flex; gap: 10px; height: 160px; margin-top: 10px; }
        .mini-card { background: #1c283d; border: 1px solid #2a3a52; border-radius: 15px; flex: 1; padding: 8px; display: flex; flex-direction: column; position: relative; }
        .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; flex: 1; }
        .m-cell { background: #24344d; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 9px; font-weight: bold; }
        .m-cell.hit { background: #ff9800 !important; color: black !important; }
        #bingo-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2ecc71; padding: 20px 40px; border-radius: 15px; font-size: 40px; font-weight: bold; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div id="bingo-msg">BINGO!</div>

    <div class="profile-bar">
        <div class="avatar">@</div>
        <div class="user-info"><b>@Amanuuu1</b><br><small style="font-size: 8px; color: #4cafaf;">ROUND #22164</small></div>
    </div>

    <div class="stats-bar">
        <div class="stat-box"><div class="stat-label">Closes In</div><div id="timer" class="stat-value">00:45</div></div>
        <div class="stat-box"><div class="stat-label">Cartela</div><div id="cartela-label" class="stat-value">--</div></div>
        <div class="stat-box"><div class="stat-label">Wallet</div><div class="stat-value">40 ETB</div></div>
    </div>

    <div class="slot-section">
        <div class="scroll-area"><div class="grid-500" id="slot-grid"></div></div>
    </div>

    <div class="footer-cards" id="footer-cards"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selected = [], allCards = [], isPlaying = false, called = new Set(), timeLeft = 45;
        let timerInt, drawInt;

        function initData() {
            for(let i=0; i<500; i++) {
                let card = [];
                let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for(let col=0; col<5; col++) {
                    let colNums = [];
                    while(colNums.length < 5) {
                        let r = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                        if(!colNums.includes(r)) colNums.push(r);
                    }
                    card.push(colNums);
                }
                allCards.push(card);
            }
        }

        function createGrid() {
            const grid = document.getElementById('slot-grid');
            for(let i=1; i<=500; i++) {
                const div = document.createElement('div');
                div.className = 'slot-item'; div.id = `slot-${i}`; div.textContent = i;
                div.onclick = () => {
                    if(isPlaying) return;
                    if(selected.includes(i)) { selected = selected.filter(n => n !== i); div.classList.remove('selected'); }
                    else if(selected.length < 2) { selected.push(i); div.classList.add('selected'); }
                    updateCards();
                };
                grid.appendChild(div);
            }
        }

        function updateCards() {
            document.getElementById('cartela-label').textContent = selected.join(', ') || '--';
            const footer = document.getElementById('footer-cards');
            footer.innerHTML = "";
            selected.forEach(id => {
                const card = allCards[id-1];
                const cardDiv = document.createElement('div'); cardDiv.className = 'mini-card';
                cardDiv.innerHTML = `<div style="font-size:8px; color:#ff9800; margin-bottom:5px;">Cartela ${id}</div><div class="mini-grid" id="grid-${id}"></div>`;
                footer.appendChild(cardDiv);
                const g = document.getElementById(`grid-${id}`);
                for(let r=0; r<5; r++) {
                    for(let c=0; c<5; c++) {
                        const cell = document.createElement('div'); cell.className = 'm-cell';
                        if(r===2 && c===2) { cell.innerHTML = "★"; cell.style.color="#2ecc71"; }
                        else { let val = card[c][r]; cell.textContent = val; cell.id = `c-${id}-v-${val}`; }
                        g.appendChild(cell);
                    }
                }
            });
        }

        function startTimer() {
            timerInt = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if(timeLeft <= 0) { clearInterval(timerInt); startRound(); }
            }, 1000);
        }

        function startRound() {
            if(selected.length === 0) { // ካልመረጡ በራንደም 2 ይምረጥ
                while(selected.length < 2) {
                    let r = Math.floor(Math.random() * 500) + 1;
                    if(!selected.includes(r)) { selected.push(r); document.getElementById(`slot-${r}`).classList.add('selected'); }
                }
                updateCards();
            }
            isPlaying = true;
            drawInt = setInterval(() => {
                if(called.size >= 75) { clearInterval(drawInt); return; }
                let draw; do { draw = Math.floor(Math.random() * 75) + 1; } while(called.has(draw));
                called.add(draw);
                document.getElementById(`slot-${draw}`)?.classList.add('called');
                selected.forEach(id => {
                    document.getElementById(`c-${id}-v-${draw}`)?.classList.add('hit');
                });
                // እዚህ ጋር የቢንጎ ቼክ መጨመር ይቻላል
            }, 1000);
        }

        initData();
        createGrid();
        startTimer();
    </script>
</body>
</html>
