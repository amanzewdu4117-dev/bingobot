<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO FIXED</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>
    <style>
        :root { --bg: #0b141a; --neon: #00ffcc; --orange: #ff7e21; --border: #1c2b3a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; padding: 10px; }
        .header { display: flex; justify-content: space-between; padding: 10px; background: #0d161d; border-radius: 10px; margin-bottom: 10px; }
        .game-grid { display: grid; grid-template-columns: 80px 1fr; gap: 10px; height: 85vh; }
        .board-left { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; background: #111b21; padding: 5px; border-radius: 8px; overflow-y: auto; }
        .num-dot { font-size: 9px; background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #3a4d5e; }
        .num-dot.active { background: var(--orange); color: white; }
        .ball-display { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .big-val { font-size: 60px; font-weight: bold; color: var(--neon); }
        .card { background: #16212a; padding: 10px; border-radius: 10px; border: 1px solid #253341; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 12px; }
        .cell.hit { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body onload="setupGame()">

    <div class="header">
        <div>Slots: <span id="slots-val" style="color:var(--neon)">19, 108</span></div>
        <div id="status" style="color:var(--orange)">READY</div>
    </div>

    <div class="game-grid">
        <div class="board-left" id="board-left"></div>
        <div style="overflow-y:auto">
            <div class="ball-display">
                <div class="big-val" id="big-ball">--</div>
                <div style="font-size:10px; color:var(--neon)">CURRENT BALL</div>
            </div>
            <div id="cards-container"></div>
        </div>
    </div>

    <script>
        const myChoices = [19, 108]; // ምስሉ ላይ ያሉት ካርቴላዎች

        async function setupGame() {
            // 1-75 ቦርድ ፍጠር
            const bl = document.getElementById('board-left');
            for(let i=1; i<=75; i++) bl.innerHTML += `<div class="num-dot" id="dot-${i}">${i}</div>`;

            // ካርቴላዎች ፍጠር
            const cc = document.getElementById('cards-container');
            myChoices.forEach(id => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                let h = `<div class="card"><div style="font-size:10px; margin-bottom:5px">CARTELA ${id}</div><div class="c-grid">`;
                nums.forEach((n, idx) => h += `<div class="cell" id="c-${id}-${n}">${idx==12?'★':n}</div>`);
                cc.innerHTML += h + `</div></div><br>`;
            });

            // የድሮ ዳታ አጽዳ እና ማዳመጥ ጀምር
            await deleteDoc(doc(window.db, "live_bingo", "current"));
            window.listenToGame(data => {
                document.getElementById('big-ball').innerText = data.ball || "--";
                (data.history || []).forEach(n => {
                    document.getElementById(`dot-${n}`)?.classList.add('active'); // ግራ በኩል ያበራል
                    myChoices.forEach(id => document.getElementById(`c-${id}-${n}`)?.classList.add('hit')); // ካርቴላ ላይ
                });
            });

            // እጣ ማውጣት አስጀምር
            startDrawing();
        }

        async function startDrawing() {
            document.getElementById('status').innerText = "LIVE DRAW";
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let history = [];
            
            for (let b of pool) {
                history.push(b);
                try {
                    await setDoc(doc(window.db, "live_bingo", "current"), { ball: b, history: history });
                } catch(e) { console.error("Error drawing ball"); }
                await new Promise(r => setTimeout(r, 4000)); // በየ 4 ሰከንዱ
            }
        }
    </script>
</body>
</html>
