<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - AUTO SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // ማሳሰቢያ፡ apiKey የሚለውን በራስህ ቁጥር መተካትህን አትርሳ
        const firebaseConfig = {
            apiKey: "አንተ_ጋ_ያለውን_AIza_ቁጥር_እዚህ_አስገባ", 
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            storageBucket: "my-app-project-1e0bb.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.syncData = async (ball, history) => {
            try {
                await setDoc(doc(db, "live_bingo", "current"), { 
                    ball, history, status: "LIVE", timestamp: Date.now() 
                }, { merge: true });
            } catch (e) { console.error(e); }
        };

        window.listenData = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0d161d; --panel: #16212a; --neon: #00ffcc; --orange: #ff7e21; --dark-grey: #1c2732; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; padding: 10px; height: 100vh; overflow: hidden; }

        /* Header Styles */
        .header-box { background: var(--panel); padding: 12px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #253341; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .stat { background: var(--bg); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid #253341; }
        .stat label { font-size: 8px; color: #4e6a85; display: block; }
        .stat span { font-size: 14px; font-weight: 800; color: var(--neon); }

        /* Slot Network */
        .slot-section { background: var(--panel); border-radius: 20px; padding: 15px; height: calc(100vh - 200px); border: 1px solid #253341; }
        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; overflow-y: auto; height: 90%; padding-right: 5px; }
        .slot { aspect-ratio: 1; background: var(--dark-grey); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #788da1; cursor: pointer; border: 1px solid transparent; }
        .slot.selected { background: rgba(0, 255, 204, 0.2); border-color: var(--neon); color: var(--neon); font-size: 8px; text-align: center; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }

        /* Game Layout */
        #game-view { display: none; height: 100%; }
        .game-main { display: grid; grid-template-columns: 1.3fr 1fr; gap: 10px; margin-top: 15px; height: calc(100vh - 120px); }
        .board-wrap { background: var(--panel); border-radius: 20px; padding: 10px; display: flex; flex-direction: column; }
        .bingo-letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }
        .let { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 900; font-size: 12px; }
        .B { background: #1a99d5; } .I { background: #9c27b0; } .N { background: #e91e63; } .G { background: #009688; } .O { background: #ff9800; }
        
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; overflow-y: auto; }
        .n-cell { background: var(--dark-grey); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #4e6a85; }
        .n-cell.active { background: var(--orange); color: white; box-shadow: 0 0 10px var(--orange); }

        .ball-side { display: flex; flex-direction: column; gap: 10px; }
        .big-ball { background: #000; border: 2px solid #1c2b3a; border-radius: 20px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ball-val { font-size: 50px; font-weight: 900; color: white; }
        .ball-tag { background: #9c27b0; padding: 2px 12px; border-radius: 8px; font-size: 10px; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- 1. Slot Selection (ካርቴላ መምረጫ) -->
    <div id="setup-view">
        <div class="header-box">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:40px; height:40px; background:#00bcd4; border-radius:8px; display:flex; align-items:center; justify-content:center;">@</div>
                <div><h4 id="user-name">@Amanuuu1</h4><p style="font-size:9px; color:#4e6a85;">SELECT A SLOT TO ENTER GAME</p></div>
            </div>
            <div class="stats-grid">
                <div class="stat"><label>CLOSES IN</label><span id="timer-setup">00:15</span></div>
                <div class="stat"><label>MY SLOT</label><span id="ui-my-slot">0</span></div>
                <div class="stat" style="border-color:#ff4444;"><label style="color:#ff4444;">WALLET</label><span>40 ETB</span></div>
            </div>
        </div>

        <div class="slot-section">
            <div class="slot-grid" id="slot-container"></div>
        </div>
    </div>

    <!-- 2. Live Game (ጨዋታው ሲጀመር) -->
    <div id="game-view">
        <div class="stats-grid" style="margin-bottom:10px;">
            <div class="stat"><label>BALL</label><span id="top-ball">--</span></div>
            <div class="stat"><label>SLOT</label><span id="top-slot">0</span></div>
            <div class="stat"><label>CALLED</label><span id="top-called">0</span></div>
        </div>

        <div class="game-main">
            <div class="board-wrap">
                <div class="bingo-letters">
                    <div class="let B">B</div><div class="let I">I</div><div class="let N">N</div><div class="let G">G</div><div class="let O">O</div>
                </div>
                <div id="game-board" class="num-grid"></div>
            </div>
            <div class="ball-side">
                <div class="big-ball">
                    <div id="big-num" class="ball-val">--</div>
                    <div id="big-let" class="ball-tag">BINGO</div>
                </div>
                <div style="background:var(--panel); flex:1; border-radius:15px; border:1px dashed #253341; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:10px;">
                    <span style="font-size:24px;">📡</span>
                    <p style="font-size:10px; color:#5c7894; margin-top:5px;">LIVE SYNC<br>እባክዎን ይጠብቁ...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let mySlot = null;
        let drawn = [];
        let setupTime = 15;

        function init() {
            // 500 Slots ማመንጨት
            const container = document.getElementById('slot-container');
            for(let i=1; i<=500; i++) {
                const s = document.createElement('div');
                s.className = 'slot'; s.id = `s-${i}`; s.textContent = i;
                s.onclick = () => {
                    if(mySlot) document.getElementById(`s-${mySlot}`).classList.remove('selected');
                    mySlot = i;
                    s.classList.add('selected'); s.textContent = "@AMAN";
                    document.getElementById('ui-my-slot').textContent = i;
                };
                container.appendChild(s);
            }

            // 15 ሰከንድ ሲያልቅ በራሱ እንዲጀምር (Auto-Start)
            const count = setInterval(() => {
                setupTime--;
                document.getElementById('timer-setup').textContent = `00:${setupTime < 10 ? '0'+setupTime : setupTime}`;
                if(setupTime <= 0) {
                    clearInterval(count);
                    if(mySlot) startLiveGame();
                    else alert("ምንም ካርቴላ አልመረጡም!");
                }
            }, 1000);
        }

        function startLiveGame() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('top-slot').textContent = mySlot;

            // ቦርዱን መሙላት (1-75)
            const board = document.getElementById('game-board');
            for(let n=1; n<=75; n++) {
                const c = document.createElement('div');
                c.className = 'n-cell'; c.id = `num-${n}`; c.textContent = n;
                board.appendChild(c);
            }

            // Firebase ማዳመጥ
            window.listenData((data) => {
                drawn = data.history || [];
                const last = data.ball;
                document.getElementById('top-ball').textContent = last;
                document.getElementById('big-num').textContent = last;
                document.getElementById('top-called').textContent = drawn.length;

                drawn.forEach(num => {
                    const el = document.getElementById(`num-${num}`);
                    if(el) el.classList.add('active');
                });

                // የፊደል ታግ መቀየር
                let l = "BINGO";
                if(last <= 15) l="B"; else if(last <= 30) l="I"; else if(last <= 45) l="N"; else if(last <= 60) l="G"; else if(last <= 75) l="O";
                document.getElementById('big-let').textContent = l;
            });

            // እጣ ማውጫ ኢንጂን
            let p = [];
            setInterval(async () => {
                if(p.length >= 75) return;
                let b; do { b = Math.floor(Math.random()*75)+1; } while(p.includes(b));
                p.push(b);
                await window.syncData(b, p);
            }, 3500);
        }

        init();
    </script>
</body>
</html>
