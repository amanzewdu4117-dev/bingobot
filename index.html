<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VamosBingo Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111b; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Top Profile Section */
        .profile-bar { background: #162133; border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid #2a3a52; }
        .avatar { width: 40px; height: 40px; background: #00ffcc; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0b111b; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: bold; }
        .round-id { font-size: 8px; color: #4cafaf; }

        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .stat-box { background: #162133; border: 1px solid #2a3a52; border-radius: 10px; padding: 5px; text-align: center; }
        .stat-label { font-size: 8px; color: #4cafaf; text-transform: uppercase; }
        .stat-value { font-size: 14px; font-weight: bold; color: #00ffcc; }

        /* Slot Network (Scrollable Grid) */
        .slot-section { background: #162133; border-radius: 20px; padding: 15px; border: 1px solid #2a3a52; display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .slot-header { display: flex; justify-content: space-between; font-size: 10px; color: #4cafaf; margin-bottom: 10px; }
        .scroll-area { overflow-y: auto; flex: 1; padding-right: 5px; }
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
        .slot-item { background: #1c283d; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; font-weight: bold; color: #a0b0c0; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .slot-item.selected { border-color: #ff9800; color: white; background: #ff980033; box-shadow: 0 0 10px #ff980055; }
        .slot-item.called { background: #2ecc71 !important; color: white !important; }

        /* Selection Footer */
        .selection-title { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 12px; font-weight: bold; color: #a0b0c0; }
        .sel-count { background: #ff9800; color: black; padding: 2px 10px; border-radius: 10px; font-size: 10px; }
        
        .footer-cards { display: flex; gap: 10px; height: 160px; margin-bottom: 10px; }
        .mini-card { background: #1c283d; border: 1px solid #2a3a52; border-radius: 15px; flex: 1; padding: 8px; display: flex; flex-direction: column; }
        .mini-card-header { display: flex; justify-content: space-between; font-size: 8px; color: #ff9800; margin-bottom: 5px; }
        .bingo-letters { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-size: 9px; font-weight: bold; color: #4cafaf; margin-bottom: 4px; }
        .mini-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; flex: 1; }
        .m-cell { background: #24344d; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 9px; font-weight: bold; }
        .m-cell.hit { background: #ff9800 !important; color: black !important; }
        .m-cell.star { color: #2ecc71; font-size: 12px; }

        /* Scrollbar Style */
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="profile-bar">
        <div class="avatar">@</div>
        <div class="user-info">
            <div class="user-name">@Amanuuu1</div>
            <div class="round-id">ROUND #22164 • ID: 384408623</div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-box"><div class="stat-label">Closes In</div><div id="timer" class="stat-value">00:45</div></div>
        <div class="stat-box"><div class="stat-label">Cartela</div><div id="cartela-label" class="stat-value">--</div></div>
        <div class="stat-box"><div class="stat-label">Wallet</div><div class="stat-value">40 ETB</div></div>
    </div>

    <div class="slot-section">
        <div class="slot-header">
            <span>🟠 SLOT NETWORK</span>
            <span>TOTAL ACTIVE: 500</span>
        </div>
        <div class="scroll-area">
            <div class="grid-500" id="slot-grid"></div>
        </div>
    </div>

    <div class="selection-title">
        <span>SELECTION</span>
        <span class="sel-count" id="sel-badge">0/2</span>
    </div>

    <div class="footer-cards" id="footer-cards">
        <!-- 2 Selected Cards show here -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let selected = [], allCards = [], isPlaying = false, called = new Set();

        // 500 ካርቴላዎችን ማመንጫ (B-I-N-G-O ፎርማት)
        function initData() {
            for(let i=1; i<=500; i++) {
                let card = [];
                let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                for(let col=0; col<5; col++) {
                    let colNums = [];
                    while(colNums.length < 5) {
                        let r = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                        if(!colNums.includes(r)) colNums.push(r);
                    }
                    card.push(colNums);
                }
                allCards.push(card);
            }
        }

        function createGrid() {
            const grid = document.getElementById('slot-grid');
            for(let i=1; i<=500; i++) {
                const div = document.createElement('div');
                div.className = 'slot-item';
                div.textContent = i;
                div.onclick = () => {
                    if(isPlaying) return;
                    if(selected.includes(i)) {
                        selected = selected.filter(n => n !== i);
                        div.classList.remove('selected');
                    } else if(selected.length < 2) {
                        selected.push(i);
                        div.classList.add('selected');
                    }
                    updateUI();
                };
                grid.appendChild(div);
            }
        }

        function updateUI() {
            document.getElementById('sel-badge').textContent = selected.length + "/2";
            document.getElementById('cartela-label').textContent = selected.length > 0 ? selected.join(', ') : '--';
            
            const footer = document.getElementById('footer-cards');
            footer.innerHTML = "";
            selected.forEach(id => {
                const card = allCards[id-1];
                const cardDiv = document.createElement('div');
                cardDiv.className = 'mini-card';
                cardDiv.innerHTML = `
                    <div class="mini-card-header"><span>Cartela ${id}</span><span style="background:#2ecc7133; padding:10px 4px; border-radius:3px; color:#2ecc71; font-size:7px;">WINNER</span></div>
                    <div class="bingo-letters"><span>B</span><span>I</span><span>N</span><span>G</span><span>O</span></div>
                    <div class="mini-grid" id="grid-${id}"></div>
                `;
                footer.appendChild(cardDiv);
                const g = document.getElementById(`grid-${id}`);
                for(let r=0; r<5; r++) {
                    for(let c=0; c<5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'm-cell';
                        if(r===2 && c===2) { cell.innerHTML = "★"; cell.classList.add('star'); }
                        else { 
                            let val = card[c][r];
                            cell.textContent = val;
                            cell.id = `card-${id}-val-${val}`;
                        }
                        g.appendChild(cell);
                    }
                }
            });
        }

        initData();
        createGrid();
    </script>
</body>
</html>
