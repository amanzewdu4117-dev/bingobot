<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - MOBILE FIX</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        // የላይቭ ዳታ ማዳመጫ
        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --neon: #00ffcc; --orange: #ff7e21; --border: #1c2b3a; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Selection */
        #selection-page { height: 100vh; display: flex; flex-direction: column; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .slot { aspect-ratio: 1; background: #1a252f; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid #253341; font-size: 14px; }
        .slot.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,204,0.1); }

        /* Game */
        #game-page { display: none; grid-template-columns: 85px 1fr; gap: 8px; padding: 10px; height: 100vh; }
        .side-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; overflow-y: auto; background: #111b21; padding: 5px; border-radius: 10px; }
        .b-num { background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 4px; color: #3a4d5e; }
        .b-num.on { background: var(--orange); color: white; }
        
        .main-draw { text-align: center; }
        .big-ball { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 20px; font-size: 70px; font-weight: bold; color: var(--neon); margin-bottom: 10px; }
        .card { background: #16212a; padding: 10px; border-radius: 10px; border: 1px solid #253341; margin-top: 10px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 13px; }
        .cell.hit { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body onload="init()">

    <div id="selection-page">
        <div style="padding: 20px; text-align: center; border-bottom: 1px solid var(--border);">
            <div style="font-size: 12px; color: #788da1;">STARTS IN</div>
            <div id="timer" style="font-size: 24px; color: red; font-weight: bold;">00:10</div>
            <div id="sel-count" style="font-size: 14px; color: var(--neon); margin-top: 5px;">Selected: 0/2</div>
        </div>
        <div class="slot-grid" id="grid"></div>
    </div>

    <div id="game-page">
        <div class="side-board" id="side-board"></div>
        <div class="main-draw">
            <div class="big-ball" id="big-ball">--</div>
            <div id="cards-area"></div>
        </div>
    </div>

    <script>
        let mySlots = [];
        let timerVal = 10;

        function init() {
            const grid = document.getElementById('grid');
            for(let i=1; i<=800; i++) {
                let s = document.createElement('div');
                s.className = 'slot'; s.innerText = i;
                s.onclick = () => {
                    if(mySlots.includes(i)) mySlots = mySlots.filter(x => x!==i);
                    else if(mySlots.length < 2) mySlots.push(i);
                    s.classList.toggle('active');
                    document.getElementById('sel-count').innerText = "Selected: " + mySlots.length + "/2";
                };
                grid.appendChild(s);
            }
            let cd = setInterval(() => {
                timerVal--;
                document.getElementById('timer').innerText = "00:0" + timerVal;
                if(timerVal <= 0) { clearInterval(cd); startBingo(); }
            }, 1000);
        }

        async function startBingo() {
            if(mySlots.length === 0) { alert("እባክዎ መጀመሪያ ካርቴላ ይምረጡ!"); location.reload(); return; }
            document.getElementById('selection-page').style.display = 'none';
            document.getElementById('game-page').style.display = 'grid';

            // ሰሌዳ
            const sb = document.getElementById('side-board');
            for(let i=1; i<=75; i++) sb.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;
            
            // ካርቴላዎች
            const area = document.getElementById('cards-area');
            mySlots.forEach(id => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                let h = `<div class="card"><div class="c-grid">`;
                nums.forEach((n, idx) => h += `<div class="cell" id="c-${id}-${n}">${idx==12?'★':n}</div>`);
                area.innerHTML += h + `</div></div>`;
            });

            // Firebase Listen
            window.listenToGame(data => {
                document.getElementById('big-ball').innerText = data.ball || "--";
                (data.history || []).forEach(n => {
                    document.getElementById(`bn-${n}`)?.classList.add('on');
                    mySlots.forEach(id => document.getElementById(`c-${id}-${n}`)?.classList.add('hit'));
                });
            });

            // እጣ ማውጣት ጀምር
            runDraw();
        }

        async function runDraw() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let played = [];
            
            for (let ball of pool) {
                played.push(ball);
                try {
                    // ዳታውን እያንዳንዱን ቁጥር ለብቻው በየተራ ይልካል
                    await setDoc(doc(window.db, "live_bingo", "current"), { 
                        ball: ball, 
                        history: played 
                    });
                } catch(e) {
                    alert("Firebase Error! Rules አስተካክለሃል?");
                }
                await new Promise(r => setTimeout(r, 3000));
            }
        }
    </script>
</body>
</html>
