<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        :root { --bg: #0b1421; --panel: #162130; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 10px; height: 100vh; overflow: hidden; }

        /* Stats Header */
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-box { background: var(--panel); border: 1px solid #253341; border-radius: 10px; padding: 8px; text-align: center; }
        .stat-box label { font-size: 8px; color: var(--neon); display: block; margin-bottom: 4px; font-weight: bold; }
        .stat-box span { font-size: 13px; font-weight: 800; }

        .main-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; height: calc(100vh - 120px); }

        /* Left side: Full Number Board */
        .board-container { background: var(--panel); border-radius: 15px; padding: 5px; display: flex; flex-direction: column; border: 1px solid #1c2b3a; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 5px; }
        .letter { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 900; font-size: 10px; color: white; }
        .B { background: #1a99d5; } .I { background: #9c27b0; } .N { background: #e91e63; } .G { background: #009688; } .O { background: #ff9800; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 15fr); gap: 2px; overflow-y: auto; flex: 1; }
        .num { background: #1d2938; aspect-ratio: 1.1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 3px; color: #5c7894; }
        .num.active { background: var(--orange); color: white; }

        /* Right side: Ball and Personal Card */
        .right-side { display: flex; flex-direction: column; gap: 10px; }
        
        /* Top Right: Ball Display */
        .ball-display { background: #000; border: 1px solid #1c2b3a; border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .ball-num { font-size: 60px; font-weight: 900; line-height: 1; color: white; }
        .ball-letter-tag { background: #00bcd4; padding: 2px 15px; border-radius: 10px; font-size: 12px; margin-top: 5px; font-weight: bold; }

        /* Bottom Right: Personal 5x5 Card */
        .personal-card { background: var(--panel); border-radius: 15px; padding: 10px; border: 1px dashed #253341; flex: 1; }
        .personal-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .p-cell { aspect-ratio: 1; background: #0d161d; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #788da1; }
        .p-cell.star { color: var(--neon); font-size: 18px; }
        .p-cell.marked { background: var(--neon); color: black; box-shadow: 0 0 10px var(--neon); }

        .status-footer { font-size: 10px; color: #5c7894; text-align: center; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="stats-row">
        <div class="stat-box"><label>CARTELA</label><span id="ui-card-id">227</span></div>
        <div class="stat-box"><label>CALLED</label><span id="ui-called">0</span></div>
        <div class="stat-box"><label>WALLET</label><span>0</span></div>
        <div class="stat-box"><label>DERASH</label><span>1,816</span></div>
    </div>

    <div class="main-layout">
        <!-- Left: Full 1-75 Board -->
        <div class="board-container">
            <div class="bingo-header">
                <div class="letter B">B</div><div class="letter I">I</div><div class="letter N">N</div><div class="letter G">G</div><div class="letter O">O</div>
            </div>
            <div id="full-board" class="numbers-grid"></div>
        </div>

        <!-- Right: Ball and My 5x5 Card -->
        <div class="right-side">
            <div class="ball-display">
                <div id="ball-val" class="ball-num">--</div>
                <div id="ball-let" class="ball-letter-tag">BINGO</div>
            </div>

            <div class="personal-card">
                <p style="font-size: 9px; margin-bottom: 8px; color: var(--neon); text-align: center;">YOUR LIVE CARD</p>
                <div id="personal-grid" class="personal-grid">
                    <!-- 5x5 generated here -->
                </div>
                <div class="status-footer">
                    📡 <br> ዙሩ ተጀምሯል <br> እባክዎን ትንሽ ይጠብቁ::
                </div>
            </div>
        </div>
    </div>

    <script>
        let drawnNumbers = [];
        let myCardNumbers = [];

        // 1. Full 1-75 Board ማመንጨት
        function initFullBoard() {
            const board = document.getElementById('full-board');
            for(let i=1; i<=75; i++) {
                const d = document.createElement('div');
                d.className = 'num'; d.id = `n-${i}`; d.textContent = i;
                board.appendChild(d);
            }
        }

        // 2. የግል 5x5 ካርቴላ ማመንጨት (መሃሉ ኮከብ ያለው)
        function initPersonalCard() {
            const grid = document.getElementById('personal-grid');
            // ለሙከራ 24 የዘፈቀደ ቁጥሮችን ማመንጨት
            while(myCardNumbers.length < 24) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!myCardNumbers.includes(r)) myCardNumbers.push(r);
            }

            let cardIndex = 0;
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'p-cell';
                if(i === 12) { // መሃል ላይ ኮከብ
                    cell.innerHTML = "★";
                    cell.classList.add('star', 'marked');
                } else {
                    let num = myCardNumbers[cardIndex++];
                    cell.textContent = num;
                    cell.id = `p-num-${num}`;
                }
                grid.appendChild(cell);
            }
        }

        // 3. Auto-Logic (እጣው ሲወጣ በራሱ እንዲሞላ)
        function startAutoEngine() {
            let pool = Array.from({length: 75}, (_, i) => i + 1);
            
            setInterval(() => {
                if(pool.length === 0) return;
                
                // እጣ ማውጣት
                let idx = Math.floor(Math.random() * pool.length);
                let ball = pool.splice(idx, 1)[0];
                drawnNumbers.push(ball);

                // UI ማዘመን
                document.getElementById('ball-val').textContent = ball;
                document.getElementById('ui-called').textContent = drawnNumbers.length;
                
                // ፊደል መለየት
                let l = "O";
                if(ball <= 15) l="B"; else if(ball <= 30) l="I"; else if(ball <= 45) l="N"; else if(ball <= 60) l="G";
                document.getElementById('ball-let').textContent = l;

                // በሙሉው ቦርድ ላይ ማብራት
                const fullEl = document.getElementById(`n-${ball}`);
                if(fullEl) fullEl.classList.add('active');

                // በግል ካርቴላ ላይ ካለ ማብራት (Auto-fill)
                const personalEl = document.getElementById(`p-num-${ball}`);
                if(personalEl) personalEl.classList.add('marked');

            }, 4000); // በየ 4 ሰከንዱ እጣ ይወጣል
        }

        initFullBoard();
        initPersonalCard();
        startAutoEngine();
    </script>
</body>
</html>
