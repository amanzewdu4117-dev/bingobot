<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VamosBingo - Pro Layout</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050a10; --card-bg: #121a26; --accent: #00ffcc; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; height: 100vh; overflow: hidden; }
        
        /* Top Stats Bar */
        .top-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; }
        .stat-item { background: var(--card-bg); padding: 5px; border-radius: 8px; text-align: center; border: 1px solid #232d3d; }
        .stat-lbl { font-size: 7px; color: #4cafaf; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--accent); }

        /* Main Game Layout (Hidden initially) */
        #game-view { display: none; grid-template-columns: 1fr 1.2fr; gap: 10px; height: 85vh; }
        
        /* Left: Bingo Ball Tracker */
        .ball-tracker { background: var(--card-bg); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); text-align: center; font-weight: bold; margin-bottom: 5px; }
        .b-h { background: #1e88e5; border-radius: 4px; margin: 1px; padding: 2px; font-size: 10px;}
        .i-h { background: #8e24aa; border-radius: 4px; margin: 1px; padding: 2px; font-size: 10px;}
        .n-h { background: #d81b60; border-radius: 4px; margin: 1px; padding: 2px; font-size: 10px;}
        .g-h { background: #00897b; border-radius: 4px; margin: 1px; padding: 2px; font-size: 10px;}
        .o-h { background: #fb8c00; border-radius: 4px; margin: 1px; padding: 2px; font-size: 10px;}
        .track-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; overflow-y: auto; }
        .t-num { background: #1c283d; text-align: center; font-size: 10px; padding: 4px 0; border-radius: 4px; color: #6d7d92; }
        .t-num.on { background: var(--accent); color: #000; font-weight: bold; box-shadow: 0 0 8px var(--accent); }

        /* Right: Current Ball & Cards */
        .game-right { display: flex; flex-direction: column; gap: 10px; }
        .big-ball-box { background: var(--card-bg); border: 2px solid #1a2a3a; border-radius: 20px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .big-num { font-size: 60px; font-weight: 900; line-height: 1; }
        .last-call { background: #fb8c00; color: #000; padding: 2px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; margin-top: 5px; }
        
        .active-cards { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .play-card { background: var(--card-bg); border-radius: 12px; padding: 8px; border: 1px solid #232d3d; }
        .card-title { font-size: 10px; color: #fb8c00; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .p-cell { background: #1c283d; aspect-ratio: 1.2; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .p-cell.hit { background: var(--accent) !important; color: #000; }

        /* Selection View */
        #selection-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; overflow-y: auto; flex: 1; padding: 10px; }
        .slot { background: var(--card-bg); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 11px; border: 1px solid #232d3d; }
        .slot.active { border-color: #fb8c00; background: #fb8c0033; }
        .start-btn { background: var(--accent); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 10px; margin-top: 10px; cursor: pointer; }

        #win-overlay { position: fixed; inset: 0; background: rgba(0, 255, 204, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: #000; font-size: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="win-overlay">BINGO! 🏆</div>

<div class="top-bar">
    <div class="stat-item"><div class="stat-lbl">Cartela</div><div id="sel-count" class="stat-val">0</div></div>
    <div class="stat-item"><div class="stat-lbl">Called</div><div id="called-count" class="stat-val">0</div></div>
    <div class="stat-item"><div class="stat-lbl">Wallet</div><div class="stat-val">40</div></div>
    <div class="stat-item"><div class="stat-lbl">Derash</div><div class="stat-val">2,184</div></div>
</div>

<!-- Selection Screen -->
<div id="selection-view">
    <div style="text-align: center; color: #4cafaf; font-size: 12px; padding: 5px;">እባክዎ እስከ 2 ካርቴላ ይምረጡ</div>
    <div class="grid-500" id="slot-grid"></div>
    <button class="start-btn" onclick="manualStart()">Play Game</button>
</div>

<!-- Main Game Screen (Pic Layout) -->
<div id="game-view">
    <div class="ball-tracker">
        <div class="bingo-header">
            <div class="b-h">B</div><div class="i-h">I</div><div class="n-h">N</div><div class="g-h">G</div><div class="o-h">O</div>
        </div>
        <div class="track-grid" id="track-grid"></div>
    </div>

    <div class="game-right">
        <div class="big-ball-box">
            <div id="big-num" class="big-num">--</div>
            <div id="last-num" class="last-call">READY</div>
        </div>
        <div class="active-cards" id="active-cards"></div>
    </div>
</div>

<script>
    let selected = [], allCards = [], called = new Set(), isPlaying = false;
    let drawInt;

    // Initialize 500 Cards
    function init() {
        for(let i=0; i<500; i++) {
            let card = [];
            let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let col=0; col<5; col++) {
                let colNums = [];
                while(colNums.length < 5) {
                    let r = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                    if(!colNums.includes(r)) colNums.push(r);
                }
                card.push(colNums);
            }
            allCards.push(card);
        }

        // Fill Tracker Grid (Left Side)
        const track = document.getElementById('track-grid');
        for(let r=0; r<15; r++) {
            for(let c=0; c<5; c++) {
                let val = (c * 15) + (r + 1);
                let d = document.createElement('div');
                d.className = 't-num'; d.id = `track-${val}`; d.textContent = val;
                track.appendChild(d);
            }
        }

        // Fill 500 Selection Grid
        const grid = document.getElementById('slot-grid');
        for(let i=1; i<=500; i++) {
            let s = document.createElement('div');
            s.className = 'slot'; s.textContent = i;
            s.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(n => n !== i);
                    s.classList.remove('active');
                } else if(selected.length < 2) {
                    selected.push(i);
                    s.classList.add('active');
                }
                document.getElementById('sel-count').textContent = selected.length;
            };
            grid.appendChild(s);
        }
    }

    function manualStart() {
        if(selected.length === 0) {
            alert("እባክዎ ቢያንስ 1 ካርቴላ ይምረጡ!");
            return;
        }
        document.getElementById('selection-view').style.display = 'none';
        document.getElementById('game-view').style.display = 'grid';
        renderActiveCards();
        startGame();
    }

    function renderActiveCards() {
        const container = document.getElementById('active-cards');
        selected.forEach(id => {
            let card = allCards[id-1];
            let html = `<div class="play-card">
                <div class="card-title">Cartela ${id} <span style="color:#00ffcc">WINNER</span></div>
                <div class="card-grid">`;
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(r===2 && c===2) html += `<div class="p-cell hit" style="color:#000">★</div>`;
                    else html += `<div class="p-cell" id="p-${id}-v-${card[c][r]}">${card[c][r]}</div>`;
                }
            }
            html += `</div></div>`;
            container.innerHTML += html;
        });
    }

    function startGame() {
        isPlaying = true;
        drawInt = setInterval(() => {
            if(called.size >= 75) { clearInterval(drawInt); return; }
            
            let draw;
            do { draw = Math.floor(Math.random() * 75) + 1; } while(called.has(draw));
            called.add(draw);

            // Update UI
            document.getElementById('big-num').textContent = draw;
            document.getElementById('last-num').textContent = Array.from(called).slice(-2, -1)[0] || 'START';
            document.getElementById('called-count').textContent = called.size;
            document.getElementById(`track-${draw}`).classList.add('on');

            // Mark Cards
            selected.forEach(id => {
                let el = document.getElementById(`p-${id}-v-${draw}`);
                if(el) el.classList.add('hit');
            });

            checkBingo();
        }, 2000); // በየ 2 ሰከንዱ እጣ ይወጣል
    }

    function checkBingo() {
        const patterns = [
            [[0,0],[0,1],[0,2],[0,3],[0,4]], [[1,0],[1,1],[1,2],[1,3],[1,4]], [[2,0],[2,1],[2,2],[2,3],[2,4]], [[3,0],[3,1],[3,2],[3,3],[3,4]], [[4,0],[4,1],[4,2],[4,3],[4,4]], // Rows
            [[0,0],[1,0],[2,0],[3,0],[4,0]], [[0,1],[1,1],[2,1],[3,1],[4,1]], [[0,2],[1,2],[2,2],[3,2],[4,2]], [[0,3],[1,3],[2,3],[3,3],[4,3]], [[0,4],[1,4],[2,4],[3,4],[4,4]], // Cols
            [[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]] // Diagonals
        ];

        selected.forEach(id => {
            let card = allCards[id-1];
            patterns.forEach(p => {
                let isWin = p.every(pos => {
                    if(pos[0]===2 && pos[1]===2) return true;
                    let val = card[pos[1]][pos[0]];
                    return called.has(val);
                });
                if(isWin) {
                    clearInterval(drawInt);
                    document.getElementById('win-overlay').style.display = 'flex';
                    setTimeout(() => location.reload(), 6000);
                }
            });
        });
    }

    init();
</script>
</body>
</html>
