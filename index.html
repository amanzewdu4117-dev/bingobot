<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAMOS BINGO - SCROLLABLE SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2l0Q4JOn6S0Xf1YmB1Z0m-Z0m-Z0m", 
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bc..." 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.updateGame = async (ball, history) => {
            await setDoc(doc(db, "game_state", "live"), {
                lastBall: ball, history: history, status: "active", time: Date.now()
            });
        };

        window.syncGame = (callback) => {
            onSnapshot(doc(db, "game_state", "live"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root {
            --neon: #00ffcc; --bg: #050a10; --panel: #0d141f;
            --b: #00bcd4; --i: #9c27b0; --n: #f44336; --g: #4caf50; --o: #ff9800;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        .top-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: #081018; }
        .stat { background: #111a24; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #1c2a38; }
        .stat label { font-size: 8px; color: #5b7a8c; display: block; margin-bottom: 2px; }
        .stat span { font-size: 14px; font-weight: 900; }

        /* Scrollable Cartela Selector */
        .selector-wrap { background: #081018; padding: 5px 0; border-bottom: 1px solid #1c2a38; }
        .scroll-list { 
            display: flex; gap: 10px; overflow-x: auto; padding: 5px 15px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .scroll-list::-webkit-scrollbar { display: none; }
        .card-btn { 
            min-width: 55px; height: 35px; background: #111a24; border: 1px solid #1c2a38;
            border-radius: 6px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #5b7a8c; cursor: pointer; transition: 0.3s;
        }
        .card-btn.active { background: var(--neon); color: black; border-color: var(--neon); transform: scale(1.1); }

        /* Main Game Area */
        .game-content { display: flex; flex: 1; padding: 10px; gap: 10px; min-height: 0; }

        /* 1-75 Main Board (Left) */
        .main-board { 
            flex: 1.2; background: var(--panel); border-radius: 15px; border: 1px solid #1c2a38;
            display: flex; flex-direction: column; padding: 8px;
        }
        .board-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 5px; }
        .letter-h { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 900; font-size: 12px; }
        .board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; overflow-y: auto; flex: 1; }
        .board-cell { 
            background: #050a10; height: 28px; border-radius: 4px; display: flex; 
            align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #2d3e50;
            border: 1px solid #1a2a3a;
        }
        .board-cell.called { background: rgba(255,255,255,0.1); color: white; border-color: #3e566b; }
        .board-cell.active-ball { background: var(--neon); color: black; border-color: white; transform: scale(1.1); z-index: 5; }

        /* Selected Player Card (Right) */
        .player-card-side { 
            flex: 0.8; display: flex; flex-direction: column; gap: 10px;
        }
        .selected-card-box { 
            flex: 1.5; background: #081018; border-radius: 15px; border: 1px solid var(--neon);
            padding: 8px; display: flex; flex-direction: column;
        }
        .player-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex: 1; }
        .p-cell { 
            background: #0d141f; border-radius: 5px; border: 1px solid #1c2a38;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #32475c;
        }
        .p-cell.marked { color: white; border-color: white; transform: scale(1.05); }

        .ball-view { 
            flex: 0.7; background: #081018; border-radius: 15px; border: 2px solid var(--neon);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .ball-num { font-size: 45px; font-weight: 900; line-height: 1; }

        .footer { padding: 10px; background: var(--bg); }
        .btn-start { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: var(--neon); color: black; font-size: 16px; font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stat"><label>CARD #</label><span id="id-label" style="color:var(--neon)">1</span></div>
        <div class="stat"><label>CALLED</label><span id="count-label">0</span></div>
        <div class="stat"><label>WALLET</label><span>0</span></div>
        <div class="stat"><label>PRIZE</label><span style="color:var(--neon)">1,880</span></div>
    </div>

    <div class="selector-wrap">
        <div id="scroll-list" class="scroll-list"></div>
    </div>

    <div class="game-content">
        <div class="main-board">
            <div class="board-header">
                <div class="letter-h" style="background:var(--b)">B</div>
                <div class="letter-h" style="background:var(--i)">I</div>
                <div class="letter-h" style="background:var(--n)">N</div>
                <div class="letter-h" style="background:var(--g)">G</div>
                <div class="letter-h" style="background:var(--o)">O</div>
            </div>
            <div id="board-grid" class="board-grid"></div>
        </div>

        <div class="player-card-side">
            <div class="selected-card-box">
                <div style="font-size: 9px; color: var(--neon); text-align: center; margin-bottom: 5px; font-weight: bold;">SELECTED CARD</div>
                <div id="player-grid" class="player-grid"></div>
            </div>
            <div class="ball-view">
                <div id="big-num" class="ball-num">--</div>
                <div id="big-tag" style="font-size: 10px; font-weight: bold; margin-top: 5px; color: #5b7a8c;">READY</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <button id="draw-btn" class="btn-start" onclick="startDraw()">START LIVE DRAW</button>
    </div>

    <script>
        let gameHistory = [];
        let selectedCardId = 1;

        function init() {
            // 1. 500 Scrollable buttons
            const list = document.getElementById('scroll-list');
            for(let i=1; i<=500; i++) {
                let b = document.createElement('div');
                b.className = i === 1 ? 'card-btn active' : 'card-btn';
                b.id = `btn-${i}`;
                b.textContent = i;
                b.onclick = () => selectCard(i);
                list.appendChild(b);
            }

            // 2. 1-75 Board cells
            const board = document.getElementById('board-grid');
            for(let i=1; i<=75; i++) {
                let c = document.createElement('div');
                c.className = 'board-cell';
                c.id = `board-${i}`;
                c.textContent = i;
                board.appendChild(c);
            }

            updatePlayerCard();

            // Sync from Firebase
            window.syncGame((data) => {
                if(data.status === "active") {
                    gameHistory = data.history;
                    renderGame(data.lastBall);
                }
            });
        }

        function selectCard(id) {
            document.querySelectorAll('.card-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');
            selectedCardId = id;
            document.getElementById('id-label').textContent = id;
            updatePlayerCard();
            
            // Scroll selected button into view
            document.getElementById(`btn-${id}`).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function updatePlayerCard() {
            const grid = document.getElementById('player-grid');
            grid.innerHTML = '';
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            
            for(let row=0; row<5; row++) {
                for(let col=0; col<5; col++) {
                    let start = ranges[col][0];
                    let n = start + ((selectedCardId * (row + 9) + col) % 15);
                    let cell = document.createElement('div');
                    cell.className = 'p-cell';
                    cell.id = `p-${n}`;
                    cell.textContent = n;
                    grid.appendChild(cell);
                }
            }
            autoFillMark();
        }

        function renderGame(last) {
            document.getElementById('big-num').textContent = last;
            document.getElementById('count-label').textContent = gameHistory.length;
            
            // Mark Main Board
            document.querySelectorAll('.board-cell').forEach(c => c.classList.remove('active-ball'));
            gameHistory.forEach(n => {
                let c = document.getElementById(`board-${n}`);
                if(c) c.classList.add('called');
            });
            document.getElementById(`board-${last}`).classList.add('active-ball');

            autoFillMark();
        }

        function autoFillMark() {
            gameHistory.forEach(n => {
                let cell = document.getElementById(`p-${n}`);
                if(cell) {
                    let col = n <= 15 ? 'b' : n <= 30 ? 'i' : n <= 45 ? 'n' : n <= 60 ? 'g' : 'o';
                    cell.style.background = `var(--${col})`;
                    cell.classList.add('marked');
                }
            });
        }

        function startDraw() {
            document.getElementById('draw-btn').disabled = true;
            let pool = [];
            const loop = setInterval(() => {
                if(pool.length >= 75) { clearInterval(loop); return; }
                let n; do { n = Math.floor(Math.random()*75)+1; } while(pool.includes(n));
                pool.push(n);
                window.updateGame(n, pool);
            }, 3000);
        }

        init();
    </script>
</body>
</html>
