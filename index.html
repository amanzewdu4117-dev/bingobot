<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jobe Bingo - 800 Slots</title>
    <style>
        :root {
            --bg-color: #0b141a;
            --card-bg: #111b21;
            --neon-green: #00ffcc;
            --text-gray: #788da1;
            --orange: #ff7e21;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Top Header Stat Boxes */
        .header-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: #0d161d;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #1c2b3a;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-gray);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
        }

        .stat-value.green { color: var(--neon-green); }
        .stat-value.red { color: #ff4d4d; }

        /* Slot Network Container */
        .slot-container {
            background: #111b21;
            margin: 10px;
            border-radius: 20px;
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #1c2b3a;
        }

        .slot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        .slot-title {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            color: var(--text-gray);
        }

        /* 800 Slots Grid */
        .slot-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            overflow-y: auto;
            padding-right: 5px;
            max-height: 60vh;
        }

        /* Slot Circle Design */
        .slot {
            aspect-ratio: 1;
            background: #1a252f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: #5c7894;
            border: 2px solid #253341;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .slot.selected {
            background: rgba(0, 255, 204, 0.15);
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .slot.selected::after {
            content: "@User";
            position: absolute;
            font-size: 6px;
            bottom: 8px;
            font-weight: bold;
        }

        /* Selection Panel at bottom */
        .selection-panel {
            background: #0d161d;
            padding: 15px;
            border-top: 1px solid #1c2b3a;
            text-align: center;
        }

        .btn-start {
            background: var(--neon-green);
            color: black;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* Scrollbar Styling */
        .slot-grid::-webkit-scrollbar { width: 4px; }
        .slot-grid::-webkit-scrollbar-thumb { background: #253341; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">
            <div class="stat-label">Player</div>
            <div class="stat-value green">@User</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Selected</div>
            <div class="stat-value green" id="selected-count">0 / 2</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Closes In</div>
            <div class="stat-value red">00:30</div>
        </div>
    </div>

    <div class="slot-container">
        <div class="slot-header">
            <div class="slot-title">SLOT NETWORK</div>
            <div style="font-size: 10px; color: var(--text-gray);">Total: 800</div>
        </div>

        <div class="slot-grid" id="slotGrid">
            </div>
    </div>

    <div class="selection-panel">
        <button class="btn-start" onclick="startDrawing()">ጨዋታውን ጀምር</button>
    </div>

    <script>
        const slotGrid = document.getElementById('slotGrid');
        const selectedCountLabel = document.getElementById('selected-count');
        let selectedSlots = [];

        // 800 ካርቴላዎችን መፍጠሪያ
        function createSlots() {
            for (let i = 1; i <= 800; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerText = i;
                slot.onclick = () => toggleSlot(i, slot);
                slotGrid.appendChild(slot);
            }
        }

        function toggleSlot(id, element) {
            if (selectedSlots.includes(id)) {
                // ካለ ማስወጣት
                selectedSlots = selectedSlots.filter(s => s !== id);
                element.classList.remove('selected');
            } else {
                // እስከ 2 ካርቴላ ብቻ እንዲመርጥ
                if (selectedSlots.length < 2) {
                    selectedSlots.push(id);
                    element.classList.add('selected');
                } else {
                    alert("ቢበዛ መምረጥ የምትችሉት 2 ካርቴላ ብቻ ነው!");
                }
            }
            selectedCountLabel.innerText = `${selectedSlots.length} / 2`;
        }

        function startDrawing() {
            if (selectedSlots.length === 0) {
                alert("እባክዎ መጀመሪያ ካርቴላ ይምረጡ!");
            } else {
                alert("ተመርጧል: " + selectedSlots.join(", ") + "\nወደ ጨዋታው በመሄድ ላይ...");
                // እዚህ ጋር ወደ ዋናው የጨዋታ ገጽ የሚወስድ ኮድ ይገባል
            }
        }

        // ገጹ ሲከፈት ስሎቶቹን ፍጠር
        createSlots();
    </script>
</body>
</html>
