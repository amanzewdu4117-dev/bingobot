<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - LIVE TRACKER</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --border: #1c2b3a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .header-box { display: flex; justify-content: space-around; padding: 12px; background: #0a1117; border-bottom: 1px solid var(--border); }
        .stat { text-align: center; flex: 1; }
        .stat label { display: block; font-size: 8px; color: #788da1; text-transform: uppercase; }
        .stat span { font-size: 15px; font-weight: bold; color: var(--neon); }

        /* Game Layout */
        .game-layout { display: grid; grid-template-columns: 110px 1fr; gap: 10px; padding: 10px; height: calc(100vh - 70px); }
        
        /* ግራ ሰሌዳ */
        .board-side { background: var(--panel); border-radius: 12px; padding: 6px; border: 1px solid var(--border); overflow-y: auto; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .b-num { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 8px; border-radius: 3px; color: #5c7894; }
        .b-num.active { background: var(--orange); color: white; }

        /* ቀኝ እጣ ማሳያ */
        .play-side { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        
        /* አሁን የወጣው ትልቅ ቁጥር */
        .ball-display { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 10px; text-align: center; position: relative; }
        .ball-val { font-size: 60px; font-weight: 900; color: var(--neon); line-height: 1; }
        
        /* እያንዳንዱን ቁጥር ማሳያ (History List) */
        .history-list { display: flex; gap: 5px; overflow-x: auto; padding: 5px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid #253341; }
        .hist-item { min-width: 35px; height: 35px; background: #1d2938; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid var(--neon); color: var(--neon); flex-shrink: 0; }
        .hist-item:first-child { background: var(--orange); color: white; border-color: var(--orange); transform: scale(1.1); }

        .cartela { background: #16212a; padding: 10px; border-radius: 12px; border: 1px solid #253341; margin-bottom: 15px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 4px; color: white; }
        .c-cell.marked { background: var(--neon) !important; color: black !important; font-weight: bold; }
    </style>
</head>
<body onload="startGame()">

    <div class="header-box">
        <div class="stat"><label>MY SLOTS</label><span>19, 69</span></div>
        <div class="stat"><label>CALLED</label><span id="ui-called">0</span></div>
        <div class="stat"><label>STATUS</label><span style="color:var(--orange)">LIVE DRAW</span></div>
    </div>

    <div class="game-layout">
        <div class="board-side"><div id="main-board" class="bingo-board"></div></div>
        
        <div class="play-side">
            <div class="ball-display">
                <div style="font-size:9px; color:var(--dark-text); margin-bottom:5px;">LAST 5 NUMBERS:</div>
                <div id="ball-history" class="history-list">
                    </div>
                <div class="ball-val" id="big-ball">--</div>
                <div style="font-size:10px; color:var(--neon); letter-spacing:2px;">CURRENT BALL</div>
            </div>

            <div id="cards-holder"></div>
        </div>
    </div>

    <script>
        let mySlots = [19, 69]; 
        let cardData = {};

        function startGame() {
            const mb = document.getElementById('main-board');
            for(let i=1; i<=75; i++) mb.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            const holder = document.getElementById('cards-holder');
            mySlots.forEach(slot => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                cardData[slot] = nums;
                let html = `<div class="cartela"><div style="color:var(--neon); font-size:10px; margin-bottom:5px; text-align:center;">CARTELA ${slot}</div><div class="c-grid">`;
                nums.forEach((v, idx) => {
                    if(idx === 12) html += `<div class="c-cell marked">★</div>`;
                    else html += `<div class="c-cell" id="c-${slot}-${v}">${v}</div>`;
                });
                holder.innerHTML += html + `</div></div>`;
            });

            window.listenToGame((data) => {
                if(data.ball) {
                    let hist = data.history || [];
                    document.getElementById('big-ball').innerText = data.ball;
                    document.getElementById('ui-called').innerText = hist.length;
                    
                    // እያንዳንዱን የወጣ ቁጥር በዝርዝር ማሳያ (Ball History)
                    updateHistoryRow(hist);
                    
                    // ሰሌዳ እና ካርቴላ ማርክ ማድረጊያ
                    hist.forEach(num => {
                        document.getElementById(`bn-${num}`)?.classList.add('active');
                        mySlots.forEach(s => {
                            document.getElementById(`c-${s}-${num}`)?.classList.add('marked');
                        });
                    });
                }
            });

            runLiveDraw();
        }

        function updateHistoryRow(hist) {
            const row = document.getElementById('ball-history');
            row.innerHTML = "";
            // የመጨረሻዎቹን 10 ቁጥሮች በቅርብ የወጣውን አስቀድሞ ያሳያል
            const recent = [...hist].reverse().slice(0, 10);
            recent.forEach(num => {
                row.innerHTML += `<div class="hist-item">${num}</div>`;
            });
        }

        async function runLiveDraw() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let hist = [];
            for(let b of pool) {
                hist.push(b);
                await setDoc(doc(window.db, "live_bingo", "current"), { ball: b, history: hist });
                await new Promise(r => setTimeout(r, 4000));
            }
        }
    </script>
</body>
</html>
