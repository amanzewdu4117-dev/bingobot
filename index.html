<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - SLOT NETWORK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.occupySlot = async (slotNum, userName) => {
            await setDoc(doc(db, "active_slots", "slot_" + slotNum), {
                name: userName,
                slot: slotNum,
                time: Date.now()
            });
        };

        window.listenToSlots = (callback) => {
            onSnapshot(collection(db, "active_slots"), (snap) => {
                let takenSlots = {};
                snap.forEach(doc => { takenSlots[doc.data().slot] = doc.data().name; });
                callback(takenSlots);
            });
        };

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };

        window.saveGameState = async (ball, history, status) => {
            await setDoc(doc(db, "live_bingo", "current"), { ball, history, status, lastUpdate: Date.now() }, { merge: true });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --dark-text: #788da1; --slot-bg: #1a252f; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Slot Screen Header */
        .top-info { padding: 15px; background: #0a1117; display: flex; justify-content: space-around; align-items: center; border-bottom: 1px solid #1c2b3a; }
        .info-box { text-align: center; background: rgba(0,255,204,0.05); padding: 8px 15px; border-radius: 10px; border: 1px solid #1c2b3a; min-width: 80px; }
        .info-box label { font-size: 8px; color: var(--dark-text); display: block; margin-bottom: 3px; }
        .info-box span { font-size: 14px; font-weight: bold; color: var(--neon); }

        /* Slot Grid Design */
        #slot-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; }
        .slot-header { padding: 10px 20px; background: #0a1117; }
        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 15px; overflow-y: auto; flex-grow: 1; align-content: start; }
        .slot { background: #1a252f; aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; border: 1px solid #253341; cursor: pointer; color: #7a8a9a; font-weight: bold; transition: 0.2s; }
        .slot.taken { background: rgba(0, 255, 204, 0.8); border-color: var(--neon); color: black; box-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .slot .u-name { font-size: 6px; margin-top: 2px; text-transform: uppercase; overflow: hidden; white-space: nowrap; width: 90%; text-align: center; }

        /* Bingo UI */
        #game-ui { display: none; height: 100vh; }
        .header { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; padding: 10px; background: #0a1117; }
        .stat-box { background: #121d26; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #1c2b3a; }
        .stat-box label { font-size: 9px; color: var(--neon); display: block; }
        .main-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; padding: 10px; height: calc(100vh - 140px); }
        .board-container { background: var(--panel); border-radius: 15px; padding: 5px; border: 1px solid #1c2b3a; overflow-y: auto; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .num { background: #1d2938; aspect-ratio: 1.1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #5c7894; }
        .num.active { background: var(--orange); color: white; }
        .ball-display { background: #000; border: 2px solid #1c2b3a; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 10px; color: var(--neon); }
        .p-cell.marked { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body onload="initApp()">

    <div id="slot-screen">
        <div class="top-info">
            <div class="info-box"><label>PLAYER</label><span id="top-username">@Player</span></div>
            <div class="info-box"><label>CLOSES IN</label><span style="color:#ff4d4d">00:30</span></div>
            <div class="info-box"><label>CARTELA</label><span>---</span></div>
        </div>
        <div class="slot-header" style="border-bottom: 1px solid #1c2b3a; display: flex; justify-content: space-between; align-items: center;">
            <h3 style="color:var(--neon); font-size: 14px;">SLOT NETWORK</h3>
            <span style="font-size: 10px; color: var(--dark-text)">Total Active: 500</span>
        </div>
        <div class="slot-grid" id="grid-500"></div>
    </div>

    <div id="game-ui">
        <div class="header">
            <div class="stat-box" style="text-align:left; border-left:3px solid var(--neon);">
                <label>PLAYER</label><span id="ui-player">@Player</span>
            </div>
            <div class="stat-box"><label>SLOT</label><span id="ui-slot">0</span></div>
            <div class="stat-box"><label>CALLED</label><span id="ui-called">0</span></div>
        </div>
        <div class="main-layout">
            <div class="board-container"><div id="full-board" class="numbers-grid"></div></div>
            <div class="right-side">
                <div class="ball-display">
                    <div id="ball-val" style="font-size:50px; font-weight:900;">--</div>
                    <div style="font-size: 10px; letter-spacing: 2px;">READY</div>
                </div>
                <div class="stat-box" style="padding:15px; background: rgba(255,255,255,0.02);">
                    <div id="personal-grid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "Player"; // ስም ስለማይጠየቅ በቋሚነት Player ተብሏል
        let drawnHistory = [];
        let myCardNums = [];

        // አፑ ሲከፈት በቀጥታ Slot እንዲያሳይ
        function initApp() {
            renderSlots();
        }

        function renderSlots() {
            const grid = document.getElementById('grid-500');
            grid.innerHTML = "";
            for(let i=1; i<=500; i++) {
                grid.innerHTML += `
                    <div class="slot" id="slot-${i}" onclick="selectSlot(${i})">
                        ${i}
                        <span class="u-name" id="u-${i}"></span>
                    </div>`;
            }

            window.listenToSlots((taken) => {
                for(let s in taken) {
                    const el = document.getElementById('slot-' + s);
                    const nameEl = document.getElementById('u-' + s);
                    if(el) {
                        el.classList.add('taken');
                        nameEl.innerText = taken[s];
                    }
                }
            });
        }

        async function selectSlot(num) {
            const el = document.getElementById('slot-' + num);
            if(el.classList.contains('taken')) return alert("ይህ ቦታ ተይዟል!");
            
            if(confirm(num + " ቁጥርን መያዝ ትፈልጋለህ?")) {
                await window.occupySlot(num, currentUser);
                startBingo(num);
            }
        }

        function startBingo(slotNum) {
            document.getElementById('slot-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('ui-player').innerText = "@" + currentUser;
            document.getElementById('ui-slot').innerText = slotNum;

            const fb = document.getElementById('full-board');
            fb.innerHTML = "";
            for(let i=1; i<=75; i++) fb.innerHTML += `<div class="num" id="n-${i}">${i}</div>`;

            myCardNums = [];
            while(myCardNums.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!myCardNums.includes(r)) myCardNums.push(r);
            }

            const pg = document.getElementById('personal-grid');
            pg.innerHTML = "";
            myCardNums.forEach((n, i) => {
                if(i === 12) {
                    pg.innerHTML += `<div class="num p-cell marked" id="p-free">★</div>`;
                } else {
                    pg.innerHTML += `<div class="num p-cell" id="p-${n}">${n}</div>`;
                }
            });

            window.listenToGame((data) => {
                drawnHistory = data.history || [];
                document.getElementById('ball-val').innerText = data.ball || "--";
                document.getElementById('ui-called').innerText = drawnHistory.length;
                drawnHistory.forEach(num => {
                    if(document.getElementById('n-' + num)) document.getElementById('n-' + num).classList.add('active');
                    if(document.getElementById('p-' + num)) document.getElementById('p-' + num).classList.add('marked');
                });
            });
            
            // Auto Game Loop
            setInterval(() => {
                if(drawnHistory.length < 75) {
                    let next = Math.floor(Math.random() * 75) + 1;
                    if(!drawnHistory.includes(next)) {
                        drawnHistory.push(next);
                        window.saveGameState(next, drawnHistory, "LIVE");
                    }
                }
            }, 5000);
        }
    </script>
</body>
</html>
