<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobe Bingo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="stats-container">
            <div class="stat-box">
                <div class="stat-label">🏆 ድል</div>
                <div class="stat-value">120 ብር</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">💰 መደብ</div>
                <div class="stat-value">5 ብር</div>
            </div>
        </div>

        <div class="bingo-card">
            <div class="bingo-header">
                <span>B</span><span>I</span><span>N</span><span>G</span><span>O</span>
            </div>
            <div id="bingo-grid" class="grid">
                </div>
        </div>

        <button class="bingo-btn" onclick="checkBingo()">BINGO</button>
    </div>

    <script src="script.js"></script>
    <script>
        // ቴሌግራም አፑን ሙሉ ስክሪን እንዲያደርገው
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
