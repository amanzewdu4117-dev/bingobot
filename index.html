<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - PRO SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root {
            --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text-gray: #788da1; --border: #1c2b3a;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Header Stats */
        .header-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; background: #0d161d; border-bottom: 1px solid var(--border); }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; }
        .stat-label { font-size: 9px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 15px; font-weight: bold; }
        .stat-val.green { color: var(--neon); }
        .stat-val.red { color: #ff4d4d; }

        /* Selection Screen */
        #selection-screen { display: flex; flex-direction: column; height: 100vh; }
        .slot-container { background: var(--panel); margin: 12px; border-radius: 20px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; border: 1px solid var(--border); overflow: hidden; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; overflow-y: auto; padding-bottom: 20px; }
        .slot { aspect-ratio: 1; background: #1a252f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #5c7894; border: 2px solid #253341; cursor: pointer; position: relative; }
        .slot.selected { border-color: var(--neon); background: rgba(0, 255, 204, 0.1); color: var(--neon); }
        .slot.selected::after { content: "@User"; position: absolute; font-size: 7px; bottom: 8px; font-weight: bold; }

        /* Game Screen */
        #game-screen { display: none; height: 100vh; flex-direction: column; }
        .game-layout { display: grid; grid-template-columns: 120px 1fr; gap: 10px; padding: 10px; height: calc(100vh - 85px); }
        
        /* 1-75 Side Board */
        .board-side { background: var(--panel); border-radius: 15px; padding: 8px; border: 1px solid var(--border); overflow-y: auto; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .b-num { background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #4a5d6e; border: 1px solid #253341; }
        .b-num.active { background: var(--orange); color: white; border-color: var(--orange); box-shadow: 0 0 8px var(--orange); }

        /* Drawing Side */
        .play-side { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .ball-display { background: #000; border: 2.5px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center; position: relative; }
        .ball-val { font-size: 70px; font-weight: 900; color: var(--neon); line-height: 1; margin-top: 10px; }
        .history-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .h-ball { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid var(--neon); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--neon); font-weight: bold; }

        /* Cartela Design */
        .cartela { background: #16212a; padding: 12px; border-radius: 15px; border: 1px solid #253341; margin-bottom: 15px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; border-radius: 5px; color: white; }
        .c-cell.marked { background: var(--neon) !important; color: black !important; font-weight: bold; box-shadow: 0 0 10px var(--neon); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #253341; border-radius: 10px; }
    </style>
</head>
<body onload="initApp()">

    <div id="selection-screen">
        <div class="header-stats">
            <div class="stat-box"><div class="stat-label">Player</div><div class="stat-val green">@User</div></div>
            <div class="stat-box"><div class="stat-label">Selected</div><div class="stat-val green" id="sel-count">0 / 2</div></div>
            <div class="stat-box"><div class="stat-label">Starts In</div><div class="stat-val red" id="timer-label">00:30</div></div>
        </div>
        <div class="slot-container">
            <div style="font-size:12px; color:var(--text-gray); margin-bottom:12px; font-weight:bold; letter-spacing:1px;">SLOT NETWORK</div>
            <div class="slot-grid" id="slot-grid"></div>
        </div>
        <div style="padding:15px; text-align:center; font-size:12px; color:var(--text-gray);">ጊዜው ሲያልቅ በራሱ ወደ እጣ ማውጫ ይወስድዎታል...</div>
    </div>

    <div id="game-screen">
        <div class="header-stats">
            <div class="stat-box"><div class="stat-label">My Slots</div><div class="stat-val green" id="ui-slots">--</div></div>
            <div class="stat-box"><div class="stat-label">Called</div><div class="stat-val green" id="ui-called">0</div></div>
            <div class="stat-box"><div class="stat-label">Status</div><div class="stat-val" style="color:var(--orange)">LIVE DRAW</div></div>
        </div>
        <div class="game-layout">
            <div class="board-side">
                <div id="main-board" class="bingo-board"></div>
            </div>
            
            <div class="play-side">
                <div class="ball-display">
                    <div style="font-size:10px; color:var(--text-gray); margin-bottom:10px;">LAST 5 NUMBERS:</div>
                    <div id="history-row" class="history-row"></div>
                    <div class="ball-val" id="big-ball">--</div>
                    <div style="font-size:10px; color:var(--neon); margin-top:8px; letter-spacing:2px;">CURRENT BALL</div>
                </div>
                <div id="cards-container"></div>
            </div>
        </div>
    </div>

    <script>
        let myChoices = [];
        let timeLeft = 30; // 30 ሰከንድ መቁጠሪያ
        let countdown;

        function initApp() {
            const grid = document.getElementById('slot-grid');
            for(let i=1; i<=800; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.innerText = i;
                s.onclick = () => {
                    if(myChoices.includes(i)) {
                        myChoices = myChoices.filter(x => x !== i);
                        s.classList.remove('selected');
                    } else if(myChoices.length < 2) {
                        myChoices.push(i);
                        s.classList.add('selected');
                    }
                    document.getElementById('sel-count').innerText = `${myChoices.length} / 2`;
                };
                grid.appendChild(s);
            }
            startTimer();
        }

        function startTimer() {
            countdown = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60).toString().padStart(2
