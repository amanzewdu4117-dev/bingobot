<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - SLOT NETWORK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ተጫዋች ቦታ ሲመርጥ Firebase ላይ መመዝገብ
        window.occupySlot = async (slotNum, userName) => {
            await setDoc(doc(db, "active_slots", "slot_" + slotNum), {
                name: userName,
                slot: slotNum,
                time: Date.now()
            });
        };

        // የታዘዙ ቦታዎችን ከ Firebase ማዳመጥ
        window.listenToSlots = (callback) => {
            onSnapshot(collection(db, "active_slots"), (snap) => {
                let takenSlots = {};
                snap.forEach(doc => { takenSlots[doc.data().slot] = doc.data().name; });
                callback(takenSlots);
            });
        };

        // የጨዋታውን ሁኔታ ማዳመጥ
        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };

        window.saveGameState = async (ball, history, status) => {
            await setDoc(doc(db, "live_bingo", "current"), { ball, history, status, lastUpdate: Date.now() }, { merge: true });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --dark-text: #788da1; --slot-bg: #1a252f; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Screen (Login) */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid #1c2b3a; width: 85%; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #081118; border: 1px solid #253341; color: white; border-radius: 12px; outline: none; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; }

        /* Slot Selection Screen */
        #slot-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column; }
        .slot-header { padding: 20px; background: #0a1117; text-align: center; border-bottom: 1px solid #1c2b3a; }
        .slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .slot { background: var(--slot-bg); aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; border: 1px solid #253341; cursor: pointer; transition: 0.3s; }
        .slot.taken { background: rgba(0, 255, 204, 0.1); border-color: var(--neon); color: var(--neon); font-size: 12px; }
        .slot .u-name { font-size: 9px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; max-width: 90%; }

        /* Game UI */
        #game-ui { display: none; height: 100vh; }
        .header { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; padding: 10px; background: #0a1117; }
        .stat-box { background: #121d26; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #1c2b3a; }
        .stat-box label { font-size: 9px; color: var(--neon); display: block; }
        .main-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; padding: 10px; height: calc(100vh - 140px); }
        .board-container { background: var(--panel); border-radius: 15px; padding: 5px; border: 1px solid #1c2b3a; overflow-y: auto; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .num { background: #1d2938; aspect-ratio: 1.1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #5c7894; }
        .num.active { background: var(--orange); color: white; }
        .ball-display { background: #000; border: 2px solid #1c2b3a; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 10px; color: var(--neon); }
        .p-cell.marked { background: var(--neon); color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--neon); margin-bottom: 10px;">JOBE BINGO</h1>
            <input type="text" id="username" placeholder="ስምዎን ያስገቡ...">
            <button class="btn-main" onclick="goToSlots()">ለመምረጥ ግባ</button>
        </div>
    </div>

    <div id="slot-screen">
        <div class="slot-header">
            <h3 style="color:var(--neon)">SLOT NETWORK</h3>
            <p style="font-size:11px; color:var(--dark-text); margin-top:5px;">ቦታዎን ይምረጡ (1-500)</p>
        </div>
        <div class="slot-grid" id="grid-500"></div>
    </div>

    <div id="game-ui">
        <div class="header">
            <div class="stat-box" style="text-align:left; border-left:3px solid var(--neon);">
                <label>PLAYER</label><span id="ui-player">@User</span>
            </div>
            <div class="stat-box"><label>SLOT</label><span id="ui-slot">0</span></div>
            <div class="stat-box"><label>CALLED</label><span id="ui-called">0</span></div>
        </div>
        <div class="main-layout">
            <div class="board-container">
                <div id="full-board" class="numbers-grid"></div>
            </div>
            <div class="right-side">
                <div class="ball-display">
                    <div id="ball-val" style="font-size:50px; font-weight:900;">--</div>
                    <div style="font-size: 10px; letter-spacing: 2px;">READY</div>
                </div>
                <div class="stat-box" style="padding:15px; background: rgba(255,255,255,0.02);">
                    <div id="personal-grid" style="display:grid; grid-template-columns:repeat(5,1fr); gap:5px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let drawnHistory = [];
        let myCardNums = [];

        // ስም ተቀብሎ ወደ ምርጫ ገጽ የሚወስድ
        function goToSlots() {
            currentUser = document.getElementById('username').value.trim();
            if(!currentUser) return alert("እባክዎ መጀመሪያ ስምዎን ያስገቡ!");
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('slot-screen').style.display = 'flex';
            renderSlots();
        }

        // የቁጥር መምረጫዎችን መፍጠር
        function renderSlots() {
            const grid = document.getElementById('grid-500');
            grid.innerHTML = "";
            for(let i=1; i<=500; i++) {
                grid.innerHTML += `
                    <div class="slot" id="slot-${i}" onclick="selectSlot(${i})">
                        <b>${i}</b>
                        <span class="u-name" id="u-${i}"></span>
                    </div>`;
            }

            // የትኞቹ ቁጥሮች እንደተያዙ ከ Firebase ማምጣት
            window.listenToSlots((taken) => {
                for(let s in taken) {
                    const el = document.getElementById('slot-' + s);
                    const nameEl = document.getElementById('u-' + s);
                    if(el) {
                        el.classList.add('taken');
                        nameEl.innerText = "@" + taken[s];
                    }
                }
            });
        }

        // ቁጥር ሲመረጥ
        async function selectSlot(num) {
            const el = document.getElementById('slot-' + num);
            if(el.classList.contains('taken')) return alert("ይህ ቁጥር ተይዟል! ሌላ ይምረጡ።");
            
            if(confirm(num + " ቁጥርን መያዝ ትፈልጋለህ?")) {
                await window.occupySlot(num, currentUser);
                startBingo(num);
            }
        }

        // ጨዋታውን ማስጀመር
        function startBingo(slotNum) {
            document.getElementById('slot-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('ui-player').innerText = "@" + currentUser;
            document.getElementById('ui-slot').innerText = slotNum;

            // ዋናውን የቢንጎ ሰሌዳ (1-75) መፍጠር
            const fb = document.getElementById('full-
