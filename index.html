<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - COMPLETE SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // 🔥 ያንተ የ Firebase መረጃ (በ Screenshot_20260509-204719.jpg መሰረት)
        const firebaseConfig = {
            apiKey: "AIzaSyD2lOQ4J...", 
            authDomain: "my-app-pro-38440.firebaseapp.com",
            projectId: "my-app-pro-38440",
            storageBucket: "my-app-pro-38440.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:your_web_id" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ዳታ ወደ Firebase ለመላክ
        window.syncGame = async (ball, history, status) => {
            try {
                await setDoc(doc(db, "live_bingo", "current"), { 
                    ball, history, status, time: Date.now() 
                });
            } catch (e) { console.error("Firebase Sync Error:", e); }
        };

        // ከ Firebase ዳታ ለመቀበል
        window.listenGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root { --bg: #050a10; --card: #111a24; --neon: #00ffcc; --orange: #ff5722; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* ገጾችን መቀያየሪያ */
        .view { display: none; height: 100vh; flex-direction: column; }
        .active-view { display: flex; }

        .header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px; background: #081018; border-bottom: 1px solid #1c2a38; }
        .stat { background: var(--card); border-radius: 8px; padding: 5px; text-align: center; border: 1px solid #1c2a38; }
        .stat label { font-size: 8px; color: var(--neon); display: block; }
        .stat span { font-size: 14px; font-weight: 900; }

        /* Selection Page Styles */
        .selection-main { flex: 1; overflow-y: auto; padding: 10px; }
        .network-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .slot { aspect-ratio: 1; background: var(--card); border: 1px solid #1c2a38; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; cursor: pointer; }
        .slot.selected { border: 2px solid var(--orange); color: var(--orange); background: #1a1614; }

        /* Game Page Styles */
        .game-main { flex: 1; display: flex; gap: 10px; padding: 10px; overflow: hidden; }
        
        .left-board { flex: 1; background: var(--card); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }
        .b-letter { background: var(--orange); text-align: center; font-weight: 900; border-radius: 4px; padding: 5px; font-size: 14px; }
        .bingo-numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; flex: 1; overflow-y: auto; }
        .n-cell { background: #0d141f; font-size: 10px; text-align: center; padding: 4px; border-radius: 3px; color: #445b73; }
        .n-cell.active { background: var(--neon); color: black; font-weight: 900; }

        .right-cards { flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .bingo-card-ui { background: var(--card); border: 1px solid var(--orange); border-radius: 12px; padding: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .c-cell { aspect-ratio: 1; background: #0d141f; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #3b4d61; }
        .c-cell.marked { background: var(--orange); color: white; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }

        .call-banner { background: #081018; border: 2px solid var(--neon); border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 10px; }
        .big-num { font-size: 50px; font-weight: 900; color: white; line-height: 1; }

        .footer { padding: 10px; background: #081018; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: black; font-weight: 900; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ገጽ 1፡ ካርቴላ መምረጫ -->
    <div id="selection-view" class="view active-view">
        <div class="header">
            <div class="stat"><label>WALLET</label><span>40 ETB</span></div>
            <div class="stat"><label>SELECTED</label><span id="sel-count">0/2</span></div>
            <div class="stat"><label>MODE</label><span>CHOOSE</span></div>
        </div>
        <div class="selection-main">
            <div style="text-align:center; margin-bottom:15px; color:var(--neon); font-weight:800; font-size:14px;">SELECT SLOTS (1-500)</div>
            <div id="network" class="network-grid"></div>
        </div>
        <div class="footer">
            <button class="btn" onclick="startCountdown()">START GAME (15s WAIT)</button>
        </div>
    </div>

    <!-- ገጽ 2፡ የቀጥታ ጨዋታ ገጽ -->
    <div id="game-view" class="view">
        <div class="header">
            <div class="stat"><label>STATUS</label><span id="status-text">WAITING</span></div>
            <div class="stat"><label>TIME</label><span id="timer-text">15s</span></div>
            <div class="stat"><label>BALLS</label><span id="ball-count">0/75</span></div>
        </div>
        
        <div class="game-main">
            <!-- በግራ በኩል፡ 1-75 የቢንጎ ሰሌዳ -->
            <div class="left-board">
                <div class="call-banner">
                    <div id="big-ball" class="big-num">--</div>
                    <div id="game-info" style="font-size:10px; color:var(--neon);">PREPARING...</div>
                </div>
                <div class="bingo-header">
                    <div class="b-letter">B</div><div class="b-letter">I</div>
                    <div class="b-letter">N</div><div class="b-letter">G</div>
                    <div class="b-letter">O</div>
                </div>
                <div id="bingo-numbers" class="bingo-numbers"></div>
            </div>

            <!-- በቀኝ በኩል፡ የመረጥካቸው ካርቴላዎች -->
            <div id="my-live-cards" class="right-cards"></div>
        </div>
    </div>

    <script>
        let mySelections = [];
        let history = [];
        let gameStatus = "IDLE";

        function init() {
            // 1-500 መምረጫዎችን ፍጠር
            const net = document.getElementById('network');
            for(let i=1; i<=500; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.id = `slot-${i}`;
                s.textContent = i;
                s.onclick = () => { if(gameStatus === "IDLE") selectCard(i); };
                net.appendChild(s);
            }

            // 1-75 የቢንጎ ቦርድ ፍጠር
            const board = document.getElementById('bingo-numbers');
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            ranges.forEach((range) => {
                for(let n=range[0]; n<=range[1]; n++) {
                    let cell = document.createElement('div');
                    cell.className = 'n-cell';
                    cell.id = `board-${n}`;
                    cell.textContent = n;
                    board.appendChild(cell);
                }
            });

            // ከ Firebase የሚመጣን ዳታ አዳምጥ
            window.listenGame((data) => {
                history = data.history || [];
                gameStatus = data.status;
                document.getElementById('big-ball').textContent = data.ball || "--";
                document.getElementById('status-text').textContent = data.status;
                document.getElementById('ball-count').textContent = `${history.length}/75`;
                updateLiveUI(data.ball);
            });
        }

        function selectCard(id) {
            if(mySelections.includes(id)) {
                mySelections = mySelections.filter(x => x !== id);
            } else if(mySelections.length < 2) {
                mySelections.push(id);
            }
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            mySelections.forEach(id => document.getElementById(`slot-${id}`).classList.add('selected'));
            document.getElementById('sel-count').textContent = `${mySelections.length}/2`;
        }

        function startCountdown() {
            if(mySelections.length === 0) { alert("ካርቴላ ይምረጡ!"); return; }
            
            // ገጽ ቀይር
            document.getElementById('selection-view').classList.remove('active-view');
            document.getElementById('game-view').classList.add('active-view');
            
            renderMyCards(); // የመረጥካቸውን ካርቴላዎች ሳል
            
            let sec = 15;
            const timer = setInterval(() => {
                document.getElementById('timer-text').textContent = `${sec}s`;
                document.getElementById('game-info').textContent = "WAITING FOR PLAYERS...";
                window.syncGame("--", [], "WAITING"); // Firebase ላይ ሁኔታውን አሳውቅ
                
                if(sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer-text').textContent = "LIVE";
                    document.getElementById('game-info').textContent = "LIVE DRAWING";
                    beginBingoDraw(); // እጣ ማውጣት ጀምር
                }
                sec--;
            }, 1000);
        }

        function renderMyCards() {
            const container = document.getElementById('my-live-cards');
            container.innerHTML = '';
            mySelections.forEach(cardId => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'bingo-card-ui';
                cardDiv.innerHTML = `<div style="text-align:center; color:var(--orange); font-size:10px; margin-bottom:5px; font-weight:900;">BINGO CARD #${cardId}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'card-grid';
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                
                for(let r=0; r<5; r++) {
                    for(let c=0; c<5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'c-cell';
                        if(r===2 && c===2) { 
                            cell.innerHTML = '★'; cell.classList.add('marked'); 
                        } else {
                            // የካርቴላ ቁጥር አመራረት ፎርሙላ
                            let n = ranges[c][0] + ((cardId * (r + 7) + c) % 15);
                            cell.textContent = n;
                            cell.id = `card-${cardId}-num-${n}`;
                        }
                        grid.appendChild(cell);
                    }
                }
                cardDiv.appendChild(grid);
                container.appendChild(cardDiv);
            });
        }

        function updateLiveUI(lastBall) {
            // 1. የቢንጎ ሰሌዳውን (1-75) አድስ
            history.forEach(n => {
                const el = document.getElementById(`board-${n}`);
                if(el) el.classList.add('active');
                
                // 2. የመረጥካቸውን ካርቴላዎች በራስ-ሰር አድስ (Auto-fill)
                mySelections.forEach(cardId => {
                    const cardCell = document.getElementById(`card-${cardId}-num-${n}`);
                    if(cardCell) cardCell.classList.add('marked');
                });
            });
        }

        async function beginBingoDraw() {
            let pool = [];
            const loop = setInterval(async () => {
                if(pool.length >= 75) { 
                    clearInterval(loop); 
                    window.syncGame("END", pool, "FINISHED");
                    return; 
                }
                let n; do { n = Math.floor(Math.random()*75)+1; } while(pool.includes(n));
                pool.push(n);
                await window.syncGame(n, pool, "LIVE");
            }, 3000); // በየ 3 ሰከንዱ እጣ ይወጣል
        }

        init();
    </script>
</body>
</html>
