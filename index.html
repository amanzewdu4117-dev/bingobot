<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - COMPLETE SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --dark-blue: #1c2b3a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Shared Header */
        .header-box { display: flex; justify-content: space-around; padding: 12px; background: #0a1117; border-bottom: 1px solid var(--dark-blue); }
        .stat { text-align: center; flex: 1; }
        .stat label { display: block; font-size: 8px; color: #788da1; text-transform: uppercase; }
        .stat span { font-size: 15px; font-weight: bold; color: var(--neon); }

        /* Phase 1: Slot Selection Screen */
        #selection-screen { display: flex; flex-direction: column; height: 100vh; }
        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .slot { background: #1a252f; aspect-ratio: 1; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 1px solid #253341; cursor: pointer; color: #7a8a9a; transition: 0.2s; }
        .slot.selected { border-color: var(--orange); background: rgba(255, 126, 33, 0.2); color: white; box-shadow: 0 0 8px var(--orange); }

        /* Phase 2: Game Screen */
        #game-screen { display: none; height: 100vh; flex-direction: column; }
        .game-layout { display: grid; grid-template-columns: 100px 1fr; gap: 10px; padding: 10px; height: calc(100vh - 70px); }
        .board-side { background: var(--panel); border-radius: 10px; padding: 5px; overflow-y: auto; border: 1px solid var(--dark-blue); }
        .bingo-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .b-num { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 4px; color: #5c7894; }
        .b-num.active { background: var(--orange); color: white; font-weight: bold; }

        .play-side { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .ball-display { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; }
        .ball-val { font-size: 55px; font-weight: 900; color: var(--neon); line-height: 1; }

        .cartela { background: #16212a; padding: 10px; border-radius: 12px; border: 1px solid #253341; margin-bottom: 10px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 4px; color: white; }
        .c-cell.marked { background: var(--neon) !important; color: black !important; font-weight: bold; animation: pop 0.3s; }

        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
    </style>
</head>
<body onload="initSelection()">

    <div id="selection-screen">
        <div class="header-box">
            <div class="stat"><label>PLAYER</label><span>@User</span></div>
            <div class="stat"><label>SELECTED</label><span id="sel-count">0 / 2</span></div>
            <div class="stat"><label>STARTS IN</label><span id="countdown" style="color:red">00:20</span></div>
        </div>
        <div class="slot-grid" id="slot-container"></div>
    </div>

    <div id="game-screen">
        <div class="header-box">
            <div class="stat"><label>MY SLOTS</label><span id="ui-my-slots">--</span></div>
            <div class="stat"><label>CALLED</label><span id="ui-called">0</span></div>
            <div class="stat"><label>STATUS</label><span style="color:var(--orange)">LIVE</span></div>
        </div>
        <div class="game-layout">
            <div class="board-side"><div id="main-board" class="bingo-board"></div></div>
            <div class="play-side">
                <div class="ball-display">
                    <div class="ball-val" id="big-ball">--</div>
                    <div style="font-size:9px; color:var(--neon); letter-spacing:2px;">CURRENT BALL</div>
                </div>
                <div id="cards-holder"></div>
            </div>
        </div>
    </div>

    <script>
        let mySelectedSlots = [];
        let cardData = {};
        let gameHistory = [];

        function initSelection() {
            const grid = document.getElementById('slot-container');
            for(let i=1; i<=120; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.id = `slot-${i}`;
                div.innerText = i;
                div.onclick = () => toggleSlot(i);
                grid.appendChild(div);
            }
            startTimer(20); // 20 ሰከንድ መምረጫ ጊዜ
        }

        function toggleSlot(n) {
            let el = document.getElementById(`slot-${n}`);
            if(mySelectedSlots.includes(n)) {
                mySelectedSlots = mySelectedSlots.filter(x => x !== n);
                el.classList.remove('selected');
            } else if(mySelectedSlots.length < 2) {
                mySelectedSlots.push(n);
                el.classList.add('selected');
            }
            document.getElementById('sel-count').innerText = `${mySelectedSlots.length} / 2`;
        }

        function startTimer(sec) {
            let timer = setInterval(() => {
                sec--;
                document.getElementById('countdown').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
                if(sec <= 0) {
                    clearInterval(timer);
                    if(mySelectedSlots.length > 0) startLiveGame();
                    else location.reload();
                }
            }, 1000);
        }

        function startLiveGame() {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('ui-my-slots').innerText = mySelectedSlots.join(", ");

            // የግራ ሰሌዳ መሥራት
            const mb = document.getElementById('main-board');
            for(let i=1; i<=75; i++) mb.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            // ካርቴላዎቹን በራንደም ቁጥር መሙላት
            const holder = document.getElementById('cards-holder');
            mySelectedSlots.forEach(slot => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                cardData[slot] = nums;
                let html = `<div class="cartela"><div style="color:var(--neon); font-size:10px; margin-bottom:5px;">CARTELA ${slot}</div><div class="c-grid">`;
                nums.forEach((v, idx) => {
                    if(idx === 12) html += `<div class="c-cell marked">★</div>`;
                    else html += `<div class="c-cell" id="c-${slot}-${v}">${v}</div>`;
                });
                holder.innerHTML += html + `</div></div>`;
            });

            // Firebase ማዳመጥ
            window.listenToGame((data) => {
                if(data.ball) {
                    gameHistory = data.history || [];
                    document.getElementById('big-ball').innerText = data.ball;
                    document.getElementById('ui-called').innerText = gameHistory.length;
                    autoMark();
                }
            });

            runBallDraw(); // እጣ ማውጣት ይጀምራል
        }

        function autoMark() {
            gameHistory.forEach(num => {
                document.getElementById(`bn-${num}`)?.classList.add('active');
                mySelectedSlots.forEach(slot => {
                    document.getElementById(`c-${slot}-${num}`)?.classList.add('marked');
                });
            });
        }

        async function runBallDraw() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let hist = [];
            for(let b of pool) {
                hist.push(b);
                await setDoc(doc(window.db, "live_bingo", "current"), { ball: b, history: hist });
                await new Promise(r => setTimeout(r, 3000));
            }
        }
    </script>
</body>
</html>
