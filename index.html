<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - PERSISTENT SYSTEM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...", // የራስህን ቁጥር እዚህ ተካ
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ዳታ ወደ Firebase ለመላክ
        window.saveGameState = async (ball, history, status) => {
            await setDoc(doc(db, "live_bingo", "current"), { 
                ball, history, status, lastUpdate: Date.now() 
            }, { merge: true });
        };

        // ዳታ ከ Firebase ለማዳመጥ
        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root { --bg: #0b1421; --panel: #162130; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; }
        * { box-sizing: border-box; font-family: sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); padding: 10px; height: 100vh; overflow: hidden; }
        
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .stat-box { background: var(--panel); border: 1px solid #253341; border-radius: 10px; padding: 8px; text-align: center; }
        .stat-box label { font-size: 8px; color: var(--neon); display: block; margin-bottom: 4px; }
        .stat-box span { font-size: 13px; font-weight: 800; }

        .main-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 10px; height: calc(100vh - 120px); }
        .board-container { background: var(--panel); border-radius: 15px; padding: 5px; border: 1px solid #1c2b3a; display: flex; flex-direction: column; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 5px; }
        .letter { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 900; font-size: 10px; }
        .B { background: #1a99d5; } .I { background: #9c27b0; } .N { background: #e91e63; } .G { background: #009688; } .O { background: #ff9800; }
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; overflow-y: auto; }
        .num { background: #1d2938; aspect-ratio: 1.1; display: flex; align-items: center; justify-content: center; font-size: 9px; border-radius: 3px; color: #5c7894; }
        .num.active { background: var(--orange); color: white; }

        .right-side { display: flex; flex-direction: column; gap: 10px; }
        .ball-display { background: #000; border: 1px solid #1c2b3a; border-radius: 15px; padding: 15px; text-align: center; }
        .ball-num { font-size: 50px; font-weight: 900; }
        .personal-card { background: var(--panel); border-radius: 15px; padding: 10px; border: 1px dashed #253341; flex: 1; }
        .p-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .p-cell { aspect-ratio: 1; background: #0d161d; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #788da1; border: 1px solid #1c2b3a; }
        .p-cell.marked { background: var(--neon); color: black; }

        #win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="win-overlay">
        <h1 style="color:var(--neon); font-size:50px;">BINGO!</h1>
        <p>አዲስ ጨዋታ በ <span id="reset-timer">5</span> ሰከንድ ይጀምራል...</p>
    </div>

    <div class="stats-row">
        <div class="stat-box"><label>CARTELA</label><span>227</span></div>
        <div class="stat-box"><label>CALLED</label><span id="ui-called">0</span></div>
        <div class="stat-box"><label>WALLET</label><span id="ui-wallet">0</span></div>
        <div class="stat-box"><label>DERASH</label><span>1,816</span></div>
    </div>

    <div class="main-layout">
        <div class="board-container">
            <div class="bingo-header">
                <div class="letter B">B</div><div class="letter I">I</div><div class="letter N">N</div><div class="letter G">G</div><div class="letter O">O</div>
            </div>
            <div id="full-board" class="numbers-grid"></div>
        </div>

        <div class="right-side">
            <div class="ball-display">
                <div id="ball-val" class="ball-num">--</div>
                <div id="ball-let" style="color:var(--neon)">READY</div>
            </div>
            <div class="personal-card">
                <div id="personal-grid" class="p-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let drawnHistory = [];
        let isOwner = true; // ባለቤት ከሆንክ እጣው እንዲወጣ ያደርጋል

        function setup() {
            // ቦርድ መፍጠር
            const fb = document.getElementById('full-board');
            for(let i=1; i<=75; i++) {
                fb.innerHTML += `<div class="num" id="n-${i}">${i}</div>`;
            }

            // የራስህ ካርቴላ መፍጠር (Local Storage በመጠቀም ስትመለስ እንዳይጠፋ)
            let savedCard = localStorage.getItem('myBingoCard');
            let myNums = savedCard ? JSON.parse(savedCard) : generateRandomCard();
            localStorage.setItem('myBingoCard', JSON.stringify(myNums));

            const pg = document.getElementById('personal-grid');
            myNums.forEach((n, i) => {
                let cell = `<div class="p-cell ${i==12?'marked':''}" id="p-${n}">${i==12?'★':n}</div>`;
                pg.innerHTML += cell;
            });

            // Firebase ማዳመጥ (ወጥተህ ስትገባ ዳታውን የሚስበው እዚህ ጋር ነው)
            window.listenToGame((data) => {
                if(data.status === "RESET") {
                    location.reload(); // ጨዋታው ካለቀ አፑን ማደስ
                    return;
                }
                drawnHistory = data.history || [];
                updateUI(data.ball);
            });

            if(isOwner) startEngine();
        }

        function generateRandomCard() {
            let nums = [];
            while(nums.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!nums.includes(r)) nums.push(r);
            }
            return nums;
        }

        function updateUI(currentBall) {
            document.getElementById('ball-val').textContent = currentBall;
            document.getElementById('ui-called').textContent = drawnHistory.length;
            
            // ሁሉንም የወጡ ቁጥሮች ማብራት
            drawnHistory.forEach(num => {
                if(document.getElementById(`n-${num}`)) document.getElementById(`n-${num}`).classList.add('active');
                if(document.getElementById(`p-${num}`)) document.getElementById(`p-${num}`).classList.add('marked');
            });

            checkWin();
        }

        function startEngine() {
            let pool = Array.from({length: 75}, (_, i) => i + 1);
            setInterval(async () => {
                // የቆዩ እጣዎችን ከ pool ውስጥ መቀነስ (ወጥተህ ስትገባ ከቀጠለበት እንዲቀጥል)
                let remaining = pool.filter(n => !drawnHistory.includes(n));
                if(remaining.length === 0) return;

                let nextBall = remaining[Math.floor(Math.random() * remaining.length)];
                drawnHistory.push(nextBall);
                
                // ዳታውን ወደ Firebase መላክ (ወጥተህ ስትገባ የሚጠብቅህ ይሄ ነው)
                window.saveGameState(nextBall, drawnHistory, "LIVE");
            }, 4000);
        }

        function checkWin() {
            // የአሸናፊነት ቼክ እዚህ ይገባል
            // አሸናፊ ካለ window.saveGameState(0, [], "RESET") መጥራት
        }

        setup();
    </script>
</body>
</html>
