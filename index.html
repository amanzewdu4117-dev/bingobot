<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - FIXED AUTO-MARK</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        .header-box { display: flex; justify-content: space-around; padding: 12px; background: #0a1117; border-bottom: 1px solid #1c2b3a; }
        .stat { text-align: center; flex: 1; }
        .stat label { display: block; font-size: 8px; color: #788da1; }
        .stat span { font-size: 15px; font-weight: bold; color: var(--neon); }

        .game-layout { display: grid; grid-template-columns: 100px 1fr; gap: 10px; padding: 10px; height: calc(100vh - 60px); }
        
        /* ግራ ሰሌዳ */
        .board-side { background: var(--panel); border-radius: 10px; padding: 5px; overflow-y: auto; }
        .bingo-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; }
        .b-num { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #5c7894; }
        .b-num.active { background: var(--orange); color: white; }

        /* የቀኝ እጣ ማሳያ */
        .play-side { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .ball-display { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; }
        .ball-val { font-size: 60px; font-weight: 900; color: var(--neon); line-height: 1; }

        /* ካርቴላ */
        .cartela { background: #16212a; padding: 10px; border-radius: 12px; border: 1px solid #253341; margin-bottom: 15px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 4px; color: white; }
        
        /* እጣ ሲወጣ የሚበራው ከለር */
        .c-cell.marked { 
            background: var(--neon) !important; 
            color: black !important; 
            font-weight: bold; 
            box-shadow: 0 0 10px var(--neon);
            animation: pop 0.3s ease-out;
        }

        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
    </style>
</head>
<body onload="startGame()">

    <div class="header-box">
        <div class="stat"><label>MY SLOTS</label><span>19, 69</span></div>
        <div class="stat"><label>CALLED</label><span id="ui-called">0</span></div>
        <div class="stat"><label>STATUS</label><span style="color:var(--orange)">LIVE</span></div>
    </div>

    <div class="game-layout">
        <div class="board-side"><div id="main-board" class="bingo-board"></div></div>
        <div class="play-side">
            <div class="ball-display">
                <div class="ball-val" id="big-ball">--</div>
                <div style="font-size:10px; color:var(--neon); letter-spacing:2px;">CURRENT BALL</div>
            </div>
            <div id="cards-holder"></div>
        </div>
    </div>

    <script>
        let mySlots = [19, 69]; // እዚህ ላይ በምስሉ ላይ የታዩትን ቁጥሮች ተጠቅሜያለሁ
        let history = [];

        function startGame() {
            // ሰሌዳውን መሥራት
            const mb = document.getElementById('main-board');
            for(let i=1; i<=75; i++) mb.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            // ካርቴላዎቹን መሥራት
            const holder = document.getElementById('cards-holder');
            mySlots.forEach(slot => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                let html = `<div class="cartela"><div style="color:var(--neon); font-size:10px; margin-bottom:5px;">CARTELA ${slot}</div><div class="c-grid">`;
                nums.forEach((v, idx) => {
                    let id = `cell-${slot}-${v}`;
                    if(idx === 12) html += `<div class="c-cell marked">★</div>`;
                    else html += `<div class="c-cell" id="${id}">${v}</div>`;
                });
                holder.innerHTML += html + `</div></div>`;
            });

            // እጣውን ማዳመጥ
            window.listenToGame((data) => {
                if(data.ball) {
                    history = data.history || [];
                    document.getElementById('big-ball').innerText = data.ball;
                    document.getElementById('ui-called').innerText = history.length;
                    
                    // አውቶማቲክ ማርክ ማድረጊያ logic
                    markNumbers();
                }
            });

            // ኳስ ማውጫ ሲሙሌተር
            runBallDraw();
        }

        function markNumbers() {
            history.forEach(num => {
                // በግራ ሰሌዳ ላይ ማብራት
                document.getElementById(`bn-${num}`)?.classList.add('active');

                // በሁሉም ካርቴላዎች ላይ ቁጥሩ ካለ ማብራት
                mySlots.forEach(slot => {
                    let cell = document.getElementById(`cell-${slot}-${num}`);
                    if(cell) cell.classList.add('marked');
                });
            });
        }

        async function runBallDraw() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let drawHistory = [];
            for(let ball of pool) {
                drawHistory.push(ball);
                await setDoc(doc(window.db, "live_bingo", "current"), { ball: ball, history: drawHistory });
                await new Promise(r => setTimeout(r, 4000)); // በየ 4 ሰከንዱ እጣ ይወጣል
            }
        }
    </script>
</body>
</html>
