<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAMOS BINGO - 500 CARTELAS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Firebase Config (Replace with your actual keys)
        const firebaseConfig = {
            apiKey: "AIzaSyD2l0Q4JOn6S0Xf1YmB1Z0m-Z0m-Z0m", 
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            storageBucket: "my-app-project-1e0bb.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:9b5f5bc..." 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.syncFromCloud = (callback) => {
            onSnapshot(doc(db, "game_state", "live"), (snap) => {
                const data = snap.data();
                if(data) callback(data);
            });
        };

        window.adminPushBall = async (ball, allBalls) => {
            await setDoc(doc(db, "game_state", "live"), {
                lastBall: ball,
                history: allBalls,
                status: "active",
                time: new Date().getTime()
            });
        };

        window.resetGameCloud = async () => {
            await setDoc(doc(db, "game_state", "live"), {
                status: "reset",
                history: [],
                lastBall: null,
                time: new Date().getTime()
            });
        };
    </script>

    <style>
        :root {
            --neon: #00ffcc; --bg: #03070b; --card-bg: #0d141f; 
            --b: #00bcd4; --i: #9c27b0; --n: #f44336; --g: #4caf50; --o: #ff9800;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; }

        .stats-header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 10px; background: var(--card-bg); border-bottom: 1px solid #1f2d40; }
        .stat-box { background: rgba(0,0,0,0.3); border: 1px solid #1f2d40; border-radius: 8px; padding: 5px; text-align: center; }
        .stat-label { font-size: 8px; color: var(--neon); font-weight: bold; }
        
        #cartela-select { background: #1a2a3a; color: white; border: 1px solid var(--neon); border-radius: 5px; font-size: 14px; font-weight: 900; width: 100%; text-align: center; outline: none; }

        .main-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; height: calc(100vh - 120px); }

        .bingo-board { background: var(--card-bg); border-radius: 15px; padding: 8px; border: 1px solid #1f2d40; display: flex; flex-direction: column; height: 100%; }
        .bingo-letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 5px; }
        .b-letter { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-weight: 900; font-size: 14px; color: white; }
        
        .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; overflow-y: auto; flex: 1; }
        .num-cell { background: #050a10; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 16px; font-weight: bold; color: #4b627a; border: 1px solid #1a2a3a; transition: all 0.3s ease; }
        
        /* Auto-Fill & Active States */
        .num-cell.active { color: white; border: 2px solid white; transform: scale(1.05); }
        .b_active { background: var(--b); box-shadow: 0 0 10px var(--b); }
        .i_active { background: var(--i); box-shadow: 0 0 10px var(--i); }
        .n_active { background: var(--n); box-shadow: 0 0 10px var(--n); }
        .g_active { background: var(--g); box-shadow: 0 0 10px var(--g); }
        .o_active { background: var(--o); box-shadow: 0 0 10px var(--o); }

        .display-side { display: flex; flex-direction: column; gap: 10px; }
        .current-ball-box { background: var(--card-bg); border-radius: 20px; border: 2px solid var(--neon); flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .ball-val { font-size: 70px; font-weight: 900; line-height: 1; text-shadow: 0 0 15px var(--neon); }
        .ball-cat-label { padding: 5px 20px; border-radius: 20px; font-weight: bold; margin-top: 10px; min-width: 80px; text-align: center; }

        .footer-btns { position: fixed; bottom: 0; width: 100%; padding: 10px; background: var(--bg); display: flex; gap: 10px; }
        .btn-start { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-size: 16px; background: var(--neon); color: black; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stats-header">
        <div class="stat-box">
            <div class="stat-label">CARD #</div>
            <select id="cartela-select" onchange="generateCartela()">
                <!-- Options 1-500 -->
            </select>
        </div>
        <div class="stat-box"><div class="stat-label">CALLED</div><div class="stat-val" id="st-called">0</div></div>
        <div class="stat-box"><div class="stat-label">WALLET</div><div class="stat-val" id="st-wallet">0</div></div>
        <div class="stat-box"><div class="stat-label">PRIZE</div><div class="stat-val" style="color:var(--neon)">1,880</div></div>
    </div>

    <div class="main-container">
        <div class="bingo-board">
            <div class="bingo-letters">
                <div class="b-letter" style="background:var(--b)">B</div>
                <div class="b-letter" style="background:var(--i)">I</div>
                <div class="b-letter" style="background:var(--n)">N</div>
                <div class="b-letter" style="background:var(--g)">G</div>
                <div class="b-letter" style="background:var(--o)">O</div>
            </div>
            <div class="numbers-grid" id="num-grid"></div>
        </div>

        <div class="display-side">
            <div class="current-ball-box">
                <div class="ball-val" id="main-ball">--</div>
                <div id="main-cat" class="ball-cat-label" style="background:#2d3e50">READY</div>
            </div>
            <div style="background:var(--card-bg); flex:1.5; border-radius:15px; border:1px dashed #2d3e50; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 5px;">
               <div style="font-size: 25px;">⚡</div>
               <div style="font-size: 11px; color: var(--neon);">AUTO-CHECK ON</div>
               <div id="status-text" style="font-size: 10px; color: #4b627a;">የመረጡት ቁጥር ሲወጣ በራሱ ይሞላል</div>
            </div>
        </div>
    </div>

    <div class="footer-btns">
        <button class="btn-start" onclick="startBingoDraw()">START GAME</button>
    </div>

    <script>
        let currentNumbers = [];
        let calledHistory = [];

        function init() {
            const select = document.getElementById('cartela-select');
            for(let i=1; i<=500; i++) {
                let opt = document.createElement('option');
                opt.value = i; opt.textContent = i;
                if(i === 1) opt.selected = true;
                select.appendChild(opt);
            }
            generateCartela();

            window.syncFromCloud((data) => {
                if(data.status === "active") {
                    calledHistory = data.history;
                    updateDisplay(data.lastBall);
                }
                if(data.status === "reset") location.reload();
            });
        }

        // 500 የተለያዩ ካርቴላዎችን በሂሳባዊ ስሌት ማመንጫ (Deterministic Generator)
        function generateCartela() {
            const cardId = parseInt(document.getElementById('cartela-select').value);
            const grid = document.getElementById('num-grid');
            grid.innerHTML = '';
            currentNumbers = [];

            // ለእያንዳንዱ አምድ (B, I, N, G, O) ቁጥሮችን መመደብ
            const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            
            for(let col=0; col<5; col++) {
                let available = [];
                for(let n=ranges[col][0]; n<=ranges[col][1]; n++) available.push(n);
                
                // Shuffle numbers based on cardId to make each card unique
                let seed = cardId + col;
                for (let i = available.length - 1; i > 0; i--) {
                    const j = (seed * (i + 1)) % available.length;
                    [available[i], available[col]] = [available[col], available[i]];
                }

                // Pick first 5 numbers for the column
                for(let row=0; row<5; row++) {
                    currentNumbers.push(available[row]);
                }
            }

            // Display numbers on grid
            currentNumbers.forEach(num => {
                let cell = document.createElement('div');
                cell.className = 'num-cell';
                cell.id = `cell-${num}`;
                cell.textContent = num;
                grid.appendChild(cell);
            });
            
            checkAutoFill(); // Check if any numbers are already called
        }

        function updateDisplay(last) {
            document.getElementById('main-ball').textContent = last;
            document.getElementById('st-called').textContent = calledHistory.length;
            
            let cat = last <= 15 ? 'b' : last <= 30 ? 'i' : last <= 45 ? 'n' : last <= 60 ? 'g' : 'o';
            let catLabel = document.getElementById('main-cat');
            catLabel.textContent = cat.toUpperCase();
            catLabel.style.background = `var(--${cat})`;

            checkAutoFill();
        }

        // ቁጥሩ ሲወጣ በካርቴላው ላይ ካለ በራሱ እንዲበራ ማድረጊያ
        function checkAutoFill() {
            calledHistory.forEach(num => {
                let el = document.getElementById(`cell-${num}`);
                if(el && !el.classList.contains('active')) {
                    let c = num <= 15 ? 'b' : num <= 30 ? 'i' : num <= 45 ? 'n' : num <= 60 ? 'g' : 'o';
                    el.className = `num-cell active ${c}_active`;
                }
            });
        }

        function startBingoDraw() {
            let d = [];
            const loop = setInterval(() => {
                if(d.length >= 75) { clearInterval(loop); return; }
                let n; do { n = Math.floor(Math.random()*75)+1; } while(d.includes(n));
                d.push(n);
                window.adminPushBall(n, d);
            }, 3000);
        }

        init();
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
