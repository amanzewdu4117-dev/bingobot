<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-around; background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .stat { color: #4caf50; font-weight: bold; }
        .timer { color: #f44336; font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; max-width: 400px; margin: auto; background: #1e1e1e; padding: 10px; border-radius: 10px; }
        .grid-item { background: #2c2c2c; padding: 10px 0; border-radius: 5px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .grid-item.selected { background: #ff9800; color: black; font-weight: bold; }
        .grid-item.star { color: #ff9800; font-size: 20px; cursor: default; }
    </style>
</head>
<body>

    <div class="header">
        <div>CLOSES IN<br><span id="timer" class="timer">02:00</span></div>
        <div>CARTELA<br><span id="cartela-count" class="stat">0</span></div>
        <div>WALLET<br><span id="wallet" class="stat">40 ETB</span></div>
    </div>

    <div class="grid" id="bingo-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const PRICE_PER_CARTELA = 10;
        let balance = 40;
        let selectedNumbers = new Set();
        let timeLeft = 120;
        let isGameClosed = false;

        const grid = document.getElementById('bingo-grid');
        const timerEl = document.getElementById('timer');
        const cartelaEl = document.getElementById('cartela-count');
        const walletEl = document.getElementById('wallet');

        // ግሪዱን መፍጠር (ከነ መሃል ኮከብ)
        for (let i = 1; i <= 73; i++) {
            const item = document.createElement('div');
            item.classList.add('grid-item');

            if (i === 37) {
                item.innerHTML = "⭐";
                item.classList.add('star');
            } else {
                let displayNum = i < 37 ? i : i - 1;
                item.textContent = displayNum;
                item.onclick = () => selectNumber(displayNum, item);
            }
            grid.appendChild(item);
        }

        function selectNumber(num, element) {
            if (isGameClosed) return;

            if (selectedNumbers.has(num)) {
                selectedNumbers.delete(num);
                element.classList.remove('selected');
                balance += PRICE_PER_CARTELA;
            } else {
                if (selectedNumbers.size >= 2) {
                    tg.showAlert("⚠️ በአንድ ጊዜ መምረጥ የሚችሉት 2 ቁጥር ብቻ ነው!");
                    return;
                }
                if (balance >= PRICE_PER_CARTELA) {
                    selectedNumbers.add(num);
                    element.classList.add('selected');
                    balance -= PRICE_PER_CARTELA;
                    tg.HapticFeedback.impactOccurred('light');
                } else {
                    tg.showAlert("⚠️ በቂ ባላንስ የሎትም!");
                }
            }
            updateUI();
        }

        function updateUI() {
            cartelaEl.textContent = selectedNumbers.size;
            walletEl.textContent = balance + " ETB";
        }

        // Timer
        const countdown = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                isGameClosed = true;
                tg.sendData(JSON.stringify({
                    numbers: Array.from(selectedNumbers),
                    final_balance: balance
                }));
                tg.close();
            }
        }, 1000);
    </script>
</body>
</html>
