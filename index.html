<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vamos Bingo - Professional Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-dark: #050a0f; --panel-bg: #0d161f; --accent: #00ffcc;
            --orange: #ff9d00; --text-gray: #7d8b99;
            --b-clr: #00d2ff; --i-clr: #9d50bb; --n-clr: #f0003c; --g-clr: #00f260; --o-clr: #ff9d00;
        }

        body { 
            background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; height: 100vh;
        }

        .screen { display: none; height: 100vh; width: 100vw; position: absolute; }
        .active-screen { display: block !important; }

        /* --- 1. Dashboard Style (አዲሱ መግቢያ) --- */
        .menu-header { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #0d161f, #050a0f); }
        .balance-card { background: #15222e; margin: 20px 30px; padding: 15px; border-radius: 15px; border: 1px solid rgba(0,255,204,0.2); text-align: center; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .menu-btn { 
            background: var(--panel-bg); border: 1px solid #1a2a38; color: white; padding: 20px 10px; 
            border-radius: 15px; font-size: 13px; font-weight: bold; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .menu-btn:active { transform: scale(0.95); border-color: var(--accent); }

        /* --- 2. Bingo Lobby & Game Style (አንተ የላክኸው) --- */
        .top-profile { padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; background: var(--b-clr); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 10px rgba(0,210,255,0.4); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 0 10px; }
        .stat-card { background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); padding: 6px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 8px; color: var(--text-gray); text-transform: uppercase; }
        .stat-value { font-size: 13px; font-weight: 900; color: var(--accent); }
        .scroll-container { height: calc(100vh - 260px); overflow-y: auto; padding: 10px; }
        .slots-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; background: var(--panel-bg); padding: 12px; border-radius: 18px; border: 1px solid #1a2a38; }
        .slot { aspect-ratio: 1; background: #15222e; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #4e6a85; border: 1px solid #1f3344; transition: 0.2s; }
        .slot.selected { background: rgba(0, 255, 204, 0.15); color: var(--accent); border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); transform: scale(1.05); }
        .footer-preview { position: fixed; bottom: 0; width: 100%; background: #03070a; padding: 12px; border-top: 2px solid #1a2a38; box-sizing: border-box; }
        .card-scroller { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; min-height: 80px; }
        .bingo-card { background: #0b141d; border: 2px solid #1e2d3a; border-radius: 12px; width: 115px; flex-shrink: 0; padding: 5px; }
        .b-head-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 4px; }
        .h-cell { height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; border-radius: 3px; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .c-cell { aspect-ratio: 1; background: #050a10; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; border: 1px solid #162431; }
        .c-cell.hit { background: var(--accent); color: #000; }
        .c-cell.free-space { background: linear-gradient(135deg, var(--orange), #ff5e00); font-size: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 157, 0, 0.7); } 70% { box-shadow: 0 0 0 5px rgba(255, 157, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 157, 0, 0); } }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active-screen">
        <div class="menu-header">
            <div class="user-avatar" id="m-avatar" style="margin: 0 auto 10px; width: 60px; height: 60px;">A</div>
            <h2 id="m-username" style="margin: 0;">Loading...</h2>
        </div>
        <div class="balance-card">
            <div style="font-size: 10px; color: var(--text-gray);">TOTAL BALANCE</div>
            <div style="font-size: 26px; font-weight: 900; color: var(--accent);"><span id="dash-wallet">0.00</span> ETB</div>
        </div>
        <div class="menu-grid">
            <button class="menu-btn" onclick="switchScreen('lobby-screen')"><span>🎮</span> Play Bingo</button>
            <button class="menu-btn" onclick="handleAction('Deposit')"><span>💰</span> Deposit</button>
            <button class="menu-btn" onclick="handleAction('Withdraw')"><span>💳</span> Withdraw</button>
            <button class="menu-btn" onclick="handleAction('Invite')"><span>👥</span> Invite</button>
            <button class="menu-btn" onclick="handleAction('Support')"><span>🆘</span> Support</button>
            <button class="menu-btn" onclick="tele.close()"><span>❌</span> Exit</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="top-profile" onclick="switchScreen('main-menu')">
            <div class="user-avatar">←</div>
            <div>
                <div id="lobby-user" style="font-size: 13px; font-weight: bold;">@Player</div>
                <div style="color:var(--text-gray); font-size: 10px;">Wallet: <span id="lobby-wallet">0.00</span> ETB</div>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card" style="border-color:var(--accent)"><div class="stat-label">Timer</div><div id="timer" class="stat-value">15s</div></div>
            <div class="stat-card"><div class="stat-label">Selected</div><div id="sel-count" class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">Price</div><div class="stat-value">10 ETB</div></div>
            <div class="stat-card" style="border-color:var(--orange)"><div class="stat-label">Jackpot</div><div class="stat-value" style="color:var(--orange)">2.5k</div></div>
        </div>
        <div class="scroll-container"><div class="slots-grid" id="slots-box"></div></div>
        <div class="footer-preview"><div class="card-scroller" id="preview-box"></div></div>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g",
        authDomain: "my-app-project-1e0bb.firebaseapp.com",
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com",
        projectId: "my-app-project-1e0bb",
        storageBucket: "my-app-project-1e0bb.firebasestorage.app",
        messagingSenderId: "280130045202",
        appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- TELEGRAM DATA ---
    const tele = window.Telegram.WebApp;
    tele.ready();
    const user = tele.initDataUnsafe.user || { id: "12345", first_name: "User" };

    let wallet = 0;
    let selected = [];
    const cardPrice = 10;

    // Sync Data
    db.ref('users/' + user.id).on('value', (snap) => {
        const val = snap.val();
        wallet = val ? val.balance : 500.00;
        if(!val) db.ref('users/' + user.id).set({ name: user.first_name, balance: wallet });
        updateUI();
    });

    function updateUI() {
        document.getElementById('m-username').innerText = user.first_name;
        document.getElementById('lobby-user').innerText = "@" + user.first_name;
        document.getElementById('dash-wallet').innerText = wallet.toFixed(2);
        document.getElementById('lobby-wallet').innerText = wallet.toFixed(2);
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(id).classList.add('active-screen');
        if(id === 'lobby-screen') initSlots();
    }

    function handleAction(type) {
        alert(type + " ገጽ በቅርቡ ይከፈታል!");
    }

    // --- LOBBY LOGIC ---
    function initSlots() {
        const box = document.getElementById('slots-box');
        box.innerHTML = '';
        for(let i=1; i<=100; i++) {
            let s = document.createElement('div');
            s.className = 'slot' + (selected.includes(i) ? ' selected' : '');
            s.innerText = i;
            s.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(x => x !== i);
                    db.ref('users/'+user.id).update({ balance: wallet + cardPrice });
                } else if(wallet >= cardPrice && selected.length < 3) {
                    selected.push(i);
                    db.ref('users/'+user.id).update({ balance: wallet - cardPrice });
                }
                document.getElementById('sel-count').innerText = selected.length;
                initSlots();
            };
            box.appendChild(s);
        }
    }
</script>
</body>
</html>
