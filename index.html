<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111b; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        
        /* የላይኛው መረጃ */
        .top-bar { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 15px; }
        .info-box { background: #162133; flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #2a3a52; text-align: center; }
        .label { color: #4cafaf; font-size: 10px; text-transform: uppercase; margin-bottom: 4px; }
        .value { color: #00ffcc; font-weight: bold; font-size: 16px; }

        /* ዋናው የጨዋታ ቦታ (ግራ እና ቀኝ) */
        .main-layout { display: flex; gap: 10px; flex: 1; overflow: hidden; }

        /* የግራ ጎን - BINGO Grid */
        .left-panel { flex: 1.5; background: #162133; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 5px; }
        .b-letter { background: #1a5fb4; padding: 5px; border-radius: 4px; font-weight: bold; text-align: center; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; overflow-y: auto; }
        .grid-item { background: #24344d; padding: 12px 0; border-radius: 4px; cursor: pointer; font-size: 12px; text-align: center; border: 1px solid transparent; }
        .grid-item.selected { background: #ff9800; color: black; font-weight: bold; border-color: white; }
        .grid-item.star { color: #ff9800; font-size: 18px; }

        /* የቀኝ ጎን - መቆጣጠሪያ */
        .right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .status-card { background: #162133; border-radius: 12px; padding: 15px; border: 1px solid #2a3a52; text-align: center; flex: 1; }
        .timer { font-size: 24px; color: #ff4d4d; font-weight: bold; margin-top: 10px; }
        
        .selected-box { background: #162133; border-radius: 12px; padding: 10px; border: 1px solid #ff9800; min-height: 100px; }
        .selected-box h4 { margin: 0 0 10px 0; font-size: 12px; color: #ff9800; }
        .sel-list { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .sel-num { background: #ff9800; color: black; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="info-box"><div class="label">Wallet</div><div id="wallet" class="value">40 ETB</div></div>
        <div class="info-box"><div class="label">Price</div><div class="value">10 ETB</div></div>
        <div class="info-box"><div class="label">Cartela</div><div id="cartela-count" class="value">0</div></div>
    </div>

    <div class="main-layout">
        <!-- የግራ ጎን -->
        <div class="left-panel">
            <div class="bingo-header">
                <div class="b-letter" style="background: #0088cc;">B</div>
                <div class="b-letter" style="background: #9b59b6;">I</div>
                <div class="b-letter" style="background: #e74c3c;">N</div>
                <div class="b-letter" style="background: #2ecc71;">G</div>
                <div class="b-letter" style="background: #f39c12;">O</div>
            </div>
            <div class="grid" id="bingo-grid"></div>
        </div>

        <!-- የቀኝ ጎን -->
        <div class="right-panel">
            <div class="status-card">
                <div class="label">Closes In</div>
                <div id="timer" class="timer">02:00</div>
            </div>
            <div class="selected-box">
                <h4>የእርስዎ ቁጥሮች</h4>
                <div id="selected-list" class="sel-list"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const PRICE_PER_CARTELA = 10;
        let balance = 40;
        let selectedNumbers = new Set();
        let timeLeft = 120;
        let isGameClosed = false;

        const grid = document.getElementById('bingo-grid');
        const timerEl = document.getElementById('timer');
        const walletEl = document.getElementById('wallet');
        const cartelaEl = document.getElementById('cartela-count');
        const selectedListEl = document.getElementById('selected-list');

        // ግሪዱን መፍጠር (75 ቁጥሮች ለቢንጎ እንዲመች በ 5 Column)
        for (let i = 1; i <= 75; i++) {
            const item = document.createElement('div');
            item.classList.add('grid-item');
            if (i === 38) { // መሃል ላይ ኮከብ
                item.innerHTML = "⭐";
                item.classList.add('star');
            } else {
                item.textContent = i;
                item.onclick = () => selectNumber(i, item);
            }
            grid.appendChild(item);
        }

        function selectNumber(num, element) {
            if (isGameClosed) return;
            if (selectedNumbers.has(num)) {
                selectedNumbers.delete(num);
                element.classList.remove('selected');
                balance += PRICE_PER_CARTELA;
            } else {
                if (selectedNumbers.size >= 2) {
                    tg.showAlert("⚠️ 2 ቁጥር ብቻ ነው የሚቻለው!");
                    return;
                }
                if (balance >= PRICE_PER_CARTELA) {
                    selectedNumbers.add(num);
                    element.classList.add('selected');
                    balance -= PRICE_PER_CARTELA;
                } else {
                    tg.showAlert("⚠️ ባላንስ የሎትም!");
                }
            }
            updateUI();
        }

        function updateUI() {
            walletEl.textContent = balance + " ETB";
            cartelaEl.textContent = selectedNumbers.size;
            selectedListEl.innerHTML = "";
            selectedNumbers.forEach(num => {
                const span = document.createElement('span');
                span.classList.add('sel-num');
                span.textContent = num;
                selectedListEl.appendChild(span);
            });
        }

        const countdown = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                isGameClosed = true;
                tg.sendData(JSON.stringify({numbers: Array.from(selectedNumbers), final_balance: balance}));
                tg.close();
            }
        }, 1000);
    </script>
</body>
</html>
