<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO PRO - MASTER EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Firebase SDK Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        // Firebase Configuration (Based on your credentials)
        const firebaseConfig = {
            apiKey: "AIzaSyD2lOQ4J...", 
            authDomain: "my-app-pro-38440.firebaseapp.com",
            projectId: "my-app-pro-38440",
            storageBucket: "my-app-pro-38440.appspot.com",
            messagingSenderId: "280130045202",
            appId: "1:280130045202:web:your_web_id" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Function to push drawing data to Firebase
        window.syncToFirebase = async (ball, history, status) => {
            try {
                await setDoc(doc(db, "live_bingo", "current"), { 
                    ball: ball, 
                    history: history, 
                    status: status, 
                    timestamp: Date.now() 
                }, { merge: true });
            } catch (e) { console.error("Firebase Sync Error:", e); }
        };

        // Function to listen for live updates
        window.listenToFirebase = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        /* CSS Styling - Professional Dark Theme */
        :root { 
            --bg: #050a10; --panel: #111a24; --neon: #00ffcc; 
            --orange: #ff5722; --text: #ffffff; --dim: #445b73;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Page Management */
        .view { display: none; height: 100vh; flex-direction: column; }
        .active-view { display: flex; }

        /* Header UI */
        .top-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; background: #081018; border-bottom: 1px solid #1c2a38; }
        .stat-card { background: var(--panel); border-radius: 12px; padding: 8px; text-align: center; border: 1px solid #1c2a38; }
        .stat-card label { font-size: 9px; color: var(--neon); display: block; text-transform: uppercase; margin-bottom: 2px; }
        .stat-card span { font-size: 15px; font-weight: 800; }

        /* Selection View Styles */
        .selection-area { flex: 1; overflow-y: auto; padding: 15px; }
        .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .slot-item { aspect-ratio: 1; background: var(--panel); border: 1.5px solid #1c2a38; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .slot-item.picked { border-color: var(--orange); background: rgba(255, 87, 34, 0.15); color: var(--orange); transform: scale(0.95); }

        /* Game View Styles */
        .game-container { flex: 1; display: flex; gap: 15px; padding: 15px; overflow: hidden; }
        
        .main-board { flex: 1.3; background: var(--panel); border-radius: 25px; padding: 15px; border: 1px solid #1c2a38; display: flex; flex-direction: column; }
        .ball-call-box { background: #081018; border: 2.5px solid var(--neon); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 15px; box-shadow: 0 0 20px rgba(0, 255, 204, 0.15); }
        .ball-num { font-size: 60px; font-weight: 900; line-height: 1; color: #fff; text-shadow: 0 0 10px var(--neon); }

        .bingo-label-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 10px; }
        .letter { background: var(--orange); color: #fff; text-align: center; font-weight: 900; border-radius: 8px; padding: 10px 0; font-size: 18px; }

        .number-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; flex: 1; overflow-y: auto; padding-right: 5px; }
        .num-box { background: #0d141f; font-size: 12px; text-align: center; padding: 8px 0; border-radius: 6px; color: var(--dim); font-weight: bold; border: 1px solid transparent; }
        .num-box.active { background: var(--neon); color: #000; border-color: #fff; transform: scale(1.05); font-weight: 900; }

        .player-cards-side { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        .game-card { background: #081018; border: 2px solid var(--orange); border-radius: 20px; padding: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .game-card-head { text-align: center; color: var(--orange); font-size: 11px; font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }
        .card-inner-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { aspect-ratio: 1; background: var(--panel); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #5c7894; }
        .cell.marked { background: var(--orange); color: #fff; border: 1px solid #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.4); }

        /* Button Footer */
        .bottom-nav { padding: 15px; background: #081018; border-top: 1px solid #1c2a38; }
        .action-btn { width: 100%; padding: 22px; border-radius: 18px; border: none; background: var(--neon); color: #000; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2); }
        .action-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <!-- SECTION 1: CARTELLA SELECTION -->
    <div id="view-selection" class="view active-view">
        <div class="top-header">
            <div class="stat-card"><label>WALLET</label><span>40.00 ETB</span></div>
            <div class="stat-card"><label>SELECTED</label><span id="count-ui">0/2</span></div>
            <div class="stat-card"><label>MODE</label><span>CLASSIC</span></div>
        </div>
        <div class="selection-area">
            <p style="text-align:center; color:var(--neon); margin-bottom:15px; font-weight:800; font-size:14px;">SELECT YOUR SLOTS (1-500)</p>
            <div id="slot-container" class="slot-grid"></div>
        </div>
        <div class="bottom-nav">
            <button class="action-btn" onclick="moveToGame()">START GAME SESSION</button>
        </div>
    </div>

    <!-- SECTION 2: LIVE BINGO GAME -->
    <div id="view-game" class="view">
        <div class="top-header">
            <div class="stat-card"><label>STATUS</label><span id="game-status">IDLE</span></div>
            <div class="stat-card"><label>DRAW TIMER</label><span id="timer-ui">15s</span></div>
            <div class="stat-card"><label>BALLS</label><span id="ball-count-ui">0/75</span></div>
        </div>
        <div class="game-container">
            <!-- Left: Master Board -->
            <div class="main-board">
                <div class="ball-call-box">
                    <div id="current-ball" class="ball-num">--</div>
                    <div id="draw-info" style="font-size:11px; color:var(--neon); margin-top:5px; font-weight:bold;">PREPARING...</div>
                </div>
                <div class="bingo-label-row">
                    <div class="letter">B</div><div class="letter">I</div>
                    <div class="letter">N</div><div class="letter">G</div>
                    <div class="letter">O</div>
                </div>
                <div id="master-grid" class="number-grid"></div>
            </div>

            <!-- Right: My Cards -->
            <div id="my-active-cards" class="player-cards-side"></div>
        </div>
    </div>

    <script>
        let selectedSlots = [];
        let callHistory = [];
        let engineRunning = false;

        function initialize() {
            // Generate 500 Slots
            const container = document.getElementById('slot-container');
            for(let i=1; i<=500; i++) {
                const el = document.createElement('div');
                el.className = 'slot-item'; el.id = `slot-${i}`; el.textContent = i;
                el.onclick = () => handleSlotClick(i);
                container.appendChild(el);
            }

            // Generate Master Board (1-75)
            const master = document.getElementById('master-grid');
            for(let n=1; n<=75; n++) {
                const nbox = document.createElement('div');
                nbox.className = 'num-box'; nbox.id = `master-${n}`; nbox.textContent = n;
                master.appendChild(nbox);
            }

            // Listen for Firebase Sync
            window.listenToFirebase((data) => {
                callHistory = data.history || [];
                document.getElementById('current-ball').textContent = data.ball || "--";
                document.getElementById('game-status').textContent = data.status;
                document.getElementById('ball-count-ui').textContent = `${callHistory.length}/75`;
                refreshLiveUI();
            });
        }

        function handleSlotClick(id) {
            if(selectedSlots.includes(id)) {
                selectedSlots = selectedSlots.filter(x => x !== id);
            } else if(selectedSlots.length < 2) {
                selectedSlots.push(id);
            }
            updateSelectionVisuals();
        }

        function updateSelectionVisuals() {
            document.querySelectorAll('.slot-item').forEach(s => s.classList.remove('picked'));
            selectedSlots.forEach(id => document.getElementById(`slot-${id}`).classList.add('picked'));
            document.getElementById('count-ui').textContent = `${selectedSlots.length}/2`;
        }

        function moveToGame() {
            if(selectedSlots.length === 0) return alert("እባክዎ ካርቴላ ይምረጡ!");
            document.getElementById('view-selection').classList.remove('active-view');
            document.getElementById('view-game').classList.add('active-view');
            
            buildPlayerCards();
            startCountdown();
        }

        function buildPlayerCards() {
            const wrap = document.getElementById('my-active-cards');
            wrap.innerHTML = '';
            selectedSlots.forEach(cid => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'game-card';
                cardDiv.innerHTML = `<div class="game-card-head">CARTELLA #${cid}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'card-inner-grid';
                const ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
                
                for(let r=0; r<5; r++) {
                    for(let c=0; c<5; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if(r===2 && c===2) {
                            cell.innerHTML = '⭐'; cell.classList.add('marked');
                        } else {
                            // Professional algorithm for consistent card numbers
                            let val = ranges[c][0] + ((cid * (r + 19) + c) % 15);
                            cell.textContent = val;
                            cell.id = `card-${cid}-val-${val}`;
                        }
                        grid.appendChild(cell);
                    }
                }
                cardDiv.appendChild(grid);
                wrap.appendChild(cardDiv);
            });
        }

        function refreshLiveUI() {
            callHistory.forEach(num => {
                const mBox = document.getElementById(`master-${num}`);
                if(mBox) mBox.classList.add('active');
                
                selectedSlots.forEach(cid => {
                    const cCell = document.getElementById(`card-${cid}-val-${num}`);
                    if(cCell) cCell.classList.add('marked');
                });
            });
        }

        function startCountdown() {
            let sec = 15;
            const timer = setInterval(() => {
                document.getElementById('timer-ui').textContent = `${sec}s`;
                document.getElementById('draw-info').textContent = "WAITING FOR PLAYERS...";
                if(sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer-ui').textContent = "LIVE";
                    document.getElementById('draw-info').textContent = "DRAWING NOW";
                    startAutoDrawing();
                }
                sec--;
            }, 1000);
        }

        async function startAutoDrawing() {
            if(engineRunning) return;
            engineRunning = true;
            let pool = [];
            
            const drawingInterval = setInterval(async () => {
                if(pool.length >= 75) {
                    clearInterval(drawingInterval);
                    await window.syncToFirebase("END", pool, "FINISHED");
                    return;
                }
                
                let nextBall;
                do {
                    nextBall = Math.floor(Math.random() * 75) + 1;
                } while(pool.includes(nextBall));
                
                pool.push(nextBall);
                await window.syncToFirebase(nextBall, pool, "LIVE");
            }, 3500); // Draws every 3.5 seconds
        }

        initialize();
    </script>
</body>
</html>
