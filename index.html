<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Bingo Pro - Preview Edition</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg: #050a12; --panel: #111b27; --accent: #00ffcc;
            --orange: #ff9d00;
            --b-clr: #00d2ff; --i-clr: #9d50bb; --n-clr: #ff3e3e; --g-clr: #00ff85; --o-clr: #ffae00;
        }

        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        .top-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px; background: #000; border-bottom: 1px solid #1e2d3d; height: 35px; }

        /* Selection Page */
        #selection-page { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; background: var(--panel); border-bottom: 1px solid #1e2d3a; }
        #slots-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; padding-bottom: 130px; }
        .slot-btn { height: 45px; background: #15222e; border: 1px solid #1f3344; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
        .slot-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(0, 255, 204, 0.1); }

        /* Preview Bar */
        #selected-preview-bar {
            background: #0d1621; border-top: 2px solid var(--accent);
            padding: 10px; display: flex; gap: 12px; overflow-x: auto;
            min-height: 120px; align-items: flex-start;
        }
        .mini-card-detail { background: #1a2634; border: 1px solid #30475e; border-radius: 6px; padding: 6px; min-width: 95px; }
        .mini-card-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; text-align: center; font-weight: 900; font-size: 8px; margin-bottom: 4px; }
        .mini-grid-preview { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .mini-cell { font-size: 8px; background: #111b27; color: #fff; text-align: center; padding: 2px 0; border-radius: 2px; }

        /* Game Colors */
        .cl-b { color: var(--b-clr); } .cl-i { color: var(--i-clr); } .cl-n { color: var(--n-clr); } .cl-g { color: var(--g-clr); } .cl-o { color: var(--o-clr); }

        /* Game Layout */
        .game-container { display: flex; gap: 6px; padding: 6px; flex: 1; overflow: hidden; }
        .board-side { flex: 1.8; background: var(--panel); border-radius: 8px; padding: 6px; border: 1px solid #1e2d3a; display: flex; flex-direction: column; }
        .board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; overflow-y: auto; flex: 1; }
        .num-cell { background: #1a2634; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 4px; color: #778899; border: 1px solid #253547; }
        .num-cell.called { background: var(--orange); color: #000; font-weight: bold; }

        /* Cards Side */
        .cards-side { flex: 1.2; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .active-card { background: #0d1621; border: 1px solid #1e2d3a; border-radius: 8px; padding: 8px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-header-letters { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; margin-bottom: 5px; text-align: center; font-weight: 900; font-size: 10px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .card-cell { background: #15222e; border: 1px solid #1e2d3a; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 2px; }
        .card-cell.hit { background: linear-gradient(135deg, var(--accent), #0099ff); color: #000; border: none; }

        .footer-panel { background: #0d1621; border-top: 1px solid var(--accent); height: 40px; display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

    <div class="top-status-bar">
        <div style="font-weight: 900; font-size: 14px; color: var(--accent)">AMAN BINGO</div>
        <div style="color: var(--accent); font-weight: bold; font-size: 12px;"><span id="main-balance">0.00</span> ETB</div>
    </div>

    <!-- Selection -->
    <div id="selection-page">
        <div class="header">
            <div style="font-size: 12px; color: #aaa;">እስከ 3 ካርቴላ ይምረጡ</div>
            <div id="timer" style="color: var(--orange); font-weight: 900; font-size: 18px;">15</div>
        </div>
        <div id="slots-grid"></div>
        <div id="selected-preview-bar">
            <div style="font-size: 11px; color: #4e6a85; width: 100%; text-align: center; padding-top: 20px;">ካርቴላ ሲመርጡ ዝርዝሩ እዚህ ይታያል</div>
        </div>
    </div>

    <!-- Game -->
    <div id="game-page" class="hidden">
        <div style="padding: 5px;">
            <div style="height: 50px; background: #000; border: 1.5px solid var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 15px;">
                <div id="ball-let" style="font-size: 24px; font-weight: 900;">-</div>
                <div id="ball-num" style="font-size: 34px; font-weight: 900; color: #fff;">--</div>
            </div>
        </div>

        <div class="game-container">
            <div class="board-side">
                <div style="display:grid; grid-template-columns: repeat(5,1fr); padding-bottom:5px; text-align:center; font-weight:900; font-size:12px;">
                    <div class="cl-b">B</div><div class="cl-i">I</div><div class="cl-n">N</div><div class="cl-g">G</div><div class="cl-o">O</div>
                </div>
                <div class="board-grid" id="game-board"></div>
            </div>
            <div class="cards-side" id="active-cards-area"></div>
        </div>

        <div class="footer-panel">
            <div style="text-align:center; font-size:11px; color:var(--accent); font-weight:bold;">BALLS: <span id="balls-count">0</span>/75</div>
            <div style="color:var(--orange); font-weight:bold; font-size:10px;">LIVE GAME</div>
            <div style="text-align:center; font-size:11px; color:var(--accent); font-weight:bold;">STATUS: <span id="game-info">PLAYING</span></div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g", databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tg = window.Telegram.WebApp;
    const userId = (tg.initDataUnsafe?.user?.id || "dev").toString();

    let selected = [], cardData = {}, calledNumbers = new Set(), isGameOver = false;

    db.ref('users/' + userId).on('value', snap => {
        document.getElementById('main-balance').innerText = (snap.val()?.balance || 0).toLocaleString();
    });

    function generateCard() {
        let card = [];
        let ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
        for(let c=0; c<5; c++) {
            let col = [];
            while(col.length<5) {
                let n = Math.floor(Math.random()*15)+ranges[c][0];
                if(!col.includes(n)) col.push(n);
            }
            card.push(col.sort((a,b)=>a-b));
        }
        return card;
    }

    function updatePreview() {
        const bar = document.getElementById('selected-preview-bar');
        if (selected.length === 0) {
            bar.innerHTML = '<div style="font-size: 11px; color: #4e6a85; width: 100%; text-align: center; padding-top: 20px;">ካርቴላ ሲመርጡ ዝርዝሩ እዚህ ይታያል</div>';
            return;
        }
        bar.innerHTML = "";
        selected.forEach(id => {
            const data = cardData[id];
            let html = `
                <div class="mini-card-detail">
                    <div style="font-size: 8px; font-weight: bold; color: #778899; margin-bottom: 2px;">#${id}</div>
                    <div class="mini-card-header">
                        <span class="cl-b">B</span><span class="cl-i">I</span><span class="cl-n">N</span><span class="cl-g">G</span><span class="cl-o">O</span>
                    </div>
                    <div class="mini-grid-preview">`;
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    let val = (r === 2 && c === 2) ? "F" : data[c][r];
                    html += `<div class="mini-cell">${val}</div>`;
                }
            }
            bar.innerHTML += html + `</div></div>`;
        });
    }

    function initSelection() {
        const grid = document.getElementById('slots-grid');
        for(let i=1; i<=500; i++) {
            let btn = document.createElement('div');
            btn.className = "slot-btn";
            btn.innerText = i;
            btn.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(x => x !== i);
                    btn.classList.remove('selected');
                } else if(selected.length < 3) {
                    selected.push(i);
                    cardData[i] = generateCard();
                    btn.classList.add('selected');
                }
                updatePreview();
            };
            grid.appendChild(btn);
        }
        
        let timeLeft = 15;
        const t = setInterval(() => {
            timeLeft--; 
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) { 
                clearInterval(t); 
                if(selected.length === 0) { selected.push(1); cardData[1] = generateCard(); }
                switchToGame(); 
            }
        }, 1000);
    }

    function switchToGame() {
        document.getElementById('selection-page').classList.add('hidden');
        document.getElementById('game-page').classList.remove('hidden');
        
        const area = document.getElementById('active-cards-area');
        selected.forEach(id => {
            const data = cardData[id];
            let html = `
                <div class="active-card">
                    <div style="font-size: 8px; color: #556677; margin-bottom: 4px;">CARD #${id}</div>
                    <div class="card-header-letters">
                        <div class="cl-b">B</div><div class="cl-i">I</div><div class="cl-n">N</div><div class="cl-g">G</div><div class="cl-o">O</div>
                    </div>
                    <div class="card-grid">`;
            
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(r==2 && c==2) html += `<div class="card-cell hit" style="font-size:6px">FREE</div>`;
                    else html += `<div class="card-cell" data-val="${data[c][r]}">${data[c][r]}</div>`;
                }
            }
            area.innerHTML += html + `</div></div>`;
        });
        
        const board = document.getElementById('game-board');
        for(let r=0; r<15; r++) {
            for(let c=0; c<5; c++) {
                let n = (c * 15) + r + 1;
                board.innerHTML += `<div class="num-cell" id="bn-${n}">${n}</div>`;
            }
        }
        runEngine();
    }

    function runEngine() {
        let balls = Array.from({length: 75}, (_, i) => i + 1);
        const engine = setInterval(() => {
            if(isGameOver || balls.length == 0) return clearInterval(engine);
            let n = balls.splice(Math.floor(Math.random()*balls.length), 1)[0];
            calledNumbers.add(n);
            
            let letter = n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
            const colors = {'B':'var(--b-clr)','I':'var(--i-clr)','N':'var(--n-clr)','G':'var(--g-clr)','O':'var(--o-clr)'};
            
            document.getElementById('ball-num').innerText = n;
            document.getElementById('ball-let').innerText = letter;
            document.getElementById('ball-let').style.color = colors[letter];
            
            document.getElementById(`bn-${n}`)?.classList.add('called');
            document.querySelectorAll(`[data-val="${n}"]`).forEach(el => el.classList.add('hit'));
            document.getElementById('balls-count').innerText = calledNumbers.size;
            checkWin();
        }, 3000);
    }

    function checkWin() {
        selected.forEach(id => {
            const data = cardData[id];
            let hits = Array(5).fill().map(() => Array(5).fill(false));
            for(let c=0; c<5; c++) for(let r=0; r<5; r++) if((r==2 && c==2) || calledNumbers.has(data[c][r])) hits[c][r] = true;
            
            let win = false;
            for(let i=0; i<5; i++) {
                if(hits[i].every(h => h)) win = true; 
                if(hits.every(col => col[i])) win = true; 
            }
            if([0,1,2,3,4].every(i => hits[i][i]) || [0,1,2,3,4].every(i => hits[i][4-i])) win = true;

            if(win && !isGameOver) {
                isGameOver = true;
                confetti();
                document.getElementById('game-info').innerText = "BINGO!";
                setTimeout(() => { location.reload(); }, 5000);
            }
        });
    }

    initSelection();
    tg.expand();
</script>
</body>
</html>
