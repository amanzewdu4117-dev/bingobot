<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VAMOS BINGO - SLOT NETWORK</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-app.firebaseapp.com",
            projectId: "your-app-id",
            appId: "1:your-id:web:your-id"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.updateGame = async (ball, history) => {
            await setDoc(doc(db, "game_session", "slot_live"), { ball, history, timestamp: Date.now() });
        };

        window.listenGame = (callback) => {
            onSnapshot(doc(db, "game_session", "slot_live"), (snap) => {
                if(snap.exists()) callback(snap.data());
            });
        };
    </script>

    <style>
        :root { --bg: #050a10; --card-dark: #111a24; --neon-green: #00ffcc; --orange: #ff5722; --text-dim: #5b7a8c; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Top Header Section */
        .profile-header { padding: 15px; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 50px; height: 50px; background: #00bcd4; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 15px rgba(0,188,212,0.4); }
        .user-info { flex: 1; }
        .username { font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 5px; }
        .username::before { content: ''; width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; }
        .meta { color: var(--text-dim); font-size: 10px; margin-top: 2px; }

        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 10px; padding: 0 15px; }
        .stat-box { background: var(--card-dark); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid #1c2a38; }
        .stat-box label { font-size: 8px; color: var(--neon-green); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .stat-box .val { font-size: 18px; font-weight: 900; }
        .timer { color: #ff4444; }

        /* Slot Network Board */
        .slot-section { margin: 15px; background: var(--card-dark); border-radius: 20px; padding: 15px; flex: 1; display: flex; flex-direction: column; border: 1px solid #1c2a38; }
        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .slot-title { font-size: 12px; font-weight: 900; letter-spacing: 2px; color: white; display: flex; align-items: center; gap: 8px; }
        .slot-title::before { content: ''; width: 6px; height: 15px; background: var(--orange); border-radius: 2px; }
        .total-players { font-size: 10px; color: var(--text-dim); }

        .network-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; overflow-y: auto; flex: 1; padding-right: 5px; }
        .slot { aspect-ratio: 1; background: #0d141f; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: white; border: 1px solid #1c2a38; transition: 0.3s; }
        .slot.hit { background: var(--neon-green); color: black; border-color: var(--neon-green); box-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .slot.latest { background: var(--orange); color: white; border-color: var(--orange); transform: scale(1.1); z-index: 5; }

        /* Selection Area */
        .selection-area { padding: 10px 20px; }
        .selection-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 900; color: var(--text-dim); margin-bottom: 10px; }
        .sel-badge { background: var(--orange); color: white; padding: 2px 10px; border-radius: 10px; font-size: 10px; }

        .my-card-preview { background: #0d141f; border-radius: 15px; border: 1px solid #1c2a38; padding: 10px; display: flex; gap: 10px; overflow-x: auto; }
        .mini-card { min-width: 120px; border: 1px solid var(--text-dim); border-radius: 8px; padding: 5px; font-size: 8px; text-align: center; }

        .footer-action { padding: 15px; }
        .draw-btn { width: 100%; padding: 16px; border-radius: 15px; border: none; background: #1c2a38; color: white; font-weight: 900; font-size: 16px; }
    </style>
</head>
<body>

    <div class="profile-header">
        <div class="avatar">@</div>
        <div class="user-info">
            <div class="username">@Amanuuu1</div>
            <div class="meta">ROUND #22132 • ID: 384408623</div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box"><label>Closes In</label><div class="val timer">00:00</div></div>
        <div class="stat-box"><label>Cartela</label><div id="my-cartela-num" class="val">186</div></div>
        <div class="stat-box"><label>Wallet</label><div class="val">40 <small style="font-size: 10px;">ETB</small></div></div>
    </div>

    <div class="slot-section">
        <div class="slot-header">
            <div class="slot-title">SLOT NETWORK</div>
            <div class="total-players">TOTAL ACTIVE: 500 PLAYERS</div>
        </div>
        <div id="network-grid" class="network-grid">
            <!-- 500 Slots will be here -->
        </div>
    </div>

    <div class="selection-area">
        <div class="selection-header">
            <span>SELECTION</span>
            <span class="sel-badge">1/2</span>
        </div>
        <div id="my-selections" class="my-card-preview">
            <!-- Selected card mini-view -->
            <div class="mini-card" style="border-color: var(--orange);">
                <div style="color:var(--orange); margin-bottom: 4px;">Cartela 37</div>
                <div style="display:grid; grid-template-columns: repeat(5,1fr); gap:2px;">
                    <div style="background:#333; padding:2px;">3</div><div style="background:#333; padding:2px;">16</div><div style="background:#333; padding:2px;">31</div><div style="background:#333; padding:2px;">46</div><div style="background:#333; padding:2px;">64</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-action">
        <button class="draw-btn" onclick="triggerDraw()">START NETWORK DRAW</button>
    </div>

    <script>
        let gameHistory = [];

        function init() {
            const grid = document.getElementById('network-grid');
            // 500 ካርቴላዎችን መፍጠር
            for(let i=1; i<=500; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.id = `slot-${i}`;
                s.textContent = i;
                grid.appendChild(s);
            }

            window.listenGame((data) => {
                gameHistory = data.history;
                updateNetwork(data.ball);
            });
        }

        function updateNetwork(lastBall) {
            // ሁሉንም ስሎቶች ማጽዳት
            document.querySelectorAll('.slot').forEach(s => {
                s.classList.remove('latest');
            });

            // ያለፉትን እጣዎች ምልክት ማድረግ
            gameHistory.forEach(n => {
                const el = document.getElementById(`slot-${n}`);
                if(el) el.classList.add('hit');
            });

            // የመጨረሻውን እጣ በብርቱካንማ ማሳየት
            const latest = document.getElementById(`slot-${lastBall}`);
            if(latest) {
                latest.classList.add('latest');
                latest.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function triggerDraw() {
            let pool = [];
            const timer = setInterval(() => {
                if(pool.length >= 75) { clearInterval(timer); return; }
                let n; do { n = Math.floor(Math.random()*75)+1; } while(pool.includes(n));
                pool.push(n);
                window.updateGame(n, pool);
            }, 2500);
        }

        init();
    </script>
</body>
</html>
