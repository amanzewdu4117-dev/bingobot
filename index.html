<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vamos Bingo - Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        /* ያንተ CSS ኮዶች */
        :root { --bg: #050c0e; --card: #0d1618; --neon: #00ffcc; --orange: #ff6600; --text: #ffffff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .header { display: flex; justify-content: space-around; background: var(--card); padding: 10px; border-bottom: 1px solid #1a2a3a; }
        .stat-card { text-align: center; }
        .stat-val { display: block; font-size: 18px; font-weight: bold; color: var(--neon); }
        .stat-label { font-size: 10px; color: #4cafaf; text-transform: uppercase; }

        /* Slot Grid Styling */
        .scroll-container { height: 400px; overflow-y: auto; padding: 10px; }
        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
        .slot-item { background: #1a2628; border-radius: 5px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid #2a3a3c; cursor: pointer; }
        .slot-item.selected { background: var(--orange); color: white; border-color: white; }

        /* Game Board */
        .game-layout { display: flex; gap: 10px; padding: 10px; height: 80vh; }
        .called-numbers-list { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; width: 35%; overflow-y: auto; background: #081113; padding: 5px; border-radius: 10px; }
        .t-num { background: #1a2628; text-align: center; font-size: 10px; padding: 5px 0; border-radius: 4px; color: #444; }
        .t-num.on { background: var(--neon); color: black; font-weight: bold; }
        
        .my-cartelas { width: 65%; overflow-y: auto; padding-bottom: 50px; }
        .bingo-card-small { background: #1a2628; border-radius: 10px; padding: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .cell { background: #0d1618; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 4px; font-weight: bold; }
        .cell.marked { background: var(--orange) !important; color: white; box-shadow: 0 0 5px var(--orange); }

        .btn-full { background: var(--neon); color: black; border: none; padding: 15px; width: 90%; margin: 10px 5%; border-radius: 10px; font-weight: bold; font-size: 16px; position: fixed; bottom: 10px; left: 0; }
        
        /* Winner Screen */
        .winner-content { text-align: center; padding: 50px 20px; }
        .trophy { font-size: 80px; }
        .gold-text { color: var(--orange); font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="stat-card"><span class="stat-label">ደራሽ</span><span id="pot" class="stat-val">2,000</span></div>
        <div class="stat-card"><span class="stat-label">ኳስ</span><span id="called-count" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-label">Wallet</span><span id="wallet" class="stat-val">40</span></div>
    </div>

    <div id="selection-screen" class="screen">
        <div style="text-align:center; padding:10px;">ካርቴላ ይምረጡ (20 ብር)</div>
        <div class="scroll-container">
            <div class="slot-grid" id="lobby-grid"></div>
        </div>
        <button class="btn-full" onclick="startBingoGame()">ጨዋታውን ጀምር</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="game-layout">
            <div class="called-numbers-list" id="track-grid"></div>
            <div class="my-cartelas" id="my-active-cards"></div>
        </div>
    </div>

    <div id="winner-screen" class="screen hidden">
        <div class="winner-content">
            <div class="trophy">🏆</div>
            <div class="gold-text">BINGO!</div>
            <div class="winner-card">
                <h3>እንኳን ደስ አለዎት!</h3>
                <p>ያሸነፉት ካርቴላ: #<span id="win-id">--</span></p>
                <h2 style="color:var(--neon)">+2,184 ETB</h2>
            </div>
            <button class="btn-full" onclick="location.reload()">ተመለስ</button>
        </div>
    </div>

<script>
    // ⚠️ ያንተ Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD2l0Q4J...", 
        authDomain: "my-app-project-1e0bb.firebaseapp.com",
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com",
        projectId: "my-app-project-1e0bb",
        storageBucket: "my-app-project-1e0bb.appspot.com",
        messagingSenderId: "280130045202",
        appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let selectedSlots = [];
    let myTickets = [];

    // 1. ሎቢውን መፍጠር
    const lobbyGrid = document.getElementById('lobby-grid');
    for (let i = 1; i <= 500; i++) {
        let el = document.createElement('div');
        el.className = 'slot-item';
        el.innerText = i;
        el.onclick = () => {
            if(selectedSlots.includes(i)) {
                selectedSlots = selectedSlots.filter(s => s !== i);
                el.classList.remove('selected');
            } else if(selectedSlots.length < 2) {
                selectedSlots.push(i);
                el.classList.add('selected');
            }
        };
        lobbyGrid.appendChild(el);
    }

    // 2. የትራከር ግሪድ መፍጠር (ግራ በኩል ያለው)
    const trackGrid = document.getElementById('track-grid');
    for (let i = 1; i <= 75; i++) {
        let d = document.createElement('div');
        d.className = 't-num'; d.id = `t-${i}`; d.innerText = i;
        trackGrid.appendChild(d);
    }

    function startBingoGame() {
        if(selectedSlots.length === 0) return alert("ካርቴላ ይምረጡ");
        
        // ካርቴላዎችን ማመንጨት
        selectedSlots.forEach(id => {
            let nums = [];
            while(nums.length < 15) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!nums.includes(r)) nums.push(r);
            }
            myTickets.push({ id: id, numbers: nums });
        });

        showScreen('game-screen');
        renderMyCards();
        listenToFirebase();
    }

    function renderMyCards() {
        const container = document.getElementById('my-active-cards');
        myTickets.forEach(ticket => {
            let cardHTML = `<div class="bingo-card-small">
                <div style="font-size:10px; margin-bottom:5px; color:#aaa">CARTELA #${ticket.id}</div>
                <div class="card-grid">`;
            ticket.numbers.forEach(num => {
                cardHTML += `<div class="cell" id="cell-${ticket.id}-${num}">${num}</div>`;
            });
            cardHTML += `</div></div>`;
            container.innerHTML += cardHTML;
        });
    }

    function listenToFirebase() {
        db.ref('gameState').on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            document.getElementById('pot').innerText = Math.floor(data.pot || 2000);
            const history = data.history || [];
            document.getElementById('called-count').innerText = history.length;

            history.forEach(num => {
                // በትራከሩ ላይ ምልክት አድርግ
                let t = document.getElementById(`t-${num}`);
                if(t) t.classList.add('on');

                // በካርቴላዎች ላይ ምልክት አድርግ
                myTickets.forEach(ticket => {
                    if (ticket.numbers.includes(num)) {
                        let cell = document.getElementById(`cell-${ticket.id}-${num}`);
                        if (cell) cell.classList.add('marked');
                    }
                });
            });

            // አሸናፊ መኖሩን ማረጋገጥ (ለሙከራ ከ20 ጥሪ በኋላ)
            if(history.length > 25) {
                document.getElementById('win-id').innerText = selectedSlots[0];
                showScreen('winner-screen');
            }
        });
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
