<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.occupySlot = async (slotNum, userName) => {
            await setDoc(doc(db, "active_slots", "slot_" + slotNum), { name: userName, slot: slotNum, time: Date.now() });
        };

        window.listenToSlots = (callback) => {
            onSnapshot(collection(db, "active_slots"), (snap) => {
                let takenSlots = {};
                snap.forEach(doc => { takenSlots[doc.data().slot] = doc.data().name; });
                callback(takenSlots);
            });
        };

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { if(snap.exists()) callback(snap.data()); });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text: #ffffff; --dark-text: #788da1; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Timer Overlay */
        .countdown-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .timer-circle { font-size: 70px; color: var(--neon); border: 6px solid var(--neon); width: 140px; height: 140px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }

        /* Slot Screen */
        #slot-screen { position: absolute; inset: 0; display: flex; flex-direction: column; background: var(--bg); }
        .header-box { display: flex; justify-content: space-around; padding: 15px; background: #0a1117; border-bottom: 1px solid #1c2b3a; }
        .stat { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; text-align: center; min-width: 90px; border: 1px solid #1c2b3a; }
        .stat label { display: block; font-size: 9px; color: var(--dark-text); margin-bottom: 4px; }
        .stat span { font-size: 14px; font-weight: bold; color: var(--neon); }

        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 15px; overflow-y: auto; flex-grow: 1; }
        .slot { background: #1a252f; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 1px solid #253341; cursor: pointer; transition: 0.2s; color: #7a8a9a; }
        .slot.selected { border-color: var(--orange); background: rgba(255, 126, 33, 0.2); color: white; }
        .slot.taken { background: var(--neon); color: #000; font-weight: bold; }

        /* Game UI */
        #game-ui { display: none; height: 100vh; flex-direction: column; }
        .game-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; padding: 10px; flex-grow: 1; overflow: hidden; }
        
        .board-side { background: var(--panel); border-radius: 12px; padding: 8px; overflow-y: auto; border: 1px solid #1c2b3a; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .b-num { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #5c7894; }
        .b-num.active { background: var(--orange); color: white; box-shadow: 0 0 8px var(--orange); }

        .play-side { display: flex; flex-direction: column; gap: 10px; }
        .ball-area { background: #000; border: 2px solid var(--neon); border-radius: 15px; padding: 15px; text-align: center; color: var(--neon); }
        .ball-val { font-size: 45px; font-weight: 900; }

        /* Cartela Design */
        .cartela-pair { display: grid; grid-template-columns: 1fr; gap: 10px; overflow-y: auto; }
        .cartela { background: #16212a; padding: 8px; border-radius: 10px; border: 1px solid #253341; }
        .c-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .c-cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 3px; color: white; }
        .c-cell.marked { background: var(--neon); color: black; font-weight: bold; animation: pulse 0.4s; }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.15);} 100% {transform: scale(1);} }

        #bingo-overlay { position: fixed; inset: 0; background: rgba(0,255,204,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; color: #000; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        .action-btn { margin: 15px; padding: 15px; background: var(--neon); border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bingo-overlay">BINGO!</div>

    <div id="timer-screen" class="countdown-overlay">
        <div class="timer-circle" id="timer-txt">30</div>
        <p>ጨዋታው በቅርብ ደቂቃ ይጀምራል...</p>
    </div>

    <div id="slot-screen">
        <div class="header-box">
            <div class="stat"><label>PLAYER</label><span>@User</span></div>
            <div class="stat"><label>SELECTED</label><span id="sel-count">0 / 2</span></div>
            <div class="stat"><label>STATUS</label><span>WAITING</span></div>
        </div>
        <div class="slot-grid" id="main-grid"></div>
        <button id="start-trigger" class="action-btn" style="display:none;" onclick="triggerCountdown()">ጨዋታ አስጀምር (30s)</button>
    </div>

    <div id="game-ui">
        <div class="header-box">
            <div class="stat"><label>MY SLOTS</label><span id="my-slots-txt">--</span></div>
            <div class="stat"><label>CALLED</label><span id="called-txt">0</span></div>
            <div class="stat"><label>LAST BALL</label><span id="last-ball-txt">--</span></div>
        </div>
        <div class="game-layout">
            <div class="board-side">
                <div id="bingo-board" class="bingo-board"></div>
            </div>
            <div class="play-side">
                <div class="ball-area">
                    <div class="ball-val" id="big-ball">--</div>
                    <div style="font-size:10px; letter-spacing:2px;">CURRENT BALL</div>
                </div>
                <div class="cartela-pair" id="cards-container"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedSlots = [];
        let myCardsData = {}; 
        let drawnHistory = [];

        function init() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            for(let i=1; i<=500; i++) {
                let div = document.createElement('div');
                div.className = 'slot';
                div.id = `slot-${i}`;
                div.innerText = i;
                div.onclick = () => selectSlot(i);
                grid.appendChild(div);
            }
            window.listenToSlots((taken) => {
                for(let s in taken) {
                    let el = document.getElementById(`slot-${s}`);
                    if(el) el.classList.add('taken');
                }
            });
        }

        function selectSlot(n) {
            let el = document.getElementById(`slot-${n}`);
            if(el.classList.contains('taken')) return;

            if(selectedSlots.includes(n)) {
                selectedSlots = selectedSlots.filter(item => item !== n);
                el.classList.remove('selected');
            } else {
                if(selectedSlots.length >= 2) {
                    alert("ከ 2 በላይ መምረጥ አይችሉም!");
                    return;
                }
                selectedSlots.push(n);
                el.classList.add('selected');
            }
            document.getElementById('sel-count').innerText = `${selectedSlots.length} / 2`;
            document.getElementById('start-trigger').style.display = selectedSlots.length > 0 ? 'block' : 'none';
        }

        function triggerCountdown() {
            document.getElementById('timer-screen').style.display = 'flex';
            let timeLeft = 30;
            let itv = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-txt').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(itv);
                    startMainGame();
                }
            }, 1000);
        }

        function startMainGame() {
            document.getElementById('timer-screen').style.display = 'none';
            document.getElementById('slot-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            
            document.getElementById('my-slots-txt').innerText = selectedSlots.join(", ");

            // Create Board
            const board = document.getElementById('bingo-board');
            board.innerHTML = "";
            for(let i=1; i<=75; i++) board.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            // Create 2 Cartelas
            const container = document.getElementById('cards-container');
            container.innerHTML = "";
            selectedSlots.forEach(s => {
                let nums = generateCardNumbers();
                myCardsData[s] = nums;
                renderCard(s, nums);
            });

            // Start listening to game
            window.listenToGame((data) => {
                if(data.ball) {
                    drawnHistory = data.history || [];
                    document.getElementById('big-ball').innerText = data.ball;
                    document.getElementById('last-ball-txt').innerText = data.ball;
                    document.getElementById('called-txt').innerText = drawnHistory.length;
                    autoMark(data.ball);
                }
            });

            // Simulator for Demo (ይህ በሪል ታይም ሲሆን በAdmin በኩል ይሰራል።)
            runDemo();
        }

        function generateCardNumbers() {
            let n = [];
            while(n.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!n.includes(r)) n.push(r);
            }
            return n;
        }

        function renderCard(slot, nums) {
            let html = `<div class="cartela">
                <div style="text-align:center; color:var(--neon); font-size:11px; margin-bottom:5px;">SLOT ${slot}</div>
                <div class="c-grid">`;
            nums.forEach((val, idx) => {
                if(idx === 12) html += `<div class="c-cell marked">★</div>`;
                else html += `<div class="c-cell" id="cell-${slot}-${val}">${val}</div>`;
            });
            html += `</div></div>`;
            document.getElementById('cards-container').innerHTML += html;
        }

        function autoMark(ball) {
            // Mark Main Board
            let bn = document.getElementById(`bn-${ball}`);
            if(bn) bn.classList.add('active');

            // Mark My Cards
            selectedSlots.forEach(slot => {
                let cell = document.getElementById(`cell-${slot}-${ball}`);
                if(cell) {
                    cell.classList.add('marked');
                    checkBingo(slot);
                }
            });
        }

        function checkBingo(slot) {
            let nums = myCardsData[slot];
            let hits = nums.filter(n => drawnHistory.includes(n));
            // 24 hits + center star = Bingo
            if(hits.length >= 24) {
                document.getElementById('bingo-overlay').style.display = 'flex';
                setTimeout(() => location.reload(), 5000);
            }
        }

        function runDemo() {
            let pool = Array.from({length: 75}, (_, i) => i + 1);
            let h = [];
            let timer = setInterval(() => {
                if(pool.length === 0) clearInterval(timer);
                let idx = Math.floor(Math.random() * pool.length);
                let ball = pool.splice(idx, 1)[0];
                h.push(ball);
                // በFirebase በኩል አፕዴት እናደርገዋለን (ለሙከራ)
                setDoc(doc(window.db, "live_bingo", "current"), { ball: ball, history: h });
            }, 3000);
        }

        init();
    </script>
</body>
</html>
