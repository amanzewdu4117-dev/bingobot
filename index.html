<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO FULL SYSTEM</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE-pMh_07nshv79477-QG-o2qfF28G2M8",
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;

        window.listenToGame = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { 
                if(snap.exists()) callback(snap.data()); 
            });
        };
    </script>

    <style>
        :root { --bg: #0b141a; --panel: #111b21; --neon: #00ffcc; --orange: #ff7e21; --text-gray: #788da1; --border: #1c2b3a; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Shared Header */
        .header-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; background: #0d161d; border-bottom: 1px solid var(--border); }
        .stat-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 12px; padding: 8px; text-align: center; }
        .stat-label { font-size: 8px; color: var(--text-gray); text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--neon); }

        /* Page 1: Selection */
        #selection-screen { display: flex; flex-direction: column; height: 100vh; }
        .slot-container { flex-grow: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .slot { aspect-ratio: 1; background: #1a252f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #5c7894; border: 2px solid #253341; cursor: pointer; position: relative; }
        .slot.selected { border-color: var(--neon); background: rgba(0, 255, 204, 0.1); color: var(--neon); }
        .slot.selected::after { content: "@User"; position: absolute; font-size: 7px; bottom: 8px; font-weight: bold; }

        /* Page 2: Game Layout */
        #game-screen { display: none; grid-template-columns: 90px 1fr; gap: 8px; padding: 10px; height: calc(100vh - 85px); }
        .board-side { background: var(--panel); border-radius: 15px; padding: 6px; border: 1px solid var(--border); overflow-y: auto; }
        .bingo-board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .b-num { background: #1a252f; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #3a4d5e; border: 1px solid #253341; }
        .b-num.active { background: var(--orange); color: white; border-color: var(--orange); }

        .play-area { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .draw-box { background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 15px; text-align: center; }
        .current-ball { font-size: 75px; font-weight: 900; color: var(--neon); line-height: 1; }
        
        .cartela { background: #16212a; border-radius: 15px; padding: 10px; margin-bottom: 10px; border: 1px solid #253341; }
        .grid-5x5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cell { background: #1d2938; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 5px; color: white; }
        .cell.marked { background: var(--neon) !important; color: black !important; font-weight: bold; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #253341; border-radius: 10px; }
    </style>
</head>
<body onload="initSelection()">

    <div id="selection-screen">
        <div class="header-stats">
            <div class="stat-box"><div class="stat-label">Player</div><div class="stat-val">@User</div></div>
            <div class="stat-box"><div class="stat-label">Selected</div><div class="stat-val" id="sel-count">0/2</div></div>
            <div class="stat-box"><div class="stat-label">Starts In</div><div class="stat-val" style="color:red" id="timer">00:20</div></div>
        </div>
        <div class="slot-container" id="slot-grid"></div>
    </div>

    <div id="game-screen-wrapper" style="display:none">
        <div class="header-stats">
            <div class="stat-box"><div class="stat-label">My Slots</div><div class="stat-val" id="ui-my-slots">--</div></div>
            <div class="stat-box"><div class="stat-label">Called</div><div class="stat-val" id="ui-called">0</div></div>
            <div class="stat-box"><div class="stat-label">Status</div><div class="stat-val" style="color:var(--orange)">LIVE</div></div>
        </div>
        <div id="game-screen" style="display:grid">
            <div class="board-side"><div id="main-board" class="bingo-board"></div></div>
            <div class="play-area">
                <div class="draw-box">
                    <div id="big-ball" class="current-ball">--</div>
                    <div style="font-size:10px; color:var(--neon); margin-top:5px;">CURRENT BALL</div>
                </div>
                <div id="cards-container"></div>
            </div>
        </div>
    </div>

    <script>
        let myChoices = [];
        let timeLeft = 20;

        function initSelection() {
            const grid = document.getElementById('slot-grid');
            for(let i=1; i<=800; i++) {
                let s = document.createElement('div');
                s.className = 'slot';
                s.innerText = i;
                s.onclick = () => {
                    if(myChoices.includes(i)) {
                        myChoices = myChoices.filter(x => x !== i);
                        s.classList.remove('selected');
                    } else if(myChoices.length < 2) {
                        myChoices.push(i);
                        s.classList.add('selected');
                    }
                    document.getElementById('sel-count').innerText = `${myChoices.length}/2`;
                };
                grid.appendChild(s);
            }
            let countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
                if(timeLeft <= 0) { clearInterval(countdown); startGame(); }
            }, 1000);
        }

        async function startGame() {
            if(myChoices.length === 0) { alert("ካርቴላ አልመረጡም!"); location.reload(); return; }
            
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen-wrapper').style.display = 'block';
            document.getElementById('ui-my-slots').innerText = myChoices.join(", ");

            // Setup Board 1-75
            const mb = document.getElementById('main-board');
            for(let i=1; i<=75; i++) mb.innerHTML += `<div class="b-num" id="bn-${i}">${i}</div>`;

            // Setup Cards
            const container = document.getElementById('cards-container');
            myChoices.forEach(id => {
                let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 25);
                let html = `<div class="cartela"><div style="color:var(--neon); font-size:10px; text-align:center; margin-bottom:5px;">CARTELA ${id}</div><div class="grid-5x5">`;
                nums.forEach((n, idx) => {
                    if(idx === 12) html += `<div class="cell marked">★</div>`;
                    else html += `<div class="cell" id="c-${id}-${n}">${n}</div>`;
                });
                container.innerHTML += html + `</div></div>`;
            });

            // Start Firebase Sync
            await setDoc(doc(window.db, "live_bingo", "current"), { ball: null, history: [] });
            window.listenToGame(data => {
                document.getElementById('big-ball').innerText = data.ball || "--";
                document.getElementById('ui-called').innerText = data.history.length;
                data.history.forEach(num => {
                    document.getElementById(`bn-${num}`)?.classList.add('active');
                    myChoices.forEach(id => document.getElementById(`c-${id}-${num}`)?.classList.add('marked'));
                });
            });

            // Start Drawing
            runDraw();
        }

        async function runDraw() {
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let history = [];
            for (let b of pool) {
                history.push(b);
                await setDoc(doc(window.db, "live_bingo", "current"), { ball: b, history: history });
                await new Promise(r => setTimeout(r, 4000));
            }
        }
    </script>
</body>
</html>
