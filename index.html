<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JOBE BINGO - SLOT NETWORK</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD2lOQ4J...", // የራስህን ቁጥር እዚህ አስገባ
            authDomain: "my-app-project-1e0bb.firebaseapp.com",
            projectId: "my-app-project-1e0bb",
            appId: "1:280130045202:web:9b5f5bcfb4220489905fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.syncData = async (ball, history) => {
            await setDoc(doc(db, "live_bingo", "current"), { ball, history, status: "LIVE" }, { merge: true });
        };

        window.listenData = (callback) => {
            onSnapshot(doc(db, "live_bingo", "current"), (snap) => { if(snap.exists()) callback(snap.data()); });
        };
    </script>

    <style>
        :root { --bg: #0d161d; --panel: #16212a; --neon: #00ffcc; --orange: #ff7e21; --dark-grey: #1c2732; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; padding: 10px; height: 100vh; overflow: hidden; }

        /* Header Info */
        .user-profile { display: flex; align-items: center; gap: 12px; background: var(--panel); padding: 12px; border-radius: 15px; margin-bottom: 10px; }
        .avatar { width: 45px; height: 45px; background: #00bcd4; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 15px rgba(0,188,212,0.4); }
        .user-details h4 { font-size: 16px; color: white; }
        .user-details p { font-size: 10px; color: #5c7894; }

        .quick-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .q-box { background: var(--panel); border: 1px solid #253341; border-radius: 10px; padding: 8px; text-align: center; }
        .q-box label { font-size: 8px; color: #4e6a85; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .q-box span { font-size: 14px; font-weight: 800; color: var(--neon); }

        /* Slot Network */
        .slot-section { background: var(--panel); border-radius: 20px; padding: 15px; height: calc(100vh - 280px); display: flex; flex-direction: column; border: 1px solid #253341; }
        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #1f2d3a; }
        .slot-header h5 { font-size: 12px; letter-spacing: 1px; color: #788da1; }
        
        .slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; overflow-y: auto; padding-right: 5px; }
        .slot { aspect-ratio: 1; background: var(--dark-grey); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: #788da1; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .slot.selected { background: rgba(0, 255, 204, 0.2); border-color: var(--neon); color: var(--neon); box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); font-size: 8px; text-align: center; }

        /* Bottom Action */
        .selection-bar { margin-top: 15px; background: #091118; border: 1px dashed #253341; border-radius: 15px; padding: 15px; text-align: center; }
        .action-btn { background: var(--neon); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: 900; width: 100%; margin-top: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 255, 204, 0.2); }

        /* Game UI (Hidden initially) */
        #game-view { display: none; }
        .main-board { display: grid; grid-template-columns: 1.2fr 1fr; gap: 10px; margin-top: 10px; }
        .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; background: var(--panel); padding: 10px; border-radius: 15px; }
        .num-cell { background: var(--dark-grey); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 4px; color: #4e6a85; }
        .num-cell.hit { background: var(--orange); color: white; }
    </style>
</head>
<body>

    <!-- Selection View -->
    <div id="setup-view">
        <div class="user-profile">
            <div class="avatar">@</div>
            <div class="user-details">
                <h4 id="user-display">@Amanuuu1</h4>
                <p>ROUND #23068 • ID: 384408623</p>
            </div>
        </div>

        <div class="quick-stats">
            <div class="q-box"><label>CLOSES IN</label><span>00:33</span></div>
            <div class="q-box"><label>CARTELA</label><span id="count-ui">0</span></div>
            <div class="q-box" style="border-color: #ff4444;"><label style="color:#ff4444;">WALLET</label><span>0 ETB</span></div>
        </div>

        <div class="slot-section">
            <div class="slot-header">
                <h5>SLOT NETWORK</h5>
                <span style="font-size: 9px; color: #ff4444;">Min. 10 ETB required</span>
            </div>
            <div id="slot-grid" class="slot-grid">
                <!-- 500 Slots will be generated here -->
            </div>
        </div>

        <div class="selection-bar">
            <p style="font-size: 10px; color: #5c7894;">SELECTION 0/2</p>
            <button class="action-btn" onclick="goToGame()">START GAME SESSION</button>
        </div>
    </div>

    <!-- Game View -->
    <div id="game-view">
        <div class="quick-stats">
            <div class="q-box"><label>BALL</label><span id="ball-ui">--</span></div>
            <div class="q-box"><label>MY SLOT</label><span id="my-slot-ui">0</span></div>
            <div class="q-box"><label>CALLED</label><span id="called-ui">0</span></div>
        </div>
        <div class="main-board">
            <div id="bingo-board" class="bingo-grid"></div>
            <div style="background:#000; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:bold; color:var(--neon); border:2px solid #1c2b3a;">
                <span id="big-ball">--</span>
            </div>
        </div>
    </div>

    <script>
        const slotGrid = document.getElementById('slot-grid');
        const bingoBoard = document.getElementById('bingo-board');
        let selectedSlot = null;
        let drawn = [];

        // 1. 500 Slots ማመንጨት
        function createSlots() {
            for (let i = 1; i <= 500; i++) {
                const div = document.createElement('div');
                div.className = 'slot';
                div.id = `slot-${i}`;
                div.textContent = i;
                div.onclick = () => selectSlot(i);
                slotGrid.appendChild(div);
            }
        }

        // 2. Slot መምረጥ (ልክ እንደ ፎቶው ከለር እንዲቀይር)
        function selectSlot(id) {
            if (selectedSlot) {
                const prev = document.getElementById(`slot-${selectedSlot}`);
                prev.classList.remove('selected');
                prev.textContent = selectedSlot;
            }
            selectedSlot = id;
            const current = document.getElementById(`slot-${id}`);
            current.classList.add('selected');
            current.textContent = "@AMAN"; // በፎቶው ላይ እንዳለው ስም መተካት
            document.getElementById('count-ui').textContent = id;
        }

        // 3. ወደ ጨዋታው መግባት
        function goToGame() {
            if (!selectedSlot) return alert("እባክዎ ካርቴላ ይምረጡ!");
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('my-slot-ui').textContent = selectedSlot;
            initBingoBoard();
            startSync();
        }

        // 4. የጨዋታው ቦርድ (1-75)
        function initBingoBoard() {
            for (let i = 1; i <= 75; i++) {
                const cell = document.createElement('div');
                cell.className = 'num-cell';
                cell.id = `num-${i}`;
                cell.textContent = i;
                bingoBoard.appendChild(cell);
            }
        }

        // 5. Firebase Sync & Auto-fill
        function startSync() {
            window.listenData((data) => {
                drawn = data.history || [];
                document.getElementById('ball-ui').textContent = data.ball;
                document.getElementById('big-ball').textContent = data.ball;
                document.getElementById('called-ui').textContent = drawn.length;

                // Auto-fill: ቁጥሩ ሲወጣ በራሱ እንዲበራ
                drawn.forEach(num => {
                    const el = document.getElementById(`num-${num}`);
                    if (el) el.classList.add('hit');
                });
            });

            // Mock Engine: እጣ ማውጫ (ለሙከራ)
            let pool = [];
            setInterval(async () => {
                if(pool.length >= 75) return;
                let b; do { b = Math.floor(Math.random()*75)+1; } while(pool.includes(b));
                pool.push(b);
                window.syncData(b, pool);
            }, 3000);
        }

        createSlots();
    </script>
</body>
</html>
