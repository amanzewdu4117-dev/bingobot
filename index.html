<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VamosBingo Final Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050a10; --card-bg: #121a26; --accent: #00ffcc; --text: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Top Header */
        .header { padding: 10px; flex-shrink: 0; background: var(--bg); z-index: 10; }
        .top-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .stat-item { background: var(--card-bg); padding: 8px 2px; border-radius: 8px; text-align: center; border: 1px solid #232d3d; }
        .stat-lbl { font-size: 8px; color: #4cafaf; text-transform: uppercase; }
        .stat-val { font-size: 14px; font-weight: bold; color: var(--accent); }

        /* Instructions */
        .instr-row { text-align: center; color: var(--accent); font-size: 12px; padding: 10px 0; flex-shrink: 0; }

        /* Main Selection Area (The part that scrolls) */
        #selection-view { flex: 1; overflow-y: auto; padding: 0 10px; display: block; -webkit-overflow-scrolling: touch; }
        .grid-500 { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding-bottom: 100px; }
        .slot { background: var(--card-bg); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 12px; border: 1px solid #232d3d; color: #a0b0c0; }
        .slot.active { border-color: #fb8c00; background: #fb8c0033; color: white; box-shadow: inset 0 0 8px #fb8c0055; }

        /* Fixed Bottom Action Area */
        .footer-action { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(transparent, var(--bg) 20%); 
            padding: 20px 15px 15px; 
            z-index: 100; 
        }
        .timer-info { text-align: center; font-size: 13px; color: #ff9800; margin-bottom: 8px; font-weight: bold; }
        .start-btn { 
            background: var(--accent); 
            color: #000; 
            border: none; 
            padding: 16px; 
            font-weight: bold; 
            border-radius: 12px; 
            width: 100%; 
            font-size: 16px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        /* Game View (Hidden at first) */
        #game-view { display: none; padding: 10px; grid-template-columns: 1fr 1.3fr; gap: 10px; height: 100%; }
        .ball-tracker { background: var(--card-bg); border-radius: 15px; padding: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .track-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; overflow-y: auto; flex: 1; }
        .t-num { background: #1c283d; text-align: center; font-size: 10px; padding: 6px 0; border-radius: 4px; color: #5d6d82; }
        .t-num.on { background: var(--accent); color: #000; font-weight: bold; }
        
        .big-ball { background: var(--card-bg); border: 2px solid #1a2a3a; border-radius: 20px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; }
        .active-cards { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .play-card { background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid #232d3d; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .p-cell { background: #1c283d; aspect-ratio: 1.2; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 10px; }
        .p-cell.hit { background: var(--accent) !important; color: #000; }

        #win-overlay { position: fixed; inset: 0; background: rgba(0, 255, 204, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; color: #000; font-size: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div id="win-overlay">BINGO! 🎉</div>

<div class="header">
    <div class="top-bar">
        <div class="stat-item"><div class="stat-lbl">Cartela</div><div id="sel-count" class="stat-val">0</div></div>
        <div class="stat-item"><div class="stat-lbl">Called</div><div id="called-count" class="stat-val">0</div></div>
        <div class="stat-item"><div class="stat-lbl">Wallet</div><div class="stat-val">40</div></div>
        <div class="stat-item"><div class="stat-lbl">Derash</div><div class="stat-val">2,184</div></div>
    </div>
</div>

<div id="selection-screen" style="display: contents;">
    <div class="instr-row">እባክዎ እስከ 2 ካርቴላ ይምረጡ</div>
    <div id="selection-view">
        <div class="grid-500" id="slot-grid"></div>
    </div>
    <div class="footer-action">
        <div class="timer-info">ይዘጋል: <span id="timer">45</span>s</div>
        <button class="start-btn" onclick="manualStart()">አሁን ተጫወት (PLAY)</button>
    </div>
</div>

<!-- Game View Screen -->
<div id="game-view">
    <div class="ball-tracker">
        <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:2px; margin-bottom:8px; font-size:10px; text-align:center; font-weight:bold;">
            <div style="background:#1e88e5; border-radius:3px; padding:2px;">B</div>
            <div style="background:#8e24aa; border-radius:3px; padding:2px;">I</div>
            <div style="background:#d81b60; border-radius:3px; padding:2px;">N</div>
            <div style="background:#00897b; border-radius:3px; padding:2px;">G</div>
            <div style="background:#fb8c00; border-radius:3px; padding:2px;">O</div>
        </div>
        <div class="track-grid" id="track-grid"></div>
    </div>
    <div style="display:flex; flex-direction:column; min-height:0;">
        <div class="big-ball">
            <div id="big-num" style="font-size:60px; font-weight:bold; line-height:1;">--</div>
            <div id="last-num" style="background:#fb8c00; color:#000; padding:2px 10px; border-radius:10px; font-size:12px; margin-top:5px; font-weight:bold;">READY</div>
        </div>
        <div class="active-cards" id="active-cards"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let selected = [], allCards = [], called = new Set(), timeLeft = 45;
    let timerInt, drawInt;

    function init() {
        // Create 500 cards
        for(let i=0; i<500; i++) {
            let card = [];
            let ranges = [[1,15], [16,30], [31,45], [46,60], [61,75]];
            for(let col=0; col<5; col++) {
                let colNums = [];
                while(colNums.length < 5) {
                    let r = Math.floor(Math.random() * (ranges[col][1] - ranges[col][0] + 1)) + ranges[col][0];
                    if(!colNums.includes(r)) colNums.push(r);
                }
                card.push(colNums);
            }
            allCards.push(card);
        }

        // Fill Selection Grid
        const grid = document.getElementById('slot-grid');
        for(let i=1; i<=500; i++) {
            let s = document.createElement('div');
            s.className = 'slot'; s.textContent = i;
            s.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(n => n !== i);
                    s.classList.remove('active');
                } else if(selected.length < 2) {
                    selected.push(i);
                    s.classList.add('active');
                    tg.HapticFeedback.impactOccurred('light');
                }
                document.getElementById('sel-count').textContent = selected.length;
            };
            grid.appendChild(s);
        }

        // Fill Tracker
        const track = document.getElementById('track-grid');
        for(let r=0; r<15; r++) {
            for(let c=0; c<5; c++) {
                let val = (c * 15) + (r + 1);
                let d = document.createElement('div');
                d.className = 't-num'; d.id = `track-${val}`; d.textContent = val;
                track.appendChild(d);
            }
        }
        startTimer();
    }

    function startTimer() {
        timerInt = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if(timeLeft <= 0) {
                clearInterval(timerInt);
                if(selected.length > 0) manualStart();
                else { timeLeft = 30; startTimer(); }
            }
        }, 1000);
    }

    function manualStart() {
        if(selected.length === 0) {
            tg.showAlert("እባክዎ ቢያንስ 1 ካርቴላ ይምረጡ!");
            return;
        }
        clearInterval(timerInt);
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('game-view').style.display = 'grid';
        renderActiveCards();
        startGame();
    }

    function renderActiveCards() {
        const container = document.getElementById('active-cards');
        selected.forEach(id => {
            let card = allCards[id-1];
            let html = `<div class="play-card">
                <div style="font-size:10px; color:#fb8c00; margin-bottom:5px; font-weight:bold;">CARTELA ${id}</div>
                <div class="card-grid">`;
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    if(r===2 && c===2) html += `<div class="p-cell hit">★</div>`;
                    else html += `<div class="p-cell" id="p-${id}-v-${card[c][r]}">${card[c][r]}</div>`;
                }
            }
            html += `</div></div>`;
            container.innerHTML += html;
        });
    }

    function startGame() {
        drawInt = setInterval(() => {
            if(called.size >= 75) { clearInterval(drawInt); return; }
            let draw;
            do { draw = Math.floor(Math.random() * 75) + 1; } while(called.has(draw));
            called.add(draw);

            document.getElementById('big-num').textContent = draw;
            document.getElementById('called-count').textContent = called.size;
            document.getElementById(`track-${draw}`).classList.add('on');
            
            selected.forEach(id => {
                let el = document.getElementById(`p-${id}-v-${draw}`);
                if(el) el.classList.add('hit');
            });
            checkBingo();
        }, 2000);
    }

    function checkBingo() {
        const lines = [
            [[0,0],[0,1],[0,2],[0,3],[0,4]], [[1,0],[1,1],[1,2],[1,3],[1,4]], [[2,0],[2,1],[2,2],[2,3],[2,4]], [[3,0],[3,1],[3,2],[3,3],[4,4]], [[4,0],[4,1],[4,2],[4,3],[4,4]],
            [[0,0],[1,0],[2,0],[3,0],[4,0]], [[0,1],[1,1],[2,1],[3,1],[4,1]], [[0,2],[1,2],[2,2],[3,2],[4,2]], [[0,3],[1,3],[2,3],[3,3],[4,3]], [[0,4],[1,4],[2,4],[3,4],[4,4]],
            [[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]
        ];
        selected.forEach(id => {
            let card = allCards[id-1];
            lines.forEach(line => {
                if(line.every(pos => (pos[0]===2 && pos[1]===2) || called.has(card[pos[1]][pos[0]]))) {
                    clearInterval(drawInt);
                    document.getElementById('win-overlay').style.display = 'flex';
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => location.reload(), 6000);
                }
            });
        });
    }

    init();
</script>
</body>
</html>
