<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Bingo - 500 Slots Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #050a12; --panel: #111b27; --accent: #00ffcc;
            --orange: #ff9d00;
            /* የቢንጎ ቀለሞች */
            --b-clr: #00d2ff; --i-clr: #9d50bb; --n-clr: #ff3e3e; --g-clr: #00ff85; --o-clr: #ffae00;
        }

        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }

        /* --- HEADER --- */
        .header { padding: 12px; display: flex; justify-content: space-between; align-items: center; background: var(--panel); border-bottom: 2px solid #1e2d3d; }
        .deposit-btn { background: linear-gradient(135deg, #00ffcc, #00cca3); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* --- GAME LAYOUT --- */
        .game-container {
            display: flex;
            gap: 10px;
            padding: 10px;
            height: calc(100vh - 190px);
            align-items: flex-start;
        }

        .board-side {
            flex: 0.8; 
            background: var(--panel);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid #1e2d3a;
            height: 100%;
            overflow-y: auto;
        }

        .cards-side {
            flex: 1.4;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }

        /* ቦርድ ግሪድ */
        .board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .num-cell { 
            background: #1a2634; height: 38px; display: flex; align-items: center; justify-content: center; 
            font-size: 13px; border-radius: 4px; color: #4e6a85; font-weight: bold; border: 1px solid #1f3344;
        }
        .num-cell.called { background: var(--orange); color: #000; border: none; box-shadow: 0 0 8px var(--orange); }

        /* --- 5x5 ካርቴላ --- */
        .active-card { background: #0b141d; border: 2px solid #1e2d3a; border-radius: 12px; padding: 6px; }
        .card-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .card-cell { 
            aspect-ratio: 1; background: #15222e; display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: bold; border-radius: 5px; border: 1px solid #1e2d3a; color: #fff;
        }
        .card-cell.hit { background: linear-gradient(45deg, #00ffcc, #0099ff); color: #000; box-shadow: 0 0 8px #00ffcc; }

        /* --- SELECTION PAGE --- */
        .slots-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px; }
        .slot { height: 45px; background: #15222e; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #1f3344; font-weight: bold; color: #4e6a85; font-size: 12px; }
        .slot.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,255,204,0.1); box-shadow: 0 0 10px rgba(0,255,204,0.2); }

        .bingo-btn {
            width: 90%; margin: 10px auto; background: linear-gradient(90deg, #ff00cc, #3333ff, #ff00cc);
            background-size: 200%; color: white; border: none; padding: 15px; border-radius: 50px;
            font-size: 20px; font-weight: 900; display: none; animation: flow 2s linear infinite;
        }
        @keyframes flow { 0% { background-position: 0%; } 100% { background-position: 200%; } }

        .timer { background: #000; color: var(--orange); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 20px; border: 2px solid var(--orange); }
    </style>
</head>
<body>

    <div id="selection-page" style="height: 100vh; display: flex; flex-direction: column;">
        <div class="header">
            <div>
                <button class="deposit-btn">WALLET</button>
                <div style="font-size:14px; font-weight:900; margin-top:4px;"><span id="balance">0.00</span> ETB</div>
            </div>
            <div id="timer" class="timer">15</div>
        </div>
        <div style="padding: 10px 15px; font-size: 12px; color: var(--accent); font-weight: bold;">ካርቴላ ይምረጡ (ከ1 - 500)</div>
        <div class="slots-grid" id="slots-grid"></div>
    </div>

    <div id="game-page" class="hidden" style="padding: 10px;">
        <div style="height: 70px; background: #000; border: 2px solid var(--accent); border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 15px;">
            <div id="ball-let" style="font-size: 35px; font-weight: 900;">-</div>
            <div id="ball-num" style="font-size: 45px; font-weight: 900; color: #fff;">--</div>
        </div>

        <div class="game-container">
            <div class="board-side">
                <div class="board-grid" id="game-board"></div>
            </div>
            <div class="cards-side" id="active-cards-area"></div>
        </div>
        <button id="bingo-btn" class="bingo-btn" onclick="claimBingo()">🔥 BINGO! 🔥</button>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g", 
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const tg = window.Telegram.WebApp;
    const user = tg.initDataUnsafe?.user || { id: "dev", first_name: "Aman" };
    const userId = user.id.toString();

    let selected = [], cardData = {};

    function generateCard() {
        let card = [];
        let ranges = [[1,15],[16,30],[31,45],[46,60],[61,75]];
        for(let c=0; c<5; c++) {
            let col = [];
            while(col.length<5) {
                let n = Math.floor(Math.random()*15)+ranges[c][0];
                if(!col.includes(n)) col.push(n);
            }
            card.push(col.sort((a,b)=>a-b));
        }
        return card;
    }

    function startTimer() {
        let s = 15;
        const t = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s <= 0) { clearInterval(t); if(selected.length > 0) switchToGame(); else { s=15; startTimer(); } }
        }, 1000);
    }

    function switchToGame() {
        document.getElementById('selection-page').classList.add('hidden');
        document.getElementById('game-page').classList.remove('hidden');
        const area = document.getElementById('active-cards-area');
        area.innerHTML = "";
        
        selected.forEach(id => {
            const data = cardData[id];
            let html = `<div class="active-card"><div style="font-size:10px; color:#555; margin-bottom:4px;">CARD #${id}</div><div class="card-grid">`;
            // Colored Headers
            const clrs = ['var(--b-clr)', 'var(--i-clr)', 'var(--n-clr)', 'var(--g-clr)', 'var(--o-clr)'];
            ['B','I','N','G','O'].forEach((l, idx) => html += `<div style="color:${clrs[idx]}; font-weight:900; text-align:center; font-size:16px;">${l}</div>`);
            
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    let v = (r==2 && c==2) ? "⭐" : data[c][r];
                    html += `<div class="card-cell" data-val="${v}">${v}</div>`;
                }
            }
            area.innerHTML += html + `</div></div>`;
        });
        runEngine();
    }

    function runEngine() {
        document.getElementById('bingo-btn').style.display = "block";
        let balls = Array.from({length: 75}, (_, i) => i + 1);
        const engine = setInterval(() => {
            if(balls.length == 0) return clearInterval(engine);
            let n = balls.splice(Math.floor(Math.random()*balls.length), 1)[0];
            
            let letter, color;
            if(n<=15) { letter='B'; color='var(--b-clr)'; }
            else if(n<=30) { letter='I'; color='var(--i-clr)'; }
            else if(n<=45) { letter='N'; color='var(--n-clr)'; }
            else if(n<=60) { letter='G'; color='var(--g-clr)'; }
            else { letter='O'; color='var(--o-clr)'; }

            document.getElementById('ball-num').innerText = n;
            const bLet = document.getElementById('ball-let');
            bLet.innerText = letter;
            bLet.style.color = color;
            
            const cell = document.getElementById(`bn-${n}`);
            if(cell) cell.classList.add('called');
            document.querySelectorAll(`[data-val="${n}"]`).forEach(el => el.classList.add('hit'));
        }, 3000);
    }

    function init() {
        db.ref('users/' + userId).on('value', snap => {
            document.getElementById('balance').innerText = (snap.val()?.balance || 0).toLocaleString();
        });

        const board = document.getElementById('game-board');
        const clrs = ['var(--b-clr)', 'var(--i-clr)', 'var(--n-clr)', 'var(--g-clr)', 'var(--o-clr)'];
        ['B','I','N','G','O'].forEach((l, idx) => board.innerHTML += `<div style="color:${clrs[idx]}; font-weight:900; text-align:center;">${l}</div>`);
        
        for(let r=0; r<15; r++) {
            for(let c=0; c<5; c++) {
                let n = (c*15) + r + 1;
                board.innerHTML += `<div class="num-cell" id="bn-${n}">${n}</div>`;
            }
        }

        // 500 Slots መፍጠሪያ
        const grid = document.getElementById('slots-grid');
        for(let i=1; i<=500; i++) {
            let s = document.createElement('div'); s.className = 'slot'; s.innerText = i;
            s.onclick = () => {
                if(selected.includes(i)) { selected = selected.filter(x => x !== i); s.classList.remove('selected'); }
                else if(selected.length < 3) { selected.push(i); cardData[i] = generateCard(); s.classList.add('selected'); }
            };
            grid.appendChild(s);
        }
        startTimer();
    }

    init();
    tg.expand();
</script>
</body>
</html>
