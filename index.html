<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 500 Cards</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b111b; color: white; margin: 0; padding: 5px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 5px; }
        .info-box { background: #162133; flex: 1; padding: 5px; border-radius: 8px; border: 1px solid #2a3a52; text-align: center; }
        .label { color: #4cafaf; font-size: 8px; text-transform: uppercase; }
        .value { color: #00ffcc; font-weight: bold; font-size: 12px; }
        
        .main-layout { display: flex; gap: 8px; flex: 1; overflow: hidden; }
        
        /* የግራ ክፍል - የ500 ካርቴላዎች ዝርዝር */
        .left-panel { flex: 1; background: #162133; border-radius: 12px; padding: 8px; display: flex; flex-direction: column; }
        .card-selector-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; overflow-y: auto; flex: 1; padding-right: 5px; }
        .selector-item { background: #24344d; padding: 10px 5px; border-radius: 6px; text-align: center; font-size: 11px; cursor: pointer; border: 1px solid transparent; }
        .selector-item.selected { border-color: #ff9800; background: #3d2b12; color: #ff9800; }
        
        /* የቀኝ ክፍል - የጥሪ ማሳያ እና የመረጣቸው 2 ካርቴላዎች */
        .right-panel { flex: 1.2; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .big-number-display { background: radial-gradient(circle, #1a2a40 0%, #0d1520 100%); border: 2px solid #00ffcc; border-radius: 15px; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #current-call { font-size: 40px; font-weight: bold; color: white; line-height: 1; }
        
        .my-cards-container { display: flex; flex-direction: column; gap: 10px; }
        .player-card { background: #162133; border: 1px solid #ff9800; border-radius: 10px; padding: 5px; }
        .card-header { font-size: 9px; color: #ff9800; text-align: center; margin-bottom: 3px; }
        .player-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .p-item { background: #24344d; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 3px; font-size: 10px; font-weight: bold; }
        .p-item.matched { background: #ff9800 !important; color: black !important; }
        .p-item.star { color: #ff9800; font-size: 14px; }

        #selection-msg { text-align: center; color: #ff9800; font-weight: bold; padding: 20px; border: 1px dashed #ff9800; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="info-box"><div class="label">Wallet</div><div class="value">40 ETB</div></div>
        <div class="info-box"><div class="label">Time</div><div id="timer" class="value">01:00</div></div>
        <div class="info-box"><div class="label">Matched</div><div id="match-count" class="value">0</div></div>
    </div>

    <div class="main-layout">
        <!-- የግራ ምርጫ -->
        <div class="left-panel">
            <div style="font-size: 10px; margin-bottom: 5px; color: #4cafaf;">ካርቴላ ይምረጡ (Max 2)</div>
            <div class="card-selector-grid" id="card-selector"></div>
        </div>

        <!-- የቀኝ ማሳያ -->
        <div class="right-panel">
            <div class="big-number-display">
                <div id="current-call">--</div>
                <div style="font-size: 7px; color: #00ffcc;">CURRENT CALL</div>
            </div>
            
            <div id="selection-msg">እባክዎ 1 ወይም 2 ካርቴላ ይምረጡ...</div>
            <div id="active-cards-area" class="my-cards-container"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let timeLeft = 60, isGameStarted = false, selectedCardsIdx = [], all500Cards = [], calledNumbers = new Set();
        let drawInterval, timerInterval;

        // 500 የተለያዩ ካርቴላዎችን ማመንጫ
        function generate500Cards() {
            for (let c = 1; c <= 500; c++) {
                let nums = [];
                while(nums.length < 24) {
                    let r = Math.floor(Math.random() * 75) + 1;
                    if(!nums.includes(r)) nums.push(r);
                }
                nums.splice(12, 0, "⭐");
                all500Cards.push(nums);
            }
        }

        function displaySelectors() {
            const container = document.getElementById('card-selector');
            for (let i = 0; i < 500; i++) {
                const div = document.createElement('div');
                div.className = 'selector-item';
                div.textContent = "ካርቴላ #" + (i + 1);
                div.onclick = () => toggleCardSelection(i, div);
                container.appendChild(div);
            }
        }

        function toggleCardSelection(idx, el) {
            if (isGameStarted) return;
            if (selectedCardsIdx.includes(idx)) {
                selectedCardsIdx = selectedCardsIdx.filter(id => id !== idx);
                el.classList.remove('selected');
            } else {
                if (selectedCardsIdx.length < 2) {
                    selectedCardsIdx.push(idx);
                    el.classList.add('selected');
                }
            }
        }

        function startGame() {
            if (selectedCardsIdx.length === 0) return;
            isGameStarted = true;
            document.getElementById('selection-msg').style.display = 'none';
            const area = document.getElementById('active-cards-area');
            area.innerHTML = "";

            selectedCardsIdx.forEach((cardIdx, order) => {
                const cardData = all500Cards[cardIdx];
                const cardDiv = document.createElement('div');
                cardDiv.className = 'player-card';
                cardDiv.innerHTML = `<div class="card-header">ካርቴላ #${cardIdx + 1}</div>`;
                const grid = document.createElement('div');
                grid.className = 'player-grid';
                
                cardData.forEach((num, i) => {
                    const item = document.createElement('div');
                    item.className = 'p-item' + (num === "⭐" ? " star" : "");
                    item.id = `card-${order}-cell-${num}`;
                    item.textContent = num;
                    grid.appendChild(item);
                });
                cardDiv.appendChild(grid);
                area.appendChild(cardDiv);
            });

            startDrawing();
        }

        function startDrawing() {
            drawInterval = setInterval(() => {
                if (calledNumbers.size >= 75) { clearInterval(drawInterval); setTimeout(resetGame, 5000); return; }
                let draw;
                do { draw = Math.floor(Math.random() * 75) + 1; } while (calledNumbers.has(draw));
                calledNumbers.add(draw);
                document.getElementById('current-call').textContent = draw;

                // በሁለቱም ካርቴላዎች ላይ ማርክ ማድረግ
                selectedCardsIdx.forEach((_, order) => {
                    const cell = document.getElementById(`card-${order}-cell-${draw}`);
                    if (cell) cell.classList.add('matched');
                });
            }, 1500);
        }

        function resetGame() {
            isGameStarted = false; selectedCardsIdx = []; calledNumbers.clear(); timeLeft = 60;
            document.getElementById('active-cards-area').innerHTML = "";
            document.getElementById('selection-msg').style.display = 'block';
            document.querySelectorAll('.selector-item').forEach(el => el.classList.remove('selected'));
            startTimer();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); startGame(); }
            }, 1000);
        }

        generate500Cards();
        displaySelectors();
        startTimer();
    </script>
</body>
</html>
