<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Bingo - Smart Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050a12; color: white; padding: 15px; }
        .request-card { 
            background: #111b27; border-radius: 12px; padding: 15px; margin-bottom: 12px; 
            border: 1px solid #1e2d3d; border-left: 5px solid #ff9d00;
        }
        .verified { border-left-color: #00ffcc !important; border-width: 2px; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: #1e2d3d; color: #8899a6; }
        .amt-text { color: #ff9d00; font-size: 20px; font-weight: bold; margin: 5px 0; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-approve { background: #00ffcc; color: #000; border: none; padding: 12px; border-radius: 5px; flex: 2; font-weight: bold; cursor: pointer; }
        .btn-reject { background: #ff4d4d; color: #fff; border: none; padding: 12px; border-radius: 5px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; background: #4e6a85; }
    </style>
</head>
<body>

    <h2 style="color: #00ffcc;">የዲፖዚት ጥያቄዎች</h2>
    <div id="requests-list">በመጫን ላይ...</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g", 
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const requestsDiv = document.getElementById('requests-list');

    // 1. የዲፖዚት ጥያቄዎችን ማንበብ
    db.ref('deposit_requests').on('value', snap => {
        requestsDiv.innerHTML = "";
        if (!snap.exists()) {
            requestsDiv.innerHTML = "<p style='color:#8899a6;'>ምንም የዲፖዚት ጥያቄ የለም።</p>";
            return;
        }

        snap.forEach(child => {
            const req = child.val();
            const displayAmt = req.amount || req.amt || "0";
            const isVerified = (req.status === "Verified ✅" || (req.amount > 0 && req.amount !== "Checking..."));
            const receiptId = req.receipt || req.transactionId || "ID የለም";
            
            const card = document.createElement('div');
            card.className = `request-card ${isVerified ? 'verified' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b>${req.userName || 'ተጫዋች'}</b>
                    <span class="status-badge">${req.status || 'Pending'}</span>
                </div>
                <div style="margin: 8px 0;">ID: <span style="color:#00ffcc">${receiptId}</span></div>
                <div class="amt-text">${displayAmt} ETB</div>
                <div class="btn-group">
                    <button class="btn-approve ${!isVerified ? 'btn-disabled' : ''}" 
                            onclick="approve('${child.key}', '${req.userId}', '${displayAmt}', '${receiptId}')">
                        አጽድቅ
                    </button>
                    <button class="btn-reject" onclick="rejectRequest('${child.key}')">
                        ውድቅ አድርግ
                    </button>
                </div>
            `;
            requestsDiv.appendChild(card);
        });
    });

    // 2. SMS Listener - አውቶማቲክ ማረጋገጫ
    db.ref('bank_sms_logs').on('child_added', (smsSnap) => {
        const smsData = smsSnap.val();
        const smsText = smsData.message || smsData.body || ""; 
        
        const idMatch = smsText.match(/[A-Z0-9]{10,15}/i);
        const amtMatch = smsText.match(/([0-9,]+(\.[0-9]{2})?)\s?(ETB|ብር|birr)/i);

        if (idMatch && amtMatch) {
            const tId = idMatch[0];
            const realAmt = amtMatch[1].replace(/,/g, '');

            db.ref('deposit_requests').once('value', (reqs) => {
                reqs.forEach(r => {
                    const rData = r.val();
                    if (rData.receipt === tId || rData.transactionId === tId) {
                        db.ref('deposit_requests/' + r.key).update({
                            amount: realAmt,
                            status: "Verified ✅"
                        });
                    }
                });
            });
        }
    });

    // 3. የማጽደቂያ ተግባር
    async function approve(reqId, uId, amt, receiptId) {
        const smsSnap = await db.ref('bank_sms_logs').once('value');
        let foundInSms = false;
        
        if (smsSnap.exists()) {
            Object.values(smsSnap.val()).forEach(log => {
                const msg = log.message || log.body || "";
                if (msg.includes(receiptId)) foundInSms = true;
            });
        }

        if (!foundInSms) {
            alert("❌ ስህተት፡ ይህ ትራንዛክሽን በባንክ መልእክቶች ውስጥ አልተገኘም!");
            return;
        }

        if(!confirm(amt + " ብር ለተጫዋቹ ለመሙላት እርግጠኛ ነዎት?")) return;
        
        const userBalRef = db.ref('users/' + uId + '/balance');
        userBalRef.transaction(curr => (curr || 0) + parseFloat(amt), (err, ok) => {
            if(ok) {
                db.ref('deposit_requests/' + reqId).remove();
                alert("✅ በተሳካ ሁኔታ ተጸድቋል!");
            }
        });
    }

    // 4. ውድቅ የማድረጊያ ተግባር
    function rejectRequest(reqId) {
        if(!confirm("ይህንን ጥያቄ ውድቅ አድርገው ከዝርዝሩ ውስጥ ለማጥፋት እርግጠኛ ነዎት?")) return;
        
        db.ref('deposit_requests/' + reqId).remove()
            .then(() => alert("🗑️ ጥያቄው ውድቅ ተደርጎ ተሰርዟል።"))
            .catch(err => alert("❌ ስህተት አጋጥሟል፡ " + err.message));
    }
</script>
</body>
</html>
