<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Bingo - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .request-card { 
            background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 15px; 
            border-left: 5px solid #00ffcc; display: flex; justify-content: space-between; align-items: center;
        }
        .info b { color: #00ffcc; }
        .amount { font-size: 20px; color: #ff9d00; font-weight: bold; }
        .btn-group button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .approve-btn { background: #00ffcc; color: #000; }
        .reject-btn { background: #ff3e3e; color: #fff; }
        .full-msg { font-size: 11px; color: #8899a6; margin-top: 5px; background: #000; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>የዲፖዚት ጥያቄዎች ማስተዳደሪያ (Admin)</h2>
    <div id="requests-list">በመጫን ላይ...</div>

<script>
    // Firebase Setup (ተመሳሳይ Config ይጠቀሙ)
    const firebaseConfig = { 
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g", 
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const requestsDiv = document.getElementById('requests-list');

    // ጥያቄዎችን ከFirebase ማንበብ
    db.ref('deposit_requests').on('value', snap => {
        requestsDiv.innerHTML = "";
        if (!snap.exists()) {
            requestsDiv.innerHTML = "ምንም የዲፖዚት ጥያቄ የለም።";
            return;
        }

        snap.forEach(child => {
            const req = child.val();
            const reqId = child.key;

            const card = document.createElement('div');
            card.className = 'request-card';
            card.innerHTML = `
                <div class="info">
                    <div><b>ተጫዋች:</b> ${req.userName} (ID: ${req.userId})</div>
                    <div><b>Transaction ID:</b> ${req.receipt}</div>
                    <div class="amount">መጠን: ${req.amount} ETB</div>
                    <div class="full-msg">ሙሉ መልእክት: ${req.full_msg || "የለም"}</div>
                </div>
                <div class="btn-group">
                    <button class="approve-btn" onclick="approveRequest('${reqId}', '${req.userId}', ${req.amount})">አጽድቅ</button>
                    <button class="reject-btn" onclick="deleteRequest('${reqId}')">ሰርዝ</button>
                </div>
            `;
            requestsDiv.appendChild(card);
        });
    });

    // ማጽደቂያ ተግባር
    function approveRequest(reqId, uId, amount) {
        if(!confirm(amount + " ብር ወደ ተጫዋቹ አካውንት ለመጨመር እርግጠኛ ነዎት?")) return;

        const userRef = db.ref('users/' + uId + '/balance');
        
        // 1. የተጫዋቹን ነባር ባላንስ አንብብና አዲሱን ጨምር
        userRef.transaction(currentBalance => {
            return (currentBalance || 0) + parseFloat(amount);
        }, (error, committed) => {
            if (committed) {
                // 2. ከተሳካ ጥያቄውን ከዝርዝር አጥፋ
                deleteRequest(reqId);
                alert("ሂሳብ በተሳካ ሁኔታ ተሞልቷል!");
            } else {
                alert("ስህተት ተፈጥሯል: " + error);
            }
        });
    }

    // ጥያቄን የመሰረዝ ተግባር
    function deleteRequest(reqId) {
        db.ref('deposit_requests/' + reqId).remove();
    }
</script>
</body>
</html>
