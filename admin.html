<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Bingo - Realtime Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #050a12; --panel: #111b27; --accent: #00ffcc; --orange: #ff9d00; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        h2 { color: var(--accent); text-align: center; border-bottom: 2px solid var(--panel); padding-bottom: 10px; }
        
        #requests-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        .request-card { 
            background: var(--panel); border: 2px solid #1e2d3d; 
            padding: 20px; border-radius: 15px; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-name { color: var(--orange); font-size: 20px; font-weight: 900; margin-bottom: 5px; }
        .details { font-size: 14px; color: #8899a6; margin: 5px 0; }
        .receipt-box { 
            background: #000; padding: 10px; border-radius: 8px; 
            color: var(--accent); font-family: monospace; font-size: 18px;
            margin: 10px 0; border: 1px dashed var(--accent);
        }
        
        .action-area { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        input[type="number"] {
            flex: 1; background: #050a12; border: 1px solid #3d4d5d;
            padding: 12px; border-radius: 8px; color: #fff; font-size: 16px;
        }
        .btn-approve { 
            background: var(--accent); color: #000; border: none; 
            padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-reject { background: #ff3e3e; color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>የዲፖዚት ማጽደቂያ (Realtime)</h2>
    <div id="requests-list">ጥያቄዎችን በመጠበቅ ላይ... ⏳</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g", 
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ቶሎ እንዲደርስ በ 'value' ፋንታ 'child_added' ወይም 'value' በሪል ታይም መጠቀም
    db.ref('deposit_requests').on('value', snap => {
        const list = document.getElementById('requests-list');
        list.innerHTML = "";
        
        let hasPending = false;

        snap.forEach(child => {
            const data = child.val();
            if(data.status === "pending") {
                hasPending = true;
                const card = document.createElement('div');
                card.className = 'request-card';
                card.innerHTML = `
                    <div class="user-name">👤 ${data.userName}</div>
                    <div class="details">User ID: ${data.userId}</div>
                    <div class="receipt-box">${data.receipt}</div>
                    <div class="action-area">
                        <input type="number" id="amt-${child.key}" placeholder="የብር መጠን">
                        <button class="btn-approve" onclick="approve('${child.key}', '${data.userId}')">አጽድቅ</button>
                        <button class="btn-reject" onclick="reject('${child.key}')">✖</button>
                    </div>
                `;
                list.prepend(card); // አዲሱ ጥያቄ ከላይ እንዲመጣ
            }
        });

        if(!hasPending) {
            list.innerHTML = "<center style='color:#4e6a85; margin-top:50px;'>አዲስ የዲፖዚት ጥያቄ የለም።</center>";
        }
    });

    function approve(reqId, uId) {
        const amt = document.getElementById('amt-' + reqId).value;
        if(!amt) return alert("እባክህ መጠን አስገባ!");

        // ባላንስ መጨመር
        db.ref('users/' + uId + '/balance').transaction(curr => (curr || 0) + parseFloat(amt))
        .then(() => {
            db.ref('deposit_requests/' + reqId).update({ status: "approved" });
            alert("ተቀብለሃል! ✅");
        });
    }

    function reject(reqId) {
        if(confirm("ይሰረዝ?")) {
            db.ref('deposit_requests/' + reqId).update({ status: "rejected" });
        }
    }
</script>
</body>
</html>
