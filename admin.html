<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamos Bingo - Super AI Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: none; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .card-stat { border: none; border-radius: 15px; transition: transform 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-stat:hover { transform: translateY(-5px); }
        .table-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .ai-panel { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-pending { background-color: #ffeeba; color: #856404; }
        .user-id-badge { background: #e9ecef; padding: 3px 7px; border-radius: 5px; font-family: monospace; font-size: 13px; color: #495057; border: 1px solid #dee2e6; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fa-solid fa-robot text-info me-2"></i> VAMOS AI CONTROL PANEL</a>
            <div class="d-flex align-items-center gap-3">
                <div class="form-check form-switch text-white mb-0 bg-secondary px-3 py-1 rounded">
                    <input class="form-check-input" type="checkbox" id="bot-status-toggle" onchange="toggleBotStatus(this.checked)">
                    <label class="form-check-label fw-bold" for="bot-status-toggle" id="bot-status-label">Bot: LOADING</label>
                </div>
                <input type="number" id="botCountInput" value="20" min="1" max="500" style="padding:5px; border-radius:5px; border:none; width: 60px;">
                <button onclick="sendAICommand('start_game')" style="background:#00ff85; color:#000; font-weight:bold; border:none; padding:6px 12px; border-radius:6px;">🎮 START GAME</button>
                <span class="navbar-text text-success" id="connection-status"><i class="fa-solid fa-circle-dot me-1"></i> በመገናኘት ላይ...</span>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="ai-panel">
            <div class="row g-3 align-items-center">
                <div class="col-lg-5">
                    <h5 class="fw-bold mb-1"><i class="fa-solid fa-users-gear text-info me-2"></i> AI ቨርቹዋል ተጫዋቾች & የድል መቆጣጠሪያ</h5>
                </div>
                <div class="col-lg-4">
                    <div class="bg-dark bg-opacity-25 p-2 rounded border border-light border-opacity-10">
                        <label class="form-label small fw-bold d-flex justify-content-between mb-1">
                            <span>🎯 AI Win Advantage:</span>
                            <span class="text-info" id="ai-win-percent-label">50%</span>
                        </label>
                        <input type="range" class="form-range" min="0" max="100" step="5" id="ai-win-range" oninput="updateAIWinRateInDB(this.value)">
                    </div>
                </div>
                <div class="col-lg-3">
                    <div class="input-group input-group-sm">
                        <select class="form-select" id="ai-bot-count">
                            <option value="5">5 Bots</option><option value="10">10 Bots</option><option value="20">20 Bots</option><option value="50">50 Bots</option>
                        </select>
                        <button class="btn btn-info btn-sm fw-bold" onclick="injectAIBots()">ክተት</button>
                        <button class="btn btn-danger btn-sm fw-bold" onclick="clearAIBots()">አውጣ</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-4"><div class="card card-stat bg-primary text-white p-3"><div><h6 class="opacity-75">ጠቅላላ ተጫዋቾች</h6><h2 class="fw-bold" id="stat-total-users">0</h2></div></div></div>
            <div class="col-md-4"><div class="card card-stat bg-success text-white p-3"><div><h6 class="opacity-75">አጠቃላይ ሲስተም ባላንስ</h6><h2 class="fw-bold"><span id="stat-total-balance">0</span> ETB</h2></div></div></div>
            <div class="col-md-4"><div class="card card-stat bg-warning text-dark p-3"><div><h6 class="opacity-75">በካሽ ውስጥ ያሉ TIDs</h6><h2 class="fw-bold" id="stat-total-tids">0</h2></div></div></div>
        </div>

        <div class="row g-4">
            <div class="col-lg-12">
                <div class="table-container">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold text-secondary mb-0"><i class="fa-solid fa-users-gear me-2 text-primary"></i> የተጫዋቾች መቆጣጠሪያ</h5>
                        <input type="text" id="user-search" class="form-control form-control-sm w-25" placeholder="ተጫዋች በስም ፈልግ...">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr><th>ስም</th><th>Player ID</th><th>ስልክ</th><th>ሒሳብ</th><th class="text-center">ድርጊት</th></tr>
                            </thead>
                            <tbody id="users-table-body">
                                <tr><td colspan="5" class="text-center text-muted py-4">በመጫን ላይ...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "aman";
        let db;

        // Firebase Initialization
        function checkAuth() {
            if (sessionStorage.getItem("admin_logged_in") === "true") {
                document.body.style.display = "block";
                initDashboard();
            } else {
                const pass = prompt("🔐 የአድሚን ይለፍ ቃል ያስገቡ፦");
                if (pass === ADMIN_PASSWORD) {
                    sessionStorage.setItem("admin_logged_in", "true");
                    document.body.style.display = "block";
                    initDashboard();
                } else { alert("❌ የተሳሳተ ይለፍ ቃል!"); window.location.reload(); }
            }
        }
        window.onload = checkAuth;

        function initDashboard() {
            const firebaseConfig = {
                apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g",
                databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com"
            };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.database();

            // Connection monitor
            db.ref(".info/connected").on("value", snap => {
                const status = document.getElementById("connection-status");
                if (snap.val() === true) {
                    status.innerHTML = '<i class="fa-solid fa-circle-dot text-success"></i> ተገናኝቷል';
                } else {
                    status.innerHTML = '<i class="fa-solid fa-circle-dot text-danger"></i> በመገናኘት ላይ...';
                }
            });

            // Users Table Live Update
            db.ref("users").on("value", (snapshot) => {
                const usersTableBody = document.getElementById("users-table-body");
                usersTableBody.innerHTML = "";
                let totalUsers = 0, totalBalance = 0;
                
                snapshot.forEach(childSnapshot => {
                    const userId = childSnapshot.key;
                    const user = childSnapshot.val();
                    totalUsers++;
                    totalBalance += Number(user.balance || 0);
                    
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><strong>${user.username || 'ያልታወቀ'}</strong></td>
                        <td><span class="user-id-badge">${userId}</span></td>
                        <td><span class="badge ${user.is_ai ? 'bg-info' : 'bg-secondary'}">${user.phone || 'N/A'}</span></td>
                        <td><strong class="text-success">${Number(user.balance || 0).toFixed(1)} ETB</strong></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-primary py-0 px-2" onclick="editBalance('${userId}', ${user.balance || 0})">✏️</button>
                            <button class="btn btn-sm btn-warning py-0 px-2" onclick="resetPlayer('${userId}')">🔄</button>
                        </td>
                    `;
                    usersTableBody.appendChild(tr);
                });
                document.getElementById("stat-total-users").innerText = totalUsers;
                document.getElementById("stat-total-balance").innerText = totalBalance.toLocaleString();
            });
        }

        window.editBalance = (userId, current) => {
            const val = prompt("አዲስ ባላንስ ያስገቡ:", current);
            if (val !== null) db.ref(`users/${userId}`).update({ balance: parseFloat(val) });
        };

        window.resetPlayer = (userId) => {
            if (confirm("ሒሳብ ወደ 0 ይሁን?")) db.ref(`users/${userId}`).update({ balance: 0 });
        };

        window.injectAIBots = () => {
    const count = parseInt(document.getElementById("ai-bot-count").value);
    const ethiopianNames = ["አማኑኤል", "ቤተልሔም", "ዳዊት", "ሰላም", "ኪሩቤል", "ሩት", "አቤል"];
    const updates = {};
    
    for (let i = 1; i <= count; i++) {
        const aiId = "bot_" + Math.floor(Math.random() * 10000);
        const randomName = ethiopianNames[Math.floor(Math.random() * ethiopianNames.length)];
        
        updates[`bots_pool/${aiId}`] = {
            username: randomName, // እዚህ ጋር ነው ሀገር በቀል ስሙን የምንሰጠው
            is_ai: true,
            joined_at: Date.now()
        };
    }
    db.ref().update(updates).then(() => alert("✅ ቦቶች በሀገር በቀል ስም ተፈጠሩ!"));
};

        window.clearAIBots = () => {
    // ከሁለቱም ቦታዎች ቦቶችን ያስወግዳል
    db.ref("users").orderByChild("is_ai").equalTo(true).once("value", (snapshot) => {
        const updates = {};
        snapshot.forEach(child => { updates[`users/${child.key}`] = null; });
        updates["liveGame/selectedCards"] = null;
        db.ref().update(updates).then(() => alert("🗑️ ቦቶች በሙሉ ከሲስተሙ ወጥተዋል!"));
    });
};
    </script>
</body>
</html>
