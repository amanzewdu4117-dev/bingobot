<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aman Bingo - Smart Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050a12; color: white; padding: 15px; }
        .request-card { 
            background: #111b27; border-radius: 12px; padding: 15px; margin-bottom: 10px; 
            border: 1px solid #1e2d3d; border-left: 5px solid #ff9d00;
        }
        .verified { border-left-color: #00ffcc !important; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: #1e2d3d; color: #8899a6; }
        .amt-text { color: #ff9d00; font-size: 20px; font-weight: bold; }
        .btn-approve { background: #00ffcc; color: #000; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .sms-log { font-size: 11px; color: #4e6a85; background: #000; padding: 5px; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="color: #00ffcc;">የዲፖዚት ጥያቄዎች</h2>
    <div id="requests-list">በመጫን ላይ...</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyD2l0Q4JCedRIshH0vqacqCee0L1qVwN_g", 
        databaseURL: "https://my-app-project-1e0bb-default-rtdb.firebaseio.com" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const requestsDiv = document.getElementById('requests-list');

    // 1. የዲፖዚት ጥያቄዎችን ማንበብ
    db.ref('deposit_requests').on('value', snap => {
        requestsDiv.innerHTML = "";
        snap.forEach(child => {
            const req = child.val();
            const isVerified = req.amount !== "Checking...";
            
            const card = document.createElement('div');
            card.className = `request-card ${isVerified ? 'verified' : ''}`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b>${req.userName}</b>
                    <span class="status-badge">${req.status}</span>
                </div>
                <div style="margin: 8px 0;">ID: <span style="color:#00ffcc">${req.receipt}</span></div>
                <div class="amt-text">${req.amount} ${isVerified ? 'ETB' : ''}</div>
                <button class="btn-approve" onclick="approve('${child.key}', '${req.userId}', '${req.amount}')" ${!isVerified ? 'disabled style="opacity:0.5"' : ''}>አጽድቅ (Approve)</button>
            `;
            requestsDiv.appendChild(card);
        });
    });

    // 2. SMS Listener (ከስልክህ የሚመጣውን SMS አመሳስል)
    db.ref('bank_sms_logs').on('child_added', (smsSnap) => {
        const sms = smsSnap.val().body;
        
        // Transaction ID እና Amount መፈለጊያ
        const idMatch = sms.match(/[A-Z0-9]{10,15}/i);
        const amtMatch = sms.match(/([0-9,]+(\.[0-9]{2})?)\s?(ETB|ብር|birr)/i);

        if (idMatch && amtMatch) {
            const tId = idMatch[0];
            const realAmt = amtMatch[1].replace(/,/g, '');

            // በ deposit_requests ውስጥ ይሄ ID ካለ በራሱ Amount ይሞላል
            db.ref('deposit_requests').orderByChild('receipt').equalTo(tId).once('value', (reqs) => {
                reqs.forEach(r => {
                    db.ref('deposit_requests/' + r.key).update({
                        amount: realAmt,
                        status: "Verified ✅"
                    });
                });
            });
        }
    });

    function approve(reqId, uId, amt) {
        if(!confirm(amt + " ብር ለመሙላት እርግጠኛ ነዎት?")) return;
        
        const userBalRef = db.ref('users/' + uId + '/balance');
        userBalRef.transaction(curr => (curr || 0) + parseFloat(amt), (err, ok) => {
            if(ok) {
                db.ref('deposit_requests/' + reqId).remove();
                alert("ተሳክቷል!");
            }
        });
    }
</script>
</body>
</html>
